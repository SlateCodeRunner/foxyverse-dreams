<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>战争世界 — War World</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Fira+Code:wght@300;400&family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0806;color:rgba(200,170,120,0.5);font-family:'Fira Code',monospace;font-size:11px;overflow-x:hidden}
:root{--gold:rgba(255,180,80,0.4);--red:rgba(255,80,80,0.4);--blue:rgba(80,140,255,0.3);--dim:rgba(200,170,120,0.08);--panel:#0e0a04;--border:rgba(200,170,120,0.06)}

.res-bar{position:sticky;top:0;z-index:30;background:#12100a;border-bottom:2px solid var(--border);padding:5px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.res{font-size:9px;display:flex;align-items:center;gap:2px;cursor:pointer;padding:3px 5px;border:1px solid transparent;border-radius:2px;user-select:none;transition:all .15s}
.res:hover{border-color:var(--gold);background:rgba(255,180,80,0.03)}
.res:active{transform:scale(0.95)}
.res-val{font-family:'Press Start 2P',cursive;font-size:7px;color:var(--gold);min-width:32px}
.res-rate{font-size:5px;color:rgba(200,170,120,0.15)}
.alert-box{margin-left:auto;font-family:'Press Start 2P',cursive;font-size:7px;color:var(--red);animation:flash 1s infinite}
@keyframes flash{50%{opacity:.2}}

/* FULL WIDTH GRID */
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:2px}
@media(max-width:900px){.dashboard{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.dashboard{grid-template-columns:1fr}}

.panel{background:var(--panel);border:1px solid var(--border);padding:6px;position:relative;overflow:hidden}
.panel-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.06;pointer-events:none}
.panel-title{font-family:'Noto Serif SC',serif;font-size:10px;color:rgba(200,170,120,0.2);letter-spacing:2px;text-align:center;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border);position:relative;z-index:2}
.panel.wide{grid-column:span 2}
.panel.full{grid-column:1/-1}

/* CAMPAIGNS — horizontal scroll */
.camp-row{display:flex;gap:2px;overflow-x:auto;padding:2px;scrollbar-width:thin;scrollbar-color:rgba(200,170,120,0.08) transparent}
.camp{min-width:180px;flex-shrink:0;position:relative;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:all .3s}
.camp:hover{border-color:var(--gold)}
.camp.locked{opacity:.35;cursor:not-allowed}
.camp img{width:100%;height:100px;object-fit:cover;display:block;filter:brightness(0.65)}
.camp-info{position:absolute;inset:0;background:linear-gradient(transparent 20%,rgba(10,8,6,0.95) 90%);display:flex;flex-direction:column;justify-content:flex-end;padding:6px}
.camp-title{font-family:'Noto Serif SC',serif;font-size:11px;color:rgba(200,170,120,0.25);letter-spacing:.06em}
.camp-cost{font-size:6px;color:rgba(200,170,120,0.1)}
.camp-prog{height:3px;background:var(--dim);margin-top:3px;border-radius:2px}
.camp-fill{height:100%;border-radius:2px;width:0}
.camp-gauge{position:absolute;top:4px;right:4px;font-family:'Press Start 2P',cursive;font-size:7px;color:var(--gold);background:rgba(10,8,6,0.7);padding:2px 4px;border-radius:2px}

/* BUTTONS */
.bg{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.bg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.b{font-family:'Noto Serif SC',serif;font-size:9px;color:rgba(200,170,120,0.3);background:rgba(20,16,10,0.6);border:1px solid var(--border);padding:5px 3px;cursor:pointer;transition:all .15s;text-align:center;user-select:none;position:relative;z-index:2}
.b:hover{border-color:var(--gold);color:var(--gold);background:rgba(255,180,80,0.03)}
.b:active{transform:scale(0.93)}
.b.off{opacity:.25;cursor:not-allowed}
.b.on{border-color:var(--gold);box-shadow:0 0 4px rgba(255,180,80,0.08)}
.bv{font-family:'Press Start 2P',cursive;font-size:5px;color:var(--gold);display:block;margin-top:1px}

/* BUILDINGS — image cards */
.bld-g{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.bld{text-align:center;border:1px solid var(--border);padding:3px;cursor:pointer;transition:all .2s;background:var(--panel);position:relative;z-index:2}
.bld:hover{border-color:var(--gold)}
.bld:active{transform:scale(0.95)}
.bld img{width:36px;height:36px;image-rendering:pixelated;margin:0 auto;display:block;opacity:.5}
.bld-n{font-family:'Noto Serif SC',serif;font-size:8px;color:rgba(200,170,120,0.2)}
.bld-c{font-family:'Press Start 2P',cursive;font-size:9px;color:var(--gold)}

/* UNITS */
.unit-g{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.u{text-align:center;border:1px solid var(--border);padding:3px;cursor:pointer;transition:all .2s}
.u:hover{border-color:var(--gold)}
.u:active{transform:scale(0.95)}
.u-c{font-family:'Press Start 2P',cursive;font-size:8px;color:var(--gold)}
.u-n{font-family:'Noto Serif SC',serif;font-size:9px;color:rgba(200,170,120,0.15)}

/* DIALS */
.dial-g{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.d{text-align:center;border:1px solid var(--border);padding:4px}
.d-v{font-family:'Press Start 2P',cursive;font-size:10px;color:var(--gold)}
.d-n{font-family:'Noto Serif SC',serif;font-size:12px;color:rgba(200,170,120,0.12)}

.weather-icon{font-size:20px;text-align:center}
.season{font-family:'Noto Serif SC',serif;font-size:11px;color:rgba(200,170,120,0.15);text-align:center}
.log{max-height:80px;overflow-y:auto;font-size:7px;color:rgba(200,170,120,0.12);padding:3px;scrollbar-width:thin;scrollbar-color:rgba(200,170,120,0.06) transparent;position:relative;z-index:2}
.log div{padding:1px 0;border-bottom:1px solid rgba(200,170,120,0.02)}
.status{padding:6px;text-align:center;font-family:'Noto Serif SC',serif;font-size:10px;color:rgba(200,170,120,0.06);letter-spacing:3px}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:40;box-shadow:inset 0 0 100px rgba(0,0,0,0.5)}
.back{position:fixed;top:30px;left:6px;font-size:7px;color:rgba(200,170,120,0.04);text-decoration:none;z-index:50}
.back:hover{color:rgba(200,170,120,0.2)}
</style>
</head>

function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':Math.floor(n);}
function canA(c){for(var k in c){var v=c[k];if(v<=0)continue;var uid=['peasant','footman','archer','knight','siege','cannon','dragon','general'];if(uid.indexOf(k)>-1){var u=UNITS.find(function(x){return x.id===k;});if(!u||u.count<v)return false;}else{if((G[k]||0)<v)return false;}}return true;}
function spend(c){for(var k in c){var uid=['peasant','footman','archer','knight','siege','cannon','dragon','general'];if(uid.indexOf(k)>-1){UNITS.find(function(x){return x.id===k;}).count-=c[k];}else G[k]-=Math.abs(c[k]);}}
function click_res(t){G[t]+=clickPow[t]*clickMult;upd();}
function buyBld(i){var b=BLDS[i];if(!canA(b.cost))return;spend(b.cost);b.count++;for(var k in b.cost)b.cost[k]=Math.ceil(b.cost[k]*1.2);log('\u5efa\u9020 '+b.name);upd();}
function buyUnit(i){var u=UNITS[i];if(!canA(u.cost))return;spend(u.cost);u.count++;for(var k in u.cost)u.cost[k]=Math.ceil(u.cost[k]*1.08);log('\u62db\u52df '+u.name);upd();}
function startCamp(i){var c=CAMPS[i];if(c.active||!canA(c.cost))return;if(totalPower<c.powerReq){alrt('\u6218\u529b\u4e0d\u8db3!');return;}spend(c.cost);c.active=true;c.prog=0;log('\u51fa\u5f81 '+c.name);upd();}
function doRes(i){var r=RESEARCH[i];if(r.done||!canA(r.cost))return;spend(r.cost);r.done=true;clickMult+=0.2;log('\u7814\u7a76 '+r.name);upd();}
function doDip(i){var d=DIPLO[i];if(d.active||!canA(d.cost))return;spend(d.cost);d.active=true;log('\u5916\u4ea4 '+d.name);upd();}
function doSpy(i){var s=SPIES[i];if(s.cd>0||!canA(s.cost))return;spend(s.cost);s.cd=10;log('\u8c0d\u62a5 '+s.name);alrt(s.name+'!');upd();}
function doFrg(i){var f=FORGES[i];if(f.done||!canA(f.cost))return;spend(f.cost);f.done=true;totalPower+=5;log('\u953b\u9020 '+f.name);upd();}
function doEdt(i){var e=EDICTS[i];if(e.active)return;e.active=true;if(i===0){UNITS.find(function(x){return x.id==='footman';}).count+=5;G.morale-=10;}
if(i===1){G.morale+=15;}if(i===2){G.morale+=25;}if(i===3){G.morale-=15;clickMult+=0.5;}
if(i===6){BLDS[0].count+=2;}if(i===7){G.morale+=40;G.gold-=200;}
log('\u6cd5\u4ee4 '+e.name);setTimeout(function(){e.active=false;},30000);upd();}
function alrt(m){var a=document.getElementById('alert-box');a.style.display='flex';document.getElementById('alert-text').textContent=m;setTimeout(function(){a.style.display='none';},3000);}
function log(m){var l=document.getElementById('log');var d=document.createElement('div');d.textContent='[T'+turn+'] '+m;l.insertBefore(d,l.firstChild);if(l.children.length>50)l.removeChild(l.lastChild);}
function tick(){turn++;
if(turn%30===0){season=(season+1)%4;weatherIdx=Math.floor(Math.random()*6);log(SEASONS[season]);}
R={gold:0,wood:0,iron:0,food:0,jade:0,silk:0,gunpowder:0};var we=wEff[weatherIdx]||{};
BLDS.forEach(function(b){for(var k in b.gives){var v=b.gives[k]*b.count;if(we[k])v*=we[k];R[k]+=v;}});
var p=UNITS.find(function(x){return x.id==='peasant';});if(p){R.gold+=p.count*0.3;R.wood+=p.count*0.3;R.food+=p.count*0.15;}
R.gold+=taxRate*0.1;for(var k in R)G[k]+=R[k];
var troops=UNITS.reduce(function(a,u){return a+u.count;},0);G.food-=troops*0.1;
if(G.food<0){G.food=0;G.morale=Math.max(0,G.morale-1);}
G.morale=Math.max(0,Math.min(100,G.morale));
totalPower=0;UNITS.forEach(function(u){totalPower+=u.count*u.power;});
SPIES.forEach(function(s){if(s.cd>0)s.cd--;});
CAMPS.forEach(function(c){if(c.active){c.prog+=100/c.time;if(c.prog>=100){c.prog=100;c.active=false;c.done++;for(var k in c.reward)G[k]=(G[k]||0)+c.reward[k];log('\u80dc\u5229! '+c.name);alrt('\u80dc\u5229!');}}});
upd();}
function upd(){
['gold','wood','iron','food'].forEach(function(k){document.getElementById('r-'+k).textContent=fmt(G[k]);document.getElementById('rr-'+k).textContent=R[k]>0?'+'+R[k].toFixed(1)+'/s':'';});
var bh='';BLDS.forEach(function(b,i){bh+='<div class="bld" onclick="buyBld('+i+')"><img src="'+b.img+'" alt=""><div class="bld-c">'+b.count+'</div><div class="bld-n">'+b.name+'</div><div class="bv">';for(var k in b.cost)bh+=k[0]+':'+fmt(b.cost[k])+' ';bh+='</div></div>';});document.getElementById('buildings').innerHTML=bh;
var uh='';for(var i=0;i<UNITS.length;i+=2){uh+='<div class="unit-g" style="grid-template-columns:repeat(4,1fr)">';for(var j=i;j<Math.min(i+2,UNITS.length);j++){var u=UNITS[j];uh+='<div class="u" onclick="buyUnit('+j+')"><div class="u-c">'+u.count+'</div><div class="u-n">'+u.name+'</div><div class="bv">';for(var k in u.cost)uh+=k[0]+':'+fmt(u.cost[k])+' ';uh+='</div></div>';}uh+='</div>';}document.getElementById('units').innerHTML=uh;
document.getElementById('dials').innerHTML='<div class="d"><div class="d-v">'+totalPower+'</div><div class="d-n">\u6218\u529b</div></div><div class="d"><div class="d-v">'+UNITS.reduce(function(a,u){return a+u.count;},0)+'</div><div class="d-n">\u5175</div></div><div class="d"><div class="d-v">'+Math.floor(G.morale)+'</div><div class="d-n">\u58eb\u6c14</div></div><div class="d"><div class="d-v">T'+turn+'</div><div class="d-n">\u56de\u5408</div></div>';
var rh='';RESEARCH.forEach(function(r,i){rh+='<div class="btn'+(r.done?' disabled':'')+'" onclick="doRes('+i+')">'+r.name+'<span class="bv">';for(var k in r.cost)rh+=k[0]+':'+fmt(r.cost[k])+' ';rh+='</span></div>';});document.getElementById('research').innerHTML=rh;
var dh='';DIPLO.forEach(function(d,i){dh+='<div class="btn'+(d.active?' active':'')+'" onclick="doDip('+i+')">'+d.name+'</div>';});document.getElementById('diplomacy').innerHTML=dh;
var sh='';SPIES.forEach(function(s,i){sh+='<div class="btn'+(s.cd>0?' disabled':'')+'" onclick="doSpy('+i+')">'+s.name+(s.cd>0?'<span class="bv">\u51b7\u5374:'+s.cd+'</span>':'')+'</div>';});document.getElementById('espionage').innerHTML=sh;
document.getElementById('weather').innerHTML='<div class="weather-icon">'+WEATHERS[weatherIdx].split(' ')[0]+'</div><div class="season">'+SEASONS[season]+'</div>';
var fh='';FORGES.forEach(function(f,i){fh+='<div class="btn'+(f.done?' disabled':'')+'" onclick="doFrg('+i+')">'+f.name+'<span class="bv">';for(var k in f.cost)fh+=k[0]+':'+fmt(f.cost[k])+' ';fh+='</span></div>';});document.getElementById('forge').innerHTML=fh;
document.getElementById('taxes').innerHTML='<div class="b" onclick="taxRate=Math.max(0,taxRate-5);log(\'\u51cf\u7a0e\');upd()">\u51cf\u7a0e \u2193 '+taxRate+'%</div><div class="b" onclick="taxRate=Math.min(50,taxRate+5);G.morale-=2;log(\'\u52a0\u7a0e\');upd()">\u52a0\u7a0e \u2191</div>';
var eh='';EDICTS.forEach(function(e,i){eh+='<div class="btn'+(e.active?' active':'')+'" onclick="doEdt('+i+')">'+e.name+'</div>';});document.getElementById('edicts').innerHTML=eh;
var ch='';CAMPS.forEach(function(c,i){var lk=totalPower<c.powerReq&&!c.active;ch+='<div class="camp'+(lk?' locked':'')+'" onclick="startCamp('+i+')"><img src="'+c.img+'" alt=""><div class="camp-info"><div class="camp-title">'+c.name+'</div><div class="camp-cost">';for(var k in c.cost)ch+=k+':'+c.cost[k]+' ';ch+='</div><div class="camp-prog"><div class="camp-fill" style="width:'+c.prog+'%;background:'+(c.active?'var(--gold)':'var(--dim)')+'"></div></div></div><div class="camp-gauge">'+(c.active?Math.floor(c.prog)+'%':(c.done>0?'x'+c.done:'\u2694'))+'</div></div>';});
document.getElementById('campaigns').innerHTML=ch;}

var DEFENSE=[{name:'🧱城墙',cost:{iron:30,wood:20},done:false},{name:'🏹箭塔',cost:{iron:40,wood:30},done:false},{name:'🔥火油',cost:{iron:20,gold:40},done:false},{name:'⛓吊桥',cost:{iron:50,wood:40},done:false},{name:'🛡护城河',cost:{gold:60,wood:50},done:false},{name:'🗼瞭望台',cost:{wood:25,gold:15},done:false}];
var NAVAL=[{name:'⛵渔船',cost:{wood:20,gold:10},done:false},{name:'🚢战船',cost:{wood:50,iron:30},done:false},{name:'🐉龙舟',cost:{wood:100,gold:80,jade:3},done:false},{name:'⚓港口',cost:{wood:60,iron:20},done:false},{name:'🌊水雷',cost:{iron:40,gunpowder:5},done:false},{name:'🏴海盗',cost:{gold:100},done:false}];
var PRAYERS=[{name:'🙏求雨',cost:{jade:2},cd:0},{name:'🌟祈晴',cost:{jade:2},cd:0},{name:'⚡召雷',cost:{jade:5},cd:0},{name:'🐲龙祈',cost:{jade:10},cd:0},{name:'🔮占卜',cost:{jade:3},cd:0},{name:'☯️太极',cost:{jade:1},cd:0}];
var PROMOTE=[{name:'🎖伍长',cost:{gold:50},done:false},{name:'🎖百夫长',cost:{gold:100},done:false},{name:'🎖千户',cost:{gold:200},done:false},{name:'🎖将领',cost:{gold:500,jade:3},done:false},{name:'🎖元帅',cost:{gold:1000,jade:10},done:false},{name:'👑王侯',cost:{gold:2000,jade:20,silk:10},done:false}];
var TREASURES=[{name:'💎夜明珠',cost:{jade:15},done:false},{name:'📿龙珠',cost:{jade:25,gold:500},done:false},{name:'🗡轩辕剑',cost:{iron:200,jade:30},done:false},{name:'📕兵书',cost:{gold:300,silk:5},done:false},{name:'🏺玉玺',cost:{jade:50,gold:1000},done:false},{name:'🎭面具',cost:{silk:10,jade:5},done:false}];
var MERCS=[{name:'🗡刺客',cost:{gold:80},pow:5},{name:'🏹猎手',cost:{gold:60},pow:3},{name:'🐺狼骑',cost:{gold:120},pow:8},{name:'🧙术士',cost:{gold:150,jade:2},pow:10},{name:'👹蛮兵',cost:{gold:40},pow:2},{name:'🦅鹰眼',cost:{gold:90},pow:4}];
var COMMANDS=[{name:'📯集结',active:false},{name:'📯冲锋',active:false},{name:'📯撤退',active:false},{name:'📯包围',active:false},{name:'📯埋伏',active:false},{name:'📯夜袭',active:false}];
var FESTIVALS=[{name:'🎪丰年',cost:{food:50,gold:30},eff:'morale+15'},{name:'🎪祭祖',cost:{jade:3,gold:20},eff:'morale+20'},{name:'🎪阅兵',cost:{gold:100},eff:'power+10'},{name:'🎪宴席',cost:{food:100,gold:50},eff:'morale+30'},{name:'🎪灯会',cost:{gold:40,silk:2},eff:'morale+10'},{name:'🎪龙舞',cost:{gold:60},eff:'morale+12'}];
var PUNISH=[{name:'⚖杖刑',active:false},{name:'⚖流放',active:false},{name:'⚖抄家',active:false},{name:'⚖斩首',active:false},{name:'⚖株连',active:false},{name:'⚖赐死',active:false}];
var TREASURY=[{name:'🏦存金',cost:{gold:100},done:false},{name:'🏦借贷',cost:{},done:false},{name:'🏦铸币',cost:{iron:20,gold:50},done:false},{name:'🏦发债',cost:{},done:false},{name:'🏦赏赐',cost:{gold:200},done:false},{name:'🏦抄没',cost:{},done:false}];
var HORSES=[{name:'🐎养马',cost:{food:20,gold:15},done:false},{name:'🐎驿站',cost:{wood:30,gold:20},done:false},{name:'🐎铁蹄',cost:{iron:30},done:false},{name:'🐎骑射',cost:{gold:80},done:false},{name:'🐎马铠',cost:{iron:50,gold:40},done:false},{name:'🐎种马',cost:{gold:120,food:40},done:false}];
var FARMING=[{name:'🌾开荒',cost:{wood:15},done:false},{name:'🌾水利',cost:{gold:30,wood:20},done:false},{name:'🌾轮作',cost:{gold:50},done:false},{name:'🌾蚕桑',cost:{gold:40,wood:15},done:false},{name:'🌾茶园',cost:{gold:60,wood:25},done:false},{name:'🌾酿酒',cost:{food:30,gold:20},done:false}];


function doArr(arrName,i){
  var arrays={DEFENSE:DEFENSE,NAVAL:NAVAL,PRAYERS:PRAYERS,PROMOTE:PROMOTE,TREASURES:TREASURES,MERCS:MERCS,COMMANDS:COMMANDS,FESTIVALS:FESTIVALS,PUNISH:PUNISH,TREASURY:TREASURY,HORSES:HORSES,FARMING:FARMING};
  var a=arrays[arrName][i];if(!a||a.done||a.active)return;
  if(a.cost&&!canA(a.cost))return;if(a.cost)spend(a.cost);
  if(a.cd!==undefined){a.cd=8;}
  else if(a.pow){totalPower+=a.pow;}
  else{if(a.done!==undefined)a.done=true;if(a.active!==undefined){a.active=true;setTimeout(function(){a.active=false;},20000);}}
  if(a.eff){var v=parseInt(a.eff.replace(/[^0-9]/g,''));if(a.eff.indexOf('morale')>-1)G.morale=Math.min(100,G.morale+v);if(a.eff.indexOf('power')>-1)totalPower+=v;}
  log(a.name);upd();
}
function rArr(arr,id,arrName){
  var h='';arr.forEach(function(a,i){
    var off=(a.done||a.active||(a.cd&&a.cd>0))?' off':'';
    h+='<div class="b'+off+'" onclick="doArr(\''+arrName+'\','+i+')">';
    h+=a.name;
    if(a.cost){h+='<span class="bv">';for(var k in a.cost)h+=k[0]+':'+fmt(a.cost[k])+' ';h+='</span>';}
    if(a.cd&&a.cd>0)h+='<span class="bv">'+a.cd+'</span>';
    h+='</div>';
  });
  var el=document.getElementById(id);if(el)el.innerHTML=h;
}

var _origUpd=upd;
upd=function(){
  _origUpd();
  rArr(DEFENSE,'defense','DEFENSE');rArr(NAVAL,'naval','NAVAL');
  rArr(PRAYERS,'prayers','PRAYERS');rArr(PROMOTE,'promote','PROMOTE');
  rArr(TREASURES,'treasures','TREASURES');rArr(MERCS,'mercs','MERCS');
  rArr(COMMANDS,'commands','COMMANDS');rArr(FESTIVALS,'festivals','FESTIVALS');
  rArr(PUNISH,'punish','PUNISH');rArr(TREASURY,'treasury','TREASURY');
  rArr(HORSES,'horses','HORSES');rArr(FARMING,'farming','FARMING');
  PRAYERS.forEach(function(p){if(p.cd>0)p.cd--;});
};
setInterval(tick,1000);upd();log('\u6218\u4e89\u4e16\u754c\u5df2\u542f\u52a8');


</script>
</body></html>
