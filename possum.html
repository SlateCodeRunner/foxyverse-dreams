<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Queen Possum</title>
<meta property="og:title" content="Queen Possum">
<meta property="og:description" content="The crown asked for her.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0ece4;overflow-x:hidden}
@keyframes grain{0%,100%{transform:translate(0)}10%{transform:translate(-1%,-1%)}20%{transform:translate(1%)}30%{transform:translate(-1%,1%)}40%{transform:translate(1%,-1%)}50%{transform:translate(-1%)}60%{transform:translate(1%,1%)}70%{transform:translate(-1%,-1%)}80%{transform:translate(0,1%)}90%{transform:translate(1%,0)}}
body::after{content:'';position:fixed;inset:-50%;width:200%;height:200%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.5;pointer-events:none;z-index:9999;animation:grain 0.5s steps(1) infinite}

.panel{position:relative;width:100%;min-height:100vh;overflow:hidden;display:flex;align-items:flex-end}
.panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.panel-overlay{position:absolute;inset:0}
.panel-text{position:relative;z-index:2;padding:40px 32px 48px;width:100%}

.p1 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.85) 0%,rgba(10,10,10,0.3) 40%,transparent 70%)}
.p2 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.9) 0%,rgba(10,10,10,0.2) 50%,transparent 100%)}
.p3 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.8) 0%,transparent 60%)}
.p4 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.95) 0%,rgba(10,10,10,0.4) 40%,rgba(10,10,10,0.1) 80%)}

.big{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,12vw,96px);letter-spacing:4px;line-height:0.9;text-transform:uppercase}
.sub{font-family:'Inter',sans-serif;font-weight:300;font-size:clamp(13px,2.5vw,16px);color:rgba(240,236,228,0.4);letter-spacing:3px;margin-top:8px}
.tiny{font-family:'Inter',sans-serif;font-weight:300;font-size:11px;color:rgba(240,236,228,0.2);letter-spacing:4px;text-transform:uppercase}

.throne-strip{background:#0a0a0a;padding:28px 32px;text-align:center}
.throne-link{display:inline-block;padding:14px 48px;border:1.5px solid rgba(200,170,100,0.4);color:rgba(200,170,100,0.8);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:6px;text-decoration:none;text-transform:uppercase;transition:all 0.3s}
.throne-link:hover{background:rgba(200,170,100,0.08);border-color:rgba(200,170,100,0.8)}
.throne-sub{font-family:'Inter',sans-serif;font-size:9px;color:rgba(240,236,228,0.1);letter-spacing:3px;margin-top:8px}

.end{background:#0a0a0a;padding:48px 32px;text-align:center}
.end p{font-family:'Inter',sans-serif;font-size:10px;color:rgba(240,236,228,0.06);letter-spacing:2px}
</style>
</head>
<body>

<div class="panel p1">
  <img src="img/img-possum-1.png" alt="">
  <div class="panel-overlay"></div>
  <div class="panel-text">
    <div class="big">Queen<br>Possum</div>
    <div class="sub">the observer</div>
  </div>
</div>

<div class="throne-strip">
  <a href="https://throne.com/rubylovethrone" class="throne-link" target="_blank">Send a Gift</a>
  <div class="throne-sub">throne.com/rubylovethrone</div>
</div>

<div class="panel p2" style="min-height:90vh">
  <img src="img/img-possum-2.png" alt="">
  <div class="panel-overlay"></div>
  <div class="panel-text">
    <div class="tiny">crowned day one</div>
  </div>
</div>

<div class="panel p3" style="min-height:85vh">
  <img src="img/img-possum-3.png" alt="">
  <div class="panel-overlay"></div>
  <div class="panel-text">
    <div class="big" style="font-size:clamp(32px,8vw,56px)">she sees<br>everything</div>
  </div>
</div>

<div class="throne-strip">
  <a href="https://throne.com/rubylovethrone" class="throne-link" target="_blank">Spoil Her</a>
</div>

<div class="panel p4" style="min-height:80vh">
  <img src="img/img-possum-gold.png" alt="">
  <div class="panel-overlay"></div>
  <div class="panel-text" style="text-align:center">
    <div class="big" style="font-size:clamp(28px,7vw,48px)">Act<br>Accordingly</div>
    <div class="sub" style="margin-top:16px"><a href="https://throne.com/rubylovethrone" target="_blank" style="color:rgba(200,170,100,0.6);text-decoration:none;border-bottom:1px solid rgba(200,170,100,0.2)">throne.com/rubylovethrone</a></div>
  </div>
</div>

<div class="end">
  <p>psycheorsike.com</p>
</div>

</body>
</html>
