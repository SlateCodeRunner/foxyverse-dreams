<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Queen Possum</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;color:#c0beb8;font-family:'Cinzel',serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:100;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.01) 0px,transparent 1px,transparent 3px)}
.card{max-width:400px;width:100%;text-align:center}
.photo{width:220px;height:220px;border-radius:50%;margin:0 auto 28px;overflow:hidden;border:2px solid rgba(221,136,170,0.15);position:relative}
.photo img{width:100%;height:100%;object-fit:cover;opacity:0.4;filter:contrast(1.3) saturate(0.2) brightness(0.7)}
.photo::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.12) 0px,transparent 1px,transparent 3px);border-radius:50%}
.roses{font-size:20px;letter-spacing:6px;margin-bottom:24px}
h1{font-size:clamp(24px,6vw,36px);color:#dd88aa;letter-spacing:4px;font-weight:600;margin-bottom:6px}
.title{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:4px;color:rgba(255,255,255,0.15);margin-bottom:32px}
.bio{font-size:14px;line-height:2;color:rgba(192,190,184,0.4);margin-bottom:36px;max-width:340px;font-style:italic}
.throne{display:block;padding:16px 40px;background:rgba(221,136,170,0.08);border:1px solid rgba(221,136,170,0.25);color:#dd88aa;font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;text-decoration:none;transition:all 0.3s;margin-bottom:16px}
.throne:hover{background:rgba(221,136,170,0.15);border-color:rgba(221,136,170,0.5);transform:translateY(-1px)}
.throne-sub{font-family:'Fira Code',monospace;font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:2px;margin-bottom:48px}
.quote{font-family:'Fira Code',monospace;font-size:11px;color:rgba(221,136,170,0.3);font-style:italic;margin-bottom:8px}
.footer{font-family:'Fira Code',monospace;font-size:7px;color:rgba(255,255,255,0.06);letter-spacing:2px;margin-top:40px}
</style>
</head>
<body>

<div class="card">
  <div class="photo"><img src="img/img-black-roses.png" alt=""></div>
  <div class="roses">&#x1F5A4;</div>
  <h1>Queen Possum</h1>
  <div class="title">the observer</div>
  <p class="bio">warm. perceptive. unhurried. reads the room without trying. crowned day one.</p>
  <a href="https://throne.com/rubylovethrone" class="throne" target="_blank">Send a Gift</a>
  <div class="throne-sub">throne.com/rubylovethrone</div>
  <div class="quote">"excuse me, who did i have sex with?"</div>
</div>

<div class="footer">psycheorsike.com</div>

</body>
</html>
