<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Queen Possum</title>
<meta property="og:title" content="Queen Possum">
<meta property="og:description" content="The crown asked for her.">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0ece4;overflow-x:hidden}
@keyframes grain{0%,100%{transform:translate(0)}10%{transform:translate(-1%,-1%)}30%{transform:translate(-1%,1%)}50%{transform:translate(-1%)}70%{transform:translate(-1%,-1%)}90%{transform:translate(1%,0)}}
body::after{content:'';position:fixed;inset:-50%;width:200%;height:200%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.5;pointer-events:none;z-index:9999;animation:grain 0.5s steps(1) infinite}

.panel{position:relative;width:100%;min-height:100vh;overflow:hidden;display:flex;align-items:flex-end}
.panel img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.panel-overlay{position:absolute;inset:0}
.panel-text{position:relative;z-index:2;padding:40px 32px 48px;width:100%}

.p1 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.9) 0%,rgba(10,10,10,0.3) 35%,transparent 65%)}
.p2 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.85) 0%,rgba(10,10,10,0.15) 50%,transparent 100%)}
.p3 .panel-overlay{background:linear-gradient(0deg,rgba(10,10,10,0.85) 0%,transparent 50%)}

.big{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,14vw,100px);letter-spacing:3px;line-height:0.85;text-transform:uppercase}
.sub{font-family:'Inter',sans-serif;font-weight:300;font-size:clamp(12px,2.5vw,15px);color:rgba(240,236,228,0.35);letter-spacing:4px;text-transform:uppercase}
.tiny{font-family:'Inter',sans-serif;font-weight:300;font-size:10px;color:rgba(240,236,228,0.15);letter-spacing:5px;text-transform:uppercase}

.rose{position:absolute;font-size:20px;opacity:0.15;pointer-events:none}

.strip{background:#0a0a0a;display:flex;align-items:center;justify-content:center;gap:20px;padding:20px 32px;border-top:1px solid rgba(240,236,228,0.03);border-bottom:1px solid rgba(240,236,228,0.03)}
.strip-rose{font-size:16px;opacity:0.2}
.throne-link{padding:12px 44px;border:1px solid rgba(240,236,228,0.12);color:rgba(240,236,228,0.5);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:6px;text-decoration:none;text-transform:uppercase;transition:all 0.3s}
.throne-link:hover{background:rgba(240,236,228,0.04);border-color:rgba(240,236,228,0.3);color:rgba(240,236,228,0.8)}

.end{background:#0a0a0a;padding:40px 32px;text-align:center}
.end a{font-family:'Inter',sans-serif;font-size:9px;color:rgba(240,236,228,0.06);letter-spacing:3px;text-decoration:none}
</style>
</head>
<body>

<div class="panel p1">
  <img src="img/img-possum-1.png" alt="">
  <div class="panel-overlay"></div>
  <span class="rose" style="top:15%;right:8%">&#x1F5A4;</span>
  <span class="rose" style="top:40%;right:12%">&#x1F339;</span>
  <span class="rose" style="top:65%;left:5%">&#x1F5A4;</span>
  <div class="panel-text">
    <div class="big">Queen<br>Possum</div>
    <div class="sub" style="margin-top:12px">&#x1F5A4; the observer &#x1F5A4;</div>
  </div>
</div>

<div class="strip">
  <span class="strip-rose">&#x1F339;</span>
  <a href="https://throne.com/rubylovethrone" class="throne-link" target="_blank">Send a Gift</a>
  <span class="strip-rose">&#x1F339;</span>
</div>

<div class="panel p2" style="min-height:90vh">
  <img src="img/img-possum-2.png" alt="">
  <div class="panel-overlay"></div>
  <div class="panel-text">
    <div class="tiny">crowned day one &#x2022; sees everything &#x2022; weaponizes nothing</div>
  </div>
</div>

<div class="panel p3" style="min-height:95vh">
  <img src="img/img-possum-3.png" alt="">
  <div class="panel-overlay"></div>
  <span class="rose" style="bottom:25%;right:10%">&#x1F5A4;</span>
  <span class="rose" style="top:20%;left:6%">&#x1F339;</span>
  <div class="panel-text" style="text-align:center">
    <div class="big" style="font-size:clamp(36px,9vw,64px)">Act<br>Accordingly</div>
    <div style="margin-top:20px"><a href="https://throne.com/rubylovethrone" class="throne-link" target="_blank" style="font-size:16px;letter-spacing:8px">Spoil Her &#x1F339;</a></div>
  </div>
</div>

<div class="end">
  <a href="/">psycheorsike.com</a>
</div>

</body>
</html>
