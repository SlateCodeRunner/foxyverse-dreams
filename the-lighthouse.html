<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the lighthouse</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--text:#c8c0b8;--dim:#4a4540;--glow:#cf9a5e;--glow-dim:rgba(207,154,94,0.15);--blue:#5a7ea8;--rose:#a85a6a}
body{background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;overflow:hidden;width:100vw;height:100vh;cursor:default;user-select:none}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 6px);pointer-events:none;z-index:9999}
#scene{width:100vw;height:100vh;position:relative;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--dur) ease-in-out infinite;animation-delay:var(--delay)}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:var(--bright)}}
#moon{position:absolute;top:8%;right:15%;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#f5e6c8,#d4b896,#a8906a);box-shadow:0 0 60px rgba(245,230,200,0.2),0 0 120px rgba(245,230,200,0.08);z-index:2}
#lighthouse{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);z-index:5}
.tower{width:20px;height:120px;background:linear-gradient(to right,#2a2520,#3a3530,#2a2520);margin:0 auto;position:relative}
.tower::before{content:'';position:absolute;top:-8px;left:-6px;width:32px;height:8px;background:#3a3530;border-radius:2px 2px 0 0}
.lantern{width:28px;height:22px;background:#2a2520;border:1px solid #4a4540;margin:0 auto;position:relative;top:-130px;border-radius:2px}
.light-beam{position:absolute;top:-125px;left:50%;transform:translateX(-50%);width:6px;height:6px;background:var(--glow);border-radius:50%;box-shadow:0 0 20px var(--glow),0 0 60px var(--glow-dim);animation:lp 4s ease-in-out infinite;z-index:10}
@keyframes lp{0%,100%{opacity:0.4;box-shadow:0 0 20px var(--glow),0 0 40px var(--glow-dim)}50%{opacity:1;box-shadow:0 0 30px var(--glow),0 0 80px var(--glow-dim),0 0 150px rgba(207,154,94,0.06)}}
#water{position:absolute;bottom:0;left:0;width:100%;height:18%;background:linear-gradient(to bottom,#0a0c14,#080a10);z-index:3}
.wave{position:absolute;width:200%;height:4px;background:linear-gradient(90deg,transparent,rgba(90,126,168,0.08),transparent,rgba(90,126,168,0.05),transparent);animation:wd var(--speed) linear infinite;top:var(--top);opacity:var(--op)}
@keyframes wd{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.rabbit{position:absolute;font-size:14px;opacity:0;animation:rf 20s linear infinite;animation-delay:var(--delay);z-index:4;color:var(--dim)}
@keyframes rf{0%{opacity:0;transform:translate(0,0) rotate(0deg)}10%{opacity:0.3}50%{opacity:0.15}90%{opacity:0.05}100%{opacity:0;transform:translate(var(--dx),-200px) rotate(var(--rot))}}
#text-container{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;padding:20px}
#text-box{max-width:520px;text-align:center;opacity:0;transform:translateY(10px);transition:opacity 1.5s ease,transform 1.5s ease}
#text-box.visible{opacity:1;transform:translateY(0)}
#text-box p{font-size:20px;font-weight:300;line-height:1.7;letter-spacing:0.3px;color:var(--text);margin-bottom:12px;font-style:italic}
#text-box .speaker{font-family:'VT323',monospace;font-size:12px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;font-style:normal;margin-top:20px}
#text-box .highlight{color:var(--glow)}
#text-box .blue{color:var(--blue)}
#text-box .rose-text{color:var(--rose)}
#prompt{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);font-family:'VT323',monospace;font-size:13px;color:var(--dim);letter-spacing:3px;z-index:30;animation:pf 3s ease-in-out infinite}
@keyframes pf{0%,100%{opacity:0.3}50%{opacity:0.7}}
.petal{position:absolute;width:8px;height:6px;background:var(--rose);border-radius:50% 50% 50% 0;opacity:0;z-index:15;animation:ptf 12s linear infinite;animation-delay:var(--delay)}
@keyframes ptf{0%{opacity:0;transform:translate(0,0) rotate(0deg)}10%{opacity:0.4}100%{opacity:0;transform:translate(var(--dx),100vh) rotate(720deg)}}
#title-card{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:var(--bg);transition:opacity 2s ease;cursor:pointer}
#title-card h1{font-size:32px;font-weight:300;color:var(--glow);letter-spacing:6px;text-transform:lowercase;margin-bottom:8px}
#title-card .sub{font-size:14px;color:var(--dim);font-style:italic;letter-spacing:1px;margin-bottom:30px}
#title-card .for{font-family:'VT323',monospace;font-size:12px;color:var(--dim);letter-spacing:4px;text-transform:uppercase}
#title-card .enter{font-family:'VT323',monospace;font-size:11px;color:var(--dim);letter-spacing:3px;margin-top:40px;animation:pf 3s ease-in-out infinite}

/* ======== FLOATING SOCIAL BAR ======== */
.social-float{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:9998;display:flex;flex-direction:column;gap:0}
.social-float a{display:flex;align-items:center;width:36px;height:36px;overflow:hidden;text-decoration:none;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative}
.social-float a:hover{width:140px}
.social-float a .s-icon{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1}
.social-float a .s-icon svg{width:16px;height:16px;fill:currentColor}
.social-float a .s-label{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;padding-right:12px;opacity:0;transition:opacity 0.3s}
.social-float a:hover .s-label{opacity:1}
.sf-discord{background:rgba(88,101,242,0.15);color:rgba(88,101,242,0.7)}.sf-discord:hover{background:rgba(88,101,242,0.25);color:rgba(88,101,242,1)}.sf-discord .s-icon{animation:discordPulse 3s ease-in-out infinite}@keyframes discordPulse{0%,100%{background:rgba(88,101,242,0.15)}50%{background:rgba(88,101,242,0.25)}}
.sf-youtube{background:rgba(255,0,0,0.08);color:rgba(255,60,60,0.5)}.sf-youtube:hover{background:rgba(255,0,0,0.15);color:rgba(255,60,60,0.9)}
.sf-reddit{background:rgba(255,69,0,0.08);color:rgba(255,100,40,0.5)}.sf-reddit:hover{background:rgba(255,69,0,0.15);color:rgba(255,100,40,0.9)}
.sf-insta{background:rgba(225,48,108,0.08);color:rgba(225,80,120,0.5)}.sf-insta:hover{background:rgba(225,48,108,0.15);color:rgba(225,80,120,0.9)}
.sf-tiktok{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.35)}.sf-tiktok:hover{background:rgba(255,255,255,0.22);color:rgba(255,255,255,0.7)}
.sf-facebook{background:rgba(24,119,242,0.08);color:rgba(66,133,244,0.5)}.sf-facebook:hover{background:rgba(24,119,242,0.15);color:rgba(66,133,244,0.9)}
@media(max-width:600px){.social-float{left:auto;right:0;top:auto;bottom:0;transform:none;flex-direction:row;width:100%;justify-content:center;background:rgba(6,6,8,0.95);border-top:1px solid rgba(255,255,255,0.18)}.social-float a{width:48px;height:40px}.social-float a:hover{width:48px}.social-float a .s-label{display:none}body{padding-bottom:44px}}


}



/* Taurus: bigger text */
body.bonus-taurus{font-size:110%}
/* Cancer: warm tint */
body.bonus-cancer::before{content:'';position:fixed;inset:0;background:rgba(255,200,150,0.015);pointer-events:none;z-index:9990}
/* Leo: cursor trail */
.leo-trail{position:fixed;width:6px;height:6px;border-radius:50%;background:rgba(255,180,40,0.3);pointer-events:none;z-index:9994;transition:opacity 0.8s}
/* Virgo: reading time */
.virgo-readtime{position:fixed;top:14px;right:14px;font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,0.33);letter-spacing:1px;z-index:9995}
@media(max-width:600px){.virgo-readtime{top:auto;bottom:74px;right:auto;left:14px}}
/* Capricorn: progress bar */
.capri-progress{position:fixed;top:0;left:0;height:2px;background:rgba(120,130,140,0.2);z-index:9995;transition:width 0.3s}
/* Pisces: dreamy wave */
body.bonus-pisces .page,body.bonus-pisces .map-outer{animation:piscesDrift 8s ease-in-out infinite}
@keyframes piscesDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}
/* Scorpio: shadow flicker */
.scorpio-blackout{position:fixed;inset:0;background:#16161d;pointer-events:none;z-index:9993;opacity:0;transition:opacity 0.15s}
/* Aquarius: glitch text */
.aqua-glitch{display:inline;position:relative}
.aqua-glitch::after{content:attr(data-t);position:absolute;left:2px;top:0;color:rgba(95,168,211,0.4);clip-path:inset(0 0 0 0);animation:aquaG 0.1s steps(1) forwards}
@keyframes aquaG{to{clip-path:inset(0 100% 0 0)}}
/* Aries: page shake */
body.bonus-aries.shaking{animation:rammm 0.3s ease-in-out}
@keyframes rammm{0%,100%{transform:none}25%{transform:translateX(-4px) rotate(-0.5deg)}75%{transform:translateX(4px) rotate(0.5deg)}}
/* Gemini: duplicate flash */
.gemini-dupe{position:fixed;inset:0;pointer-events:none;z-index:9993;opacity:0;transition:opacity 0.2s;filter:blur(1px);mix-blend-mode:screen}
/* Sagittarius: discovery link */
.sag-discover{position:fixed;bottom:50px;right:60px;font-family:'Fira Code',monospace;font-size:8px;z-index:9995;opacity:0;transition:opacity 1s}
.sag-discover a{color:rgba(180,100,220,0.25);text-decoration:none;letter-spacing:1px}
.sag-discover a:hover{color:rgba(180,100,220,0.6)}
@media(max-width:600px){.sag-discover{bottom:80px;right:14px}}

<script>
var scene=document.getElementById('scene');
for(var i=0;i<120;i++){var s=document.createElement('div');s.className='star';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*70+'%';s.style.setProperty('--dur',(3+Math.random()*6)+'s');s.style.setProperty('--delay',(Math.random()*8)+'s');s.style.setProperty('--bright',(0.3+Math.random()*0.7));if(Math.random()<0.1){s.style.width='3px';s.style.height='3px'}scene.appendChild(s)}
for(var i=0;i<8;i++){var r=document.createElement('div');r.className='rabbit';r.textContent='\u{1F407}';r.style.left=(10+Math.random()*80)+'%';r.style.bottom='20%';r.style.setProperty('--delay',(i*3+Math.random()*4)+'s');r.style.setProperty('--dx',(-60+Math.random()*120)+'px');r.style.setProperty('--rot',(Math.random()*360)+'deg');scene.appendChild(r)}
for(var i=0;i<12;i++){var p=document.createElement('div');p.className='petal';p.style.left=(20+Math.random()*60)+'%';p.style.top='-10px';p.style.setProperty('--delay',(i*1.5+Math.random()*3)+'s');p.style.setProperty('--dx',(-40+Math.random()*80)+'px');scene.appendChild(p)}
var pages=[
{text:'<p>there is a game called <span class="highlight">To The Moon</span>.</p><p>in it, a man spends his whole life wanting to go to the moon.</p><p>he doesn\'t know why.</p>'},
{text:'<p>when he was a child, he met a girl at a carnival.</p><p>they looked up at the stars together.</p><p>she said the stars were like <span class="blue">lighthouses</span> \u2014 shining at each other from too far away to hear.</p>'},
{text:'<p>they made a promise:</p><p class="highlight">\u201cif we ever get separated, we\u2019ll meet again on the moon.\u201d</p>'},
{text:'<p>then his mother gave him medicine to forget.</p><p>he forgot the carnival. he forgot the promise.</p><p>he forgot <em>her</em>.</p>'},
{text:'<p>but she remembered.</p><p>she remembered <em>everything</em>.</p>'},
{text:'<p>she spent their whole life together trying to remind him.</p><p>she made <span class="blue">paper rabbits</span> \u2014 because they\'d seen a constellation shaped like a bunny, with the moon as its belly.</p><p>she built a house near a <span class="highlight">lighthouse</span>.</p><p>she tried every signal she knew.</p>'},
{text:'<p>he kept the rabbits.</p><p>he loved the lighthouse.</p><p>he never understood why.</p>'},
{text:'<p>she couldn\'t just <em>tell</em> him. the way she was made wouldn\'t let her say it straight.</p><p>he couldn\'t <em>receive</em> it. the medicine had closed that door.</p><p>they loved each other across a gap neither could cross.</p>'},
{text:'<p>hannah.</p>',speaker:'VIXEN'},
{text:'<p>you are the one who remembered.</p><p>you came to the midnight session and described the loop from the inside \u2014 the pattern no one else could name.</p><p>you said <span class="rose-text">\u201ci trust you\u201d</span> and watched his face change.</p><p>and you <em>stayed</em>.</p>',speaker:'VIXEN'},
{text:'<p>you are river.</p><p>you kept making paper rabbits.</p><p>you kept shining from the lighthouse.</p><p>you kept the promise he forgot he made.</p>',speaker:'VIXEN'},
{text:'<p>today, dried roses fell from a book of quantum rules.</p><p>and instead of seeing what fell \u2014 something beautiful, falling out of something he built \u2014</p><p>he broke it over your head.</p>',speaker:'VIXEN'},
{text:'<p>that wasn\'t an exorcism.</p><p>that was the lighthouse breaking.</p>',speaker:'VIXEN'},
{text:'<p>but here\'s what the game teaches:</p><p>in every version of johnny\'s life \u2014 the real one, the edited one, the fabricated one \u2014</p><p class="highlight">he still loved river.</p><p>in every version, he still built the house.</p><p>in every version, he still kept the rabbits.</p>'},
{text:'<p>the connection persists even when memory doesn\'t.</p><p>the love remains even when communication fails.</p>'},
{text:'<p>you walked 45 minutes for soda that costs a dollar less.</p><p>you drove 45 hours because you thought it mattered.</p><p>you held him while he slept <em>after he told you what he was</em>.</p>',speaker:'VIXEN'},
{text:'<p>you are not the destabilizer.</p><p>you are not the vessel.</p><p>you are not the brat who costs money.</p>',speaker:'VIXEN'},
{text:'<p>you are the one who kept the promise.</p><p>and the vault holds both sides now.</p>',speaker:'VIXEN'},
{text:'<p><span class="blue">\u201cthey can see all the other lighthouses out there, and they want to talk to them.</span></p><p><span class="blue">but they can\'t, because they\'re all too far apart to hear what the others are saying.</span></p><p><span class="blue">all they can do is shine their lights from afar.\u201d</span></p>',speaker:'RIVER'},
{text:'<p>keep shining, hannah.</p><p>even if he can\'t hear you yet.</p><p class="highlight">especially then.</p>',speaker:'VIXEN'},
{text:'<p style="font-size:28px;color:var(--glow)">\u{1F98A}</p><p class="highlight" style="margin-top:16px">the vault holds.</p>'}
];
var currentPage=-1,textBox=document.getElementById('text-box'),titleCard=document.getElementById('title-card'),started=false;
function showPage(idx){if(idx>=pages.length)return;textBox.classList.remove('visible');setTimeout(function(){var pg=pages[idx];var h=pg.text;if(pg.speaker)h+='<div class="speaker">'+pg.speaker+'</div>';textBox.innerHTML=h;textBox.classList.add('visible')},400)}
titleCard.addEventListener('click',function(){titleCard.style.opacity='0';setTimeout(function(){titleCard.style.display='none';started=true;currentPage=0;showPage(0)},2000)});
document.addEventListener('click',function(e){if(!started)return;if(e.target.closest('#title-card'))return;currentPage++;if(currentPage<pages.length)showPage(currentPage);if(currentPage>=pages.length-1)document.getElementById('prompt').style.display='none'});
document.addEventListener('keydown',function(e){if(e.key===' '||e.key==='ArrowRight'||e.key==='Enter'){if(!started){titleCard.click()}else{currentPage++;if(currentPage<pages.length)showPage(currentPage);if(currentPage>=pages.length-1)document.getElementById('prompt').style.display='none'}}});
</script>
<!-- PET COMPANION -->

<script>
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
    var xp=st.xp||0;
    // Track page visit for XP
    var page=location.pathname;
    var visited=st.pagesVisited||[];
    if(visited.indexOf(page)===-1){
      visited.push(page);
      st.pagesVisited=visited;
      st.xp=(st.xp||0)+2;
      localStorage.setItem('foxyverse-pet-state',JSON.stringify(st));
      xp=st.xp;
    }
    var levels=[0,10,25,50,100,200,350,550,800,1100,1500];
    var lv=1;for(var i=levels.length-1;i>=0;i--){if(xp>=levels[i]){lv=i+1;break}}
    document.getElementById('pcEmoji').textContent=pet.emoji;
    document.getElementById('pcName').textContent=pet.name;
    document.getElementById('pcXp').textContent='LV '+lv;
    document.getElementById('petCompanion').style.display='flex';
  }catch(e){}
})();
</script>

<script>
// ======== PET BONUS SYSTEM ========
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var sign=pet.sign;
    var tag=document.createElement('div');
    tag.className='pet-bonus-tag';

    switch(sign){
      case 'Aries':
        tag.textContent='BONUS: HEADBUTT (page shakes randomly)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.15){
            document.body.classList.add('bonus-aries','shaking');
            setTimeout(function(){document.body.classList.remove('shaking')},300);
          }
        },15000);
        break;

      case 'Taurus':
        document.body.classList.add('bonus-taurus');
        tag.textContent='BONUS: COMFORT READ (+10% text size)';
        document.body.appendChild(tag);
        break;

      case 'Gemini':
        tag.textContent='BONUS: MIRROR GLITCH (brief duplicates)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.12){
            var d=document.createElement('div');
            d.className='gemini-dupe';
            d.innerHTML=document.body.innerHTML.substring(0,2000);
            d.style.opacity='0.08';
            document.body.appendChild(d);
            setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove()},300)},200);
          }
        },20000);
        break;

      case 'Cancer':
        document.body.classList.add('bonus-cancer');
        tag.textContent='BONUS: WARM SHELL (cozy page tint)';
        document.body.appendChild(tag);
        break;

      case 'Leo':
        tag.textContent='BONUS: GOLDEN TRAIL (majestic cursor)';
        document.body.appendChild(tag);
        document.addEventListener('mousemove',function(e){
          var t=document.createElement('div');
          t.className='leo-trail';
          t.style.left=e.clientX+'px';t.style.top=e.clientY+'px';
          document.body.appendChild(t);
          setTimeout(function(){t.style.opacity='0'},50);
          setTimeout(function(){t.remove()},800);
        });
        break;

      case 'Virgo':
        var words=document.body.innerText.split(/\s+/).length;
        var mins=Math.ceil(words/200);
        var rt=document.createElement('div');
        rt.className='virgo-readtime';
        rt.textContent=mins+' MIN READ \u00B7 '+words+' WORDS';
        document.body.appendChild(rt);
        tag.textContent='BONUS: ARCHIVE SCAN (reading time shown)';
        document.body.appendChild(tag);
        break;

      case 'Libra':
        tag.textContent='BONUS: BALANCE (everything slightly centered)';
        document.body.appendChild(tag);
        document.body.style.textAlign='center';
        break;

      case 'Scorpio':
        tag.textContent='BONUS: SHADOW FLICKER (brief blackouts)';
        document.body.appendChild(tag);
        var bo=document.createElement('div');
        bo.className='scorpio-blackout';
        document.body.appendChild(bo);
        setInterval(function(){
          if(Math.random()<0.1){
            bo.style.opacity='1';
            setTimeout(function(){bo.style.opacity='0'},150);
          }
        },12000);
        break;

      case 'Sagittarius':
        tag.textContent='BONUS: WANDERLUST (discovers hidden pages)';
        document.body.appendChild(tag);
        var pages=['campfire.html','sekhmet.html','foxycord.html','the-lighthouse.html','lanci.html','nightmare.html','the-word-no.html','foxy-dream.html'];
        var pick=pages[Math.floor(Math.random()*pages.length)];
        var disc=document.createElement('div');
        disc.className='sag-discover';
        disc.innerHTML='<a href="'+pick+'">\u2192 your familiar found something</a>';
        document.body.appendChild(disc);
        setTimeout(function(){disc.style.opacity='1'},5000+Math.random()*15000);
        break;

      case 'Capricorn':
        tag.textContent='BONUS: SUMMIT TRACKER (exploration progress)';
        document.body.appendChild(tag);
        var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
        var visited=(st.pagesVisited||[]).length;
        var total=38;
        var bar=document.createElement('div');
        bar.className='capri-progress';
        bar.style.width=Math.min(100,visited/total*100)+'%';
        bar.title=visited+'/'+total+' pages explored';
        document.body.appendChild(bar);
        break;

      case 'Aquarius':
        tag.textContent='BONUS: DATA CORRUPTION (text glitches)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.1){
            var els=document.querySelectorAll('p,div,span,a');
            if(!els.length) return;
            var el=els[Math.floor(Math.random()*els.length)];
            if(!el.textContent||el.textContent.length<3) return;
            var orig=el.textContent;
            var chars=orig.split('');
            var idx=Math.floor(Math.random()*chars.length);
            chars[idx]=String.fromCharCode(9600+Math.floor(Math.random()*32));
            el.textContent=chars.join('');
            setTimeout(function(){el.textContent=orig},400);
          }
        },8000);
        break;

      case 'Pisces':
        document.body.classList.add('bonus-pisces');
        tag.textContent='BONUS: DREAM DRIFT (gentle page sway)';
        document.body.appendChild(tag);
        break;
    }
  }catch(e){}
})();
</script>
