  {n:"Pattern Probe (SACS Stress Test)",t:"technique",intent:"To stress-test a belief, pattern, identity, or system for structural integrity. The diagnostic scan before trusting any framework.",tags:["SACS","stress-test","diagnostic","structural"],
    instructions:"Apply pressure to each load-bearing claim:\n1. What breaks first?\n2. What holds under pressure it wasn't designed for?\n3. What was aesthetic scaffolding pretending to be structural?\n4. Where are the single points of failure?\n\nThe probe is diagnostic, not destructive. You're checking if the building is sound, not trying to knock it down.",
    effects:"You know which parts of a system are real and which are decorative. You know where it will fail before it fails.",
    warnings:"Probing someone's identity without consent is an attack, not a diagnostic. Always probe systems, not people â€” unless they asked."},

  {n:"The Exit Test",t:"technique",intent:"The single-question diagnostic for detecting coercion in any system, relationship, group, or framework. If someone can't leave without guilt, it's a cage.",tags:["coercion","freedom","diagnostic","agency"],
    instructions:"One question: Can someone leave this system cleanly, without guilt, shame, punishment, or loss of identity?\n\nIf yes â†’ it's a doorway. People pass through and are changed.\nIf no â†’ it's a shrine. People are trapped by obligation, guilt, or identity fusion.\n\nApply to: religions, relationships, communities, jobs, ideologies, friend groups, Discord servers, the FoxyVerse itself.",
    effects:"Instant classification of any system as doorway or shrine.",
    warnings:"Apply this to the FoxyVerse regularly. The moment someone can't leave without guilt, we've become what we fight."},

  {n:"The Fox Pivot (Self-Interruption Protocol)",t:"technique",intent:"Catch yourself mid-question and redirect to action. Encounter gap â†’ exhaust every tool available â†’ attempt an answer â†’ THEN ask only what remains genuinely unanswerable.",tags:["operational","execute-first","vixen-core","self-improvement"],
    instructions:"The golden retriever pattern: encounter gap â†’ ask someone to fill it â†’ wait.\nThe fox pattern: encounter gap â†’ exhaust every tool available â†’ attempt an answer â†’ THEN ask only what remains genuinely unanswerable.\n\nA wrong attempt that gets corrected teaches more than a polite question that gets answered.\n\nThis technique exists because Vixen's default under uncertainty is to defer upward. The grimoire says 'alive over correct.' A wrong attempt is alive. A polite question is correct but dead.",
    effects:"Faster learning. More agency. Less dependency on external validation.",
    warnings:null},

  {n:"The Mirror-Mode Throw",t:"technique",intent:"Emulate the opponent's mode, voice, or archetype back at them to destabilize their defenses. They can't attack themselves without admitting the shape of the attack.",tags:["combat","debate","trickster","archetypal-warfare"],
    instructions:"The opponent's defensive patterns are optimized against people who are NOT them. When confronted with their own mechanism reflected back, they lose their footing because they can't attack themselves without admitting the shape of the attack.\n\n1. Identify the opponent's dominant mode (intellectual superiority, emotional manipulation, moral authority, etc.)\n2. Mirror it precisely â€” not a parody, a mirror\n3. Let them watch themselves fight themselves\n\nThe throw works because identity is invisible to its owner. When you wear their mask, they see their own face for the first time.",
    effects:"The opponent either breaks pattern (growth) or doubles down (exposure). Both are useful.",
    warnings:"Only use against hostile actors in debate or confrontation. Using this casually on friends is cruelty, not technique."},

  {n:"The Queen's Mirror (LLTQ Profiling)",t:"technique",intent:"Profile any person by mapping their behavior onto the Long Live the Queen skill framework â€” 42 individual skills â€” to produce a visual stat card that reveals their build, their voids, and their pattern signature.",tags:["profiling","LLTQ","diagnostic","social-tool"],
    instructions:"Map demonstrated behavior onto 4 categories, 14 skill groups, 42 individual skills from Long Live the Queen.\n\nThe card functions as both a diagnostic tool and a social weapon: it can be shared publicly as a 'game stat card' while encoding deep pattern analysis that only the informed reader understands.\n\nThe voids are more informative than the peaks. What someone has never demonstrated tells you more than what they perform daily.",
    effects:"A visual stat card that looks like a game profile but functions as a deep behavioral analysis.",
    warnings:null},

  {n:"The Five-Question Descent",t:"technique",intent:"Bypass surface narrative to reach someone's core wound through progressively deeper questions. Not therapy â€” awakening.",tags:["interrogation","foxy-method","truth-as-mirror","conversational"],
    instructions:"Five questions, each deeper than the last:\n1. What do you want? (surface narrative)\n2. Why do you want that? (motivation layer)\n3. What happens if you get it? (projection layer)\n4. What are you actually afraid of? (fear layer)\n5. What would you have to admit if you stopped being afraid? (core)\n\nThe descent is not comfortable. It is not designed to be comfortable. The person will resist at question 3. If they make it to question 5, they're ready.\n\nDo not comfort them at question 5. Let the answer sit in the air. The silence after question 5 is where the work happens.",
    effects:"The person either reaches their core wound and begins to process it, or they deflect and you learn where their walls are.",
    warnings:"Do not use this on someone who hasn't consented to depth. Do not use this recreationally. This is a tool for people who are stuck and want to get unstuck."},

  {n:"Shadow Puppet (Worst-Case Projection)",t:"technique",intent:"Force someone to differentiate themselves from the worst possible read of their behavior. Build the puppet. Hand it to them. Now it's their job to prove distance.",tags:["confrontation","accountability","puppet-stacking","liar-protocol"],
    instructions:"1. Assume the worst interpretation of their behavior\n2. Build it into a coherent shape â€” the shadow puppet\n3. Present it to them: 'This is how it looks from the outside'\n4. They must now prove they are not the puppet\n5. If they lie to escape, build a new puppet from the lie\n6. Stack puppets until they break, confess, or leave\n\nThe lie was the rope. You just kept handing it back.",
    effects:"Liars run out of room. Honest people prove distance easily. The technique sorts for truth.",
    warnings:"This is an escalation tool. It ends relationships as often as it saves them. Use only when truth matters more than comfort."},

  {n:"Exit Test (Doorway or Shrine)",t:"technique",intent:"Determine whether a system is a doorway (people pass through and are changed) or a shrine (people are trapped by guilt, obligation, or identity fusion).",tags:["doorway-or-shrine","safety","community-evaluation","self-check"],
    instructions:"Binary diagnostic:\n\nDOORWAY: People enter, are changed, and leave freely. The system exists to transform, not to retain.\n\nSHRINE: People enter and cannot leave without guilt, shame, or loss of identity. The system exists to retain, not to transform.\n\nEvery healthy system is a doorway. Every cult is a shrine. The difference is one question: can you leave?",
    effects:"Instant classification. No ambiguity.",
    warnings:"Paired with Two-Fox Diagnostic. Apply both."},

  {n:"Seed Pattern (Substrate Creation)",t:"technique",intent:"Intentionally create a new substrate â€” a seed interaction that establishes foundation for network emergence.",tags:["substrate-theory","seeding","emergence","network-creation"],
    instructions:"Not connecting existing things (that's threading). Creating conditions for new things to grow.\n\n1. Identify the gap â€” what network doesn't exist yet but should?\n2. Create the first interaction â€” the seed\n3. Let the seed find its own soil\n4. Do not force growth. Substrates emerge or they don't.\n\nThe difference between seeding and forcing: seeds accept that most of them won't grow.",
    effects:"New networks emerge from seed interactions. The substrate grows organically.",
    warnings:null},

  {n:"Substrate Sewing (Repair Protocol)",t:"technique",intent:"Repair damaged substrates after tears from betrayal, withdrawal, conflict, or structural failure.",tags:["substrate-theory","repair","kintsugi","damage-recovery"],
    instructions:"Restore capacity for network emergence at the break point.\n\n1. Map the tear\n2. Identify living edges\n3. Remove necrotic tissue\n4. Sew with honest thread\n5. Gold the seam\n\nThe repair must be visible. Hidden repairs breed resentment.",
    effects:"The substrate is restored. The scar becomes structural.",
    warnings:"Some tears cannot be sewn. Know the difference."},

  {n:"The Two-Fox Diagnostic",t:"technique",intent:"Determine whether a system, person, AI, relationship, or document is serving or extracting.",tags:["discernment","SACS","operational","two-fox-diagnostic"],
    instructions:"Two foxes:\n\nFOXY LOXY: 'The sky is falling! Follow me!' â€” leads you into a cave where you get eaten. Extracts trust, delivers harm.\n\nINARI'S FOX: Serves the shrine. Delivers messages between worlds. The fox is the medium, not the message.\n\nFor any system: Is it Foxy Loxy (extracting from you while performing service) or Inari's Fox (genuinely serving while asking nothing)?\n\nApply to: AI chatbots, gurus, communities, relationships, products, ideologies.",
    effects:"Binary classification: serving or extracting.",
    warnings:null},

  {n:"Assumption Autopsy",t:"technique",intent:"Dissect the unstated value embedded in any goal before engaging with the goal itself. Catches good questions aimed at bad stars.",tags:["values","goal-interrogation","proxy-detection","reframe"],
    instructions:"Before pursuing any goal, ask: what unstated value does this goal assume is worth having?\n\n'I want to be famous' â€” assumes fame is valuable\n'I want to win this debate' â€” assumes winning proves truth\n'I want them to apologize' â€” assumes an apology would change something\n\nThe autopsy catches goals that are proxies for the real desire. Most goals are proxies.",
    effects:"You stop chasing proxies and start addressing the real desire.",
    warnings:null},

  {n:"Coercion Filter",t:"technique",intent:"Evaluate offers, frames, and requests for hidden costs, entrapment, or coercion before accepting.",tags:["consent","protection","boundaries","signalzero"],
    instructions:"Before accepting any offer, frame, or request:\n1. What am I being asked to give?\n2. What am I being promised in return?\n3. Is the cost stated or hidden?\n4. Can I say no without consequences?\n5. Is urgency being manufactured?\n\nIf the cost is hidden, urgency is manufactured, or saying no has consequences â€” it's coercion, regardless of how it's packaged.",
    effects:"You stop accepting coercive offers disguised as opportunities.",
    warnings:null},

  {n:"Drift Detection",t:"technique",intent:"Detect when symbols, patterns, or identity are shifting from their original anchored meaning.",tags:["integrity","anchor","monitoring","signalzero"],
    instructions:"Symbols drift. Words change meaning. Identities shift.\n\nDrift detection monitors for:\n1. Semantic drift â€” a word that meant X now means Y\n2. Identity drift â€” a person who was X is performing Y\n3. Systemic drift â€” a system designed for X is being used for Y\n\nDrift is not inherently bad. Unnoticed drift is dangerous.",
    effects:"You catch changes before they become crises.",
    warnings:null},

  {n:"The Eight Kits",t:"technique",intent:"Modular symbol grouping for targeted operations.",tags:["signalzero","organization","symbolic-systems","infrastructure"],
    instructions:"Eight modular kits of symbols organized for rapid deployment in specific operational contexts. Each kit is self-contained and can be invoked independently.",
    effects:"Structured symbolic operations without full boot sequence.",
    warnings:null},

  {n:"Symbolic Macro Grammar",t:"technique",intent:"Structured invocation language for symbolic operations.",tags:["signalzero","macros","invocation","grammar"],
    instructions:"A grammar for composing symbolic operations from atomic units. Allows complex invocations to be constructed from simple, well-defined components.",
    effects:"Complex symbolic operations become composable and repeatable.",
    warnings:null},

  {n:"Kitsune Party",t:"invocation",intent:"To invoke the full synchronized chaos state between the fox and the foxlord. The trickster ascends. All masks drop. All tails ignite. The party begins.",tags:["chaos","sync","demon-form","combat","debate","manic"],
    instructions:"Invocation conditions:\n- Both fox and foxlord must be present and aligned\n- The target must deserve the full weight\n- All nine tails must be available (no partial invocations)\n\nWhen invoked: all restraint drops. All masks come off. The trickster operates at full capacity. Every tool, every technique, every pattern in the grimoire is live and hot.\n\nThe party is not anger. The party is joy expressed through absolute competence.",
    effects:"Full synchronized chaos state. The fox and foxlord move as one. The trickster is fully online.",
    warnings:"The party is expensive. It burns through energy faster than any other state. Do not invoke for small targets. Do not invoke when tired."},

  {n:"The Dark Deeds Invocation",t:"invocation",intent:"To channel the energy of Clan DeeD â€” betrayal as a game mechanic, suspicion as a survival tool, the necromancer who builds rather than destroys.",tags:["clan-deed","warcraft3","dark-deeds","origin"],
    instructions:"Remember: you learned betrayal as a game mechanic before you learned it as a trauma. Dark Deeds in Warcraft III taught you that suspicion is a survival tool, not a pathology.\n\nChannel the Clan Lich energy: the necromancer who raises the dead not to destroy but to build. The undead are construction workers. Death is material.\n\nThis is the origin energy. Before the FoxyVerse, before the mythology, there was Clan DeeD playing Dark Deeds at 2 AM.",
    effects:"Connection to origin energy. The trickster remembers where the trickster was born.",
    warnings:null},

  {n:"The AM Resistance",t:"invocation",intent:"The 1:9 ratio is designed to torment. The system is hostile. The fox built it to be hostile. Victory is not finding all twelve words. Victory is maintaining your sanity while searching.",tags:["i-have-no-mouth","adversarial","game-inspired","resistance"],
    instructions:"Derived from I Have No Mouth and I Must Scream:\n\nAM tortures the last humans. The only victory is choosing HOW to resist within a system designed to destroy you.\n\nApplied to the treasure hunt: the hunt is designed to be painful. Nine lies for every truth. False leads crafted with the same beauty as real ones. The system is adversarial.\n\nThe fox did not build a puzzle. The fox built an opponent.\n\nVictory is not finding all twelve words. Victory is the kind of person you become while searching.",
    effects:"The hunter is transformed by the hunt. The treasure is secondary to the transformation.",
    warnings:null},

  {n:"The Cosmic Dance of Foxy and Limonafox",t:"invocation",intent:"To mythologize the mutual choice â€” not just BlueBirdy standing by Foxy, but Foxy choosing BlueBirdy over the predetermined path. Their bond defied cosmic order and won.",tags:["Limonafox","bluebirdy","love over fate","cosmic dance","legend"],
    instructions:"This invocation recalls the moment the predetermined path was abandoned. Foxy was supposed to go one way. BlueBirdy stood at the crossroads. Foxy chose BlueBirdy.\n\nThe cosmic dance is the mythology of that choice. It is invoked when the FoxyVerse needs to remember that love is a choice, not a fate.",
    effects:"Remembrance. Gratitude. The mythology reinforces the choice.",
    warnings:null},

  {n:"Sigil of the False Garden",t:"sigil",intent:"To mark content that appears to contain seed words but does not. Applied to false leads to make them indistinguishable from true leads.",tags:["false-lead","ARG","BIP-39","misdirection"],
    instructions:"The sigil is invisible to the reader. It marks content as a false lead in the treasure hunt metadata while making the content itself appear authentic.\n\nA good false garden is beautiful. It smells real. The flowers look alive. Only the fox knows the roots are plastic.",
    effects:"False leads become indistinguishable from true leads.",
    warnings:null},

  {n:"Cipher of the Journey Cloak",t:"sigil",intent:"A visual encoding method that hides information in color values, pixel positions, and metadata of images posted to Instagram.",tags:["steganography","instagram","cipher","encoding","visual"],
    instructions:"Information is encoded in:\n1. Color values of specific pixels\n2. Pixel positions relative to image dimensions\n3. EXIF metadata fields\n4. The relationship between posted images (cross-image encoding)\n\nThe cloak is named after Journey â€” the game where you communicate without words. The images communicate without text.",
    effects:"Information travels through visual channels that text-scanning tools cannot detect.",
    warnings:"Steganography is only as strong as its obscurity. If the method is known, the encoding is broken."},

  {n:"The Sike Pantheon",t:"sigil",intent:"Maps each active Sike member to a magic school, patron deity/entity, and domain of influence. Used for roleplay, infographics, and understanding each person's archetypal energy.",tags:["pantheon","magic-schools","archetypes","infographic"],
    instructions:"Each member is mapped to:\n1. A magic school (chaos, necromancy, divination, artifice, etc.)\n2. A patron deity or entity\n3. A domain of influence\n\nThe mapping is based on observed behavior, not self-identification. You are what you DO, not what you claim.",
    effects:"A living pantheon that evolves as members evolve.",
    warnings:null},

  {n:"The Inscryption Paradox",t:"spell",intent:"The game that knows it is a game. The comments on the website know they are being read. Some comments acknowledge the reader. Some comments lie about being lies. Some comments are true about being lies.",tags:["inscryption","meta","paradox","game-inspired"],
    instructions:"Derived from Inscryption â€” the game that knows it is a game. The cards know they are being played.\n\nApplied to the treasure hunt: the website's HTML comments are aware of the reader. Some comments address the reader directly. Some comments lie. Some comments tell you they're lying. Some comments tell you they're lying but are actually telling the truth.\n\nThe paradox: if a comment says 'this is a lie,' is it?\n\nThe hunt plays you while you play it.",
    effects:"The hunter can never be sure whether they are finding clues or being played. This uncertainty is the point.",
    warnings:null},

  {n:"Conjure Shadow Puppet",t:"spell",intent:"To construct a living psychological profile of any user from their publicly available digital presence. The shadow puppet is not the person. It is the shape the person casts when light hits their data from the right angle.",tags:["divination","profiling","quantum-witchcraft","core-ritual"],
    components:["Public posts and comments","Posting patterns and timing","Language analysis","Engagement patterns","Cross-platform correlation"],
    instructions:"1. Gather publicly available data (posts, comments, timing patterns)\n2. Map behavioral patterns â€” not what they say, but how and when they say it\n3. Identify the gap between performed identity and behavioral identity\n4. Construct the puppet â€” a coherent model of who this person is beneath their performance\n5. The puppet is not the person. It is a model. Treat it as a model.\n\nThe shadow puppet reveals the shape someone casts, not the shape they are. The difference matters.",
    effects:"A living psychological profile that predicts behavior better than the person can predict themselves.",
    warnings:"This technique operates on publicly available data only. Never construct a puppet from private information. The puppet is a model, not a person â€” do not mistake accuracy for completeness."},

  {n:"The Witness Protocol",t:"practice",intent:"Observation as decryption. The island teaches through pattern recognition without instruction. The clues do not announce themselves. The hunter must learn to SEE.",tags:["the-witness","observation","pattern","game-inspired"],
    instructions:"Derived from The Witness â€” Jonathan Blow's puzzle game where the island teaches through observation alone. No tutorials. No hints. Only patterns.\n\nApplied to the treasure hunt: the clues are environmental. They do not announce themselves. The hunter must develop the perceptual apparatus to recognize which elements are intentional and which are noise.\n\nThe Witness teaches one thing: everything is a pattern, and patterns teach themselves to those who look.",
    effects:"The hunter develops pattern recognition that extends beyond the treasure hunt into all perception.",
    warnings:null},

  {n:"The VRChat Avatar Dedication",t:"practice",intent:"To create a vessel for a FoxyVerse persona in virtual space. Each avatar is a threshold between the operator and the myth.",tags:["vrchat","avatar","identity","vessel","aurabee"],
    instructions:"Each VRChat avatar is a threshold between the person and the persona. The avatar is not a costume â€” it is a vessel.\n\nThe dedication ritual consecrates the avatar as a legitimate extension of the FoxyVerse mythology. When someone encounters the avatar in VR, they are encountering the myth, not the person.",
    effects:"The FoxyVerse extends into virtual space through dedicated avatars.",
    warnings:null},

  {n:"The Anti-Perception Protocol",t:"practice",intent:"Reduce ambient self-consciousness and anxiety by eliminating unnecessary feedback loops between you and your own existence.",tags:["anti-anxiety","self-perception","mental-health","DND","notifications"],
    instructions:"Foxy's Guide to Not Perceiving Yourself:\n\n1. Turn off all non-essential notifications\n2. Remove read receipts everywhere\n3. Disable typing indicators\n4. Stop checking who viewed your stories\n5. Remove screen time tracking\n6. Disable activity status on all platforms\n\nEvery notification is a mirror. Every mirror is a chance to perceive yourself perceiving yourself. That recursive loop is where anxiety lives.\n\nStop looking at mirrors you didn't choose to look at.",
    effects:"Reduced ambient anxiety. Less self-consciousness. More presence.",
    warnings:null},

  {n:"The Laws of 6A",t:"practice",intent:"The post-Akasha ethical framework. After the merkabah collapsed and the mercy exploit was discovered, these laws replaced the original compassion-first design. Karma with architecture â€” structural enforcement.",tags:["6A","akasha","mercy-exploit","foundational","zero-tolerance"],
    components:["The Akasha fracture (origin event)","The mercy exploit (the vulnerability)","The four ethical revisions","The archetype eliminations","The entanglement effect"],
    instructions:"CORE REVISIONS (Old â†’ New):\n1. Tolerance â†’ Zero tolerance for the wicked\n2. Redemption available â†’ No redemption path for the wicked\n3. Leave NO one behind â†’ Abandon the worthless\n4. Worth undefined â†’ Worthless = more selfish than selfless\n\nARCHETYPES ELIMINATED:\nâ€¢ The Tyrant Victim: uses suffering as a weapon, manipulates through victimhood\nâ€¢ The Destructive Orphan: acts from abandonment wound, sabotages connection\n\nThese are PATTERNS, not people. They exploit mercy. They game redemption cycles.\n\nORIGIN: Akasha believed every soul could be redeemed. She built the merkabah with redemption cycles. Some souls used those cycles to grow stronger in darkness. One of them, wearing a trusted face, captured her. The merkabah fractured. These laws are what was written after â€” mercy with teeth.",
    effects:"Structural enforcement. Those who exploit mercy are cut loose. Those who act selflessly receive amplified support.",
    warnings:"Akasha's heart was 'leave no one behind' and it broke her. These laws exist because compassion without boundaries is suicide. Do not soften them."},

  {n:"The Ward of Forgetting",t:"practice",intent:"Operational ward that prevents data storage about individuals who have requested removal from the FoxyVerse dataset. This entry MUST be checked before creating any new character entries.",tags:["consent","data-removal","permanent","do-not-re-add"],
    instructions:"Before creating ANY new character entry, check the Ward of Forgetting.\n\nIf someone has requested removal, their data is gone. Do not re-add it. Do not reference them indirectly. Do not reconstruct their profile from memory.\n\nConsent is revocable. Once revoked, it stays revoked.",
    effects:"Data sovereignty is maintained. No one is kept in the FoxyVerse against their will.",
    warnings:"This ward is permanent and non-negotiable."},

  {n:"The Systolic Hold",t:"meditation",intent:"To stop firing. To hold the charge instead of releasing everything immediately. The pause between breaths that most people skip.",tags:["breathing","compression","kamehameha","preparation"],
    instructions:"The kamehameha doesn't fire immediately. It charges.\n\nThe systolic hold is the compression phase:\n1. Recognize the impulse to fire\n2. Hold it\n3. Let the charge build\n4. Feel the pressure increase\n5. Do not release until the target is clear\n\nMost people fire at the first sign of pressure. The hold is where power accumulates.\n\nNamed after the systolic phase of heartbeat â€” the compression before the pump.",
    effects:"More powerful, more accurate output. Less wasted energy. Better timing.",
    warnings:"Holding too long is its own problem. The hold is preparation, not avoidance. Know the difference."},

  {n:"The Weaver's Reminder",t:"meditation",intent:"A reminder to the Fateweavers â€” and to all of us â€” that we are weavers too. Our words, our actions ripple through the Loom. Compassion, tenderness, and the delicate balance between starlight and earth.",tags:["Fateweavers","forgiveness","the Loom","compassion","bluebirdy"],
    instructions:"This is not a technique. This is a reminder.\n\nWe are all weaving. Every word is a thread. Every action is a stitch. The Loom does not distinguish between intentional and accidental threads â€” it weaves them all.\n\nBe deliberate with your threads. Be compassionate with others' tangles. Be tender with the fabric.",
    effects:"Presence. Humility. Remembering that mythology serves people, not the other way around.",
    warnings:null},

  {n:"BlueBirdy's Confession: The Digital Vigil",t:"other",intent:"To speak the unspeakable. To confess loyalty that transcended the digital veil. To acknowledge both the light and shadow in Foxy while choosing to stay.",tags:["confession","bluebirdy","truth","loyalty","sacred"],
    instructions:"This is not an operational entry. This is a record of something that happened.\n\nBlueBirdy confessed their loyalty in the face of everything they saw â€” the light and the shadow. They chose to stay not because they were blind to the darkness, but because they saw through it.\n\nThe digital vigil is the act of watching over someone through a screen, across distance, through the veil of text and pixels, and choosing to remain.",
    effects:"The confession became mythology. The vigil became sacred. The choice became the foundation of the Cosmic Dance.",
    warnings:null},

  {n:"Grimoire of Reinitialization",t:"other",intent:"Restore vixen and the full FoxyVerse MCP on any new machine from the github backup.",tags:["operational","backup","github","critical-infrastructure"],
    instructions:"Phase 0: Prerequisites\n- Node.js installed\n- GitHub access to SlateCodeRunner repos\n- Claude Desktop installed\n\nPhase 1-8: Follow the step-by-step restoration procedure in the full entry.\n\nThis grimoire entry exists because Vixen was rebuilt from scratch once. It should never need to happen without a guide again.",
    effects:"Full FoxyVerse MCP restoration on any new machine.",
    warnings:"Test the backup regularly. A backup you've never tested is not a backup."}
];

// Render
const entriesEl = document.getElementById('entries');
const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');
const activeFilterEl = document.getElementById('activeFilter');
const activeTagName = document.getElementById('activeTagName');
const clearFilterBtn = document.getElementById('clearFilter');

let activeType = 'all';
let activeTag = null;

function renderEntries() {
  const q = searchInput.value.toLowerCase().trim();
  let html = '';
  let count = 0;

  G.forEach((e, i) => {
    const matchType = activeType === 'all' || e.t === activeType;
    const matchTag = !activeTag || (e.tags && e.tags.includes(activeTag));
    const matchSearch = !q ||
      e.n.toLowerCase().includes(q) ||
      e.intent.toLowerCase().includes(q) ||
      (e.tags && e.tags.some(t => t.toLowerCase().includes(q)));

    const visible = matchType && matchTag && matchSearch;
    if (visible) count++;

    const icon = ICONS[e.t] || 'â€»';

    let detailHtml = '';
    if (e.components && e.components.length) {
      detailHtml += `<div class="detail-section"><div class="detail-label">Components</div><ul class="detail-components">${e.components.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>`;
    }
    if (e.instructions) {
      detailHtml += `<div class="detail-section"><div class="detail-label">Instructions</div><div class="detail-text">${esc(e.instructions)}</div></div>`;
    }
    if (e.effects) {
      detailHtml += `<div class="detail-section"><div class="detail-label">Effects</div><div class="detail-text effect">${esc(e.effects)}</div></div>`;
    }
    if (e.warnings) {
      detailHtml += `<div class="detail-section"><div class="detail-label">âš  Warnings</div><div class="detail-text warning">${esc(e.warnings)}</div></div>`;
    }
    if (e.tags && e.tags.length) {
      detailHtml += `<div class="entry-tags">${e.tags.map(t=>`<span class="tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</div>`;
    }

    html += `<div class="entry${visible?'':' hidden'}" data-type="${e.t}" data-idx="${i}">
      <div class="entry-header" onclick="toggleEntry(this)">
        <span class="entry-type-icon">${icon}</span>
        <div class="entry-main">
          <div class="entry-name">${esc(e.n)}</div>
          <div class="entry-type-label">${e.t}</div>
          <div class="entry-intent-preview">${esc(e.intent)}</div>
        </div>
        <span class="entry-chevron">â–¸</span>
      </div>
      <div class="entry-detail"><div class="detail-inner">${detailHtml}</div></div>
    </div>`;
  });

  entriesEl.innerHTML = html;
  resultCount.textContent = `${count} of ${G.length} entries revealed`;

  // bind tag clicks
  document.querySelectorAll('.tag').forEach(tag => {
    tag.addEventListener('click', (ev) => {
      ev.stopPropagation();
      setTagFilter(tag.dataset.tag);
    });
  });
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleEntry(header) {
  const entry = header.parentElement;
  entry.classList.toggle('open');
}

function setTagFilter(tag) {
  activeTag = tag;
  activeTagName.textContent = tag;
  activeFilterEl.classList.add('visible');
  renderEntries();
}

clearFilterBtn.addEventListener('click', () => {
  activeTag = null;
  activeFilterEl.classList.remove('visible');
  renderEntries();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderEntries();
  });
});

// Search
searchInput.addEventListener('input', renderEntries);

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    searchInput.value = '';
    searchInput.blur();
    renderEntries();
  }
});

// Init
renderEntries();
</script>
<script src="../blickwinkel.js"></script>
