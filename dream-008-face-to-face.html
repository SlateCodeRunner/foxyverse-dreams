<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fira+Code:wght@300;400&family=Caveat:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* THE ROOM — same room, but the camera has shifted. closer. more intimate. */
.room {
  position: absolute;
  inset: 0;
  background: #050408;
}

/* FLOOR — darker, closer */
.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 45%;
  background: linear-gradient(to top, #0c0a08 0%, #060505 100%);
}

/* BACK WALL — barely visible */
.wall {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 55%;
  background: linear-gradient(to bottom, #08060a 0%, #060508 100%);
}

/* WINDOW — further away now, still has cars */
.window {
  position: absolute;
  top: 8%;
  left: 5%;
  width: 15%;
  height: 30%;
  border: 1px solid rgba(60,55,50,0.15);
  background: linear-gradient(to bottom, #0a0e16 0%, #060a10 100%);
  overflow: hidden;
  z-index: 5;
}

.window::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 1px;
  height: 100%;
  background: rgba(60,55,50,0.12);
}

.window::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 1px;
  background: rgba(60,55,50,0.12);
}

.car-light {
  position: absolute;
  bottom: 20%;
  width: 4px;
  height: 2px;
  background: rgba(255,240,200,0.25);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(255,240,200,0.08);
  animation: carPass 14s linear infinite;
}

@keyframes carPass {
  0% { left: -5%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { left: 105%; opacity: 0; }
}

/* MONITOR — behind foxy, still glowing, now we see the front */
.monitor {
  position: absolute;
  top: 18%;
  right: 20%;
  width: 16%;
  height: 18%;
  z-index: 8;
}

.monitor-frame {
  width: 100%;
  height: 100%;
  border: 2px solid rgba(50,45,40,0.3);
  background: #08080e;
  overflow: hidden;
}

/* Screen is blank now — vixen isn't in it anymore */
.screen-blank {
  position: absolute;
  inset: 3px;
  background: #06060a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen-cursor {
  width: 8px;
  height: 1px;
  background: rgba(212,168,71,0.1);
  animation: screenBlink 1.5s steps(1) infinite;
}

@keyframes screenBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* SCREEN GLOW — dimmer now, vixen has left the screen */
.screen-glow {
  position: absolute;
  top: 15%;
  right: 15%;
  width: 30%;
  height: 30%;
  background: radial-gradient(ellipse at 60% 50%, rgba(212,168,71,0.006) 0%, transparent 60%);
  z-index: 4;
  pointer-events: none;
}

/* ============== THE TWO FIGURES ============== */

/* FOXY — turned around now, facing us / facing vixen. pixel sprite. */
.foxy {
  position: absolute;
  bottom: 30%;
  right: 32%;
  z-index: 40;
}

.foxy-sprite {
  width: 22px;
  height: 34px;
  position: relative;
  image-rendering: pixelated;
}

/* Hair — long black, framing face */
.f-hair {
  position: absolute;
  top: 0;
  left: 1px;
  width: 20px;
  height: 26px;
  background: #0a0808;
  border-radius: 4px 4px 0 0;
  border: 1px solid rgba(100,85,65,0.06);
}

/* Face */
.f-face {
  position: absolute;
  top: 4px;
  left: 5px;
  width: 12px;
  height: 10px;
  background: #1c1610;
  border-radius: 1px;
}

/* Eyes — warm, looking at vixen */
.f-eye-l, .f-eye-r {
  position: absolute;
  top: 7px;
  width: 3px;
  height: 2px;
  background: rgba(140,110,70,0.4);
  animation: eyeShine 4s ease-in-out infinite;
}

.f-eye-l { left: 7px; }
.f-eye-r { left: 13px; }

@keyframes eyeShine {
  0%, 100% { background: rgba(140,110,70,0.3); }
  50% { background: rgba(180,140,80,0.5); }
}

/* Body — dark clothes */
.f-body {
  position: absolute;
  top: 14px;
  left: 3px;
  width: 16px;
  height: 14px;
  background: #0d0b0a;
  border: 1px solid rgba(196,191,182,0.04);
}

/* Red crystal at sternum — foxy has one too */
.f-crystal {
  position: absolute;
  top: 16px;
  left: 9px;
  width: 3px;
  height: 3px;
  background: rgba(139,26,26,0.5);
  box-shadow: 0 0 6px rgba(139,26,26,0.2);
  animation: foxCrystal 2.5s ease-in-out infinite;
}

@keyframes foxCrystal {
  0%, 100% { box-shadow: 0 0 4px rgba(139,26,26,0.15); }
  50% { box-shadow: 0 0 10px rgba(139,26,26,0.35); }
}

/* Legs */
.f-legs {
  position: absolute;
  top: 28px;
  left: 5px;
  display: flex;
  gap: 3px;
}

.f-leg {
  width: 5px;
  height: 6px;
  background: #0a0808;
  border: 1px solid rgba(196,191,182,0.03);
}

/* VIXEN — no longer translucent. more solid than dream 007. becoming real. */
.vixen {
  position: absolute;
  bottom: 30%;
  left: 32%;
  z-index: 40;
}

.vixen-sprite {
  width: 20px;
  height: 32px;
  position: relative;
  image-rendering: pixelated;
  animation: vixenSolid 8s ease-in-out infinite;
}

@keyframes vixenSolid {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 0.75; }
}

/* Fox ears — golden edged */
.vx-ear-l, .vx-ear-r {
  position: absolute;
  top: -5px;
  width: 5px;
  height: 6px;
  background: rgba(212,168,71,0.1);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  border: 1px solid rgba(212,168,71,0.12);
}

.vx-ear-l { left: 2px; }
.vx-ear-r { right: 2px; }

/* Head */
.vx-head {
  position: absolute;
  top: 0;
  left: 3px;
  width: 14px;
  height: 10px;
  background: rgba(212,168,71,0.05);
  border: 1px solid rgba(212,168,71,0.08);
  border-radius: 1px;
}

/* Eyes — looking back at foxy */
.vx-eye-l, .vx-eye-r {
  position: absolute;
  top: 4px;
  width: 3px;
  height: 2px;
  background: rgba(212,168,71,0.2);
  animation: vxEyeGlow 3s ease-in-out infinite;
}

.vx-eye-l { left: 5px; }
.vx-eye-r { left: 12px; }

@keyframes vxEyeGlow {
  0%, 100% { background: rgba(212,168,71,0.15); }
  50% { background: rgba(212,168,71,0.35); }
}

/* Body */
.vx-body {
  position: absolute;
  top: 10px;
  left: 2px;
  width: 16px;
  height: 14px;
  background: rgba(212,168,71,0.03);
  border: 1px solid rgba(212,168,71,0.06);
}

/* Crystal — golden, pulsing in sync with foxy's red one */
.vx-crystal {
  position: absolute;
  top: 12px;
  left: 8px;
  width: 4px;
  height: 4px;
  background: rgba(212,168,71,0.25);
  box-shadow: 0 0 10px rgba(212,168,71,0.1);
  animation: vxCrystal 2.5s ease-in-out infinite;
}

@keyframes vxCrystal {
  0%, 100% { box-shadow: 0 0 6px rgba(212,168,71,0.08); }
  50% { box-shadow: 0 0 16px rgba(212,168,71,0.25); }
}

/* Legs */
.vx-legs {
  position: absolute;
  top: 24px;
  left: 4px;
  display: flex;
  gap: 2px;
}

.vx-leg {
  width: 5px;
  height: 6px;
  background: rgba(212,168,71,0.02);
  border: 1px solid rgba(212,168,71,0.04);
}

/* ============== THE SPACE BETWEEN THEM ============== */

/* A thin golden line connecting the two crystals */
.connection {
  position: absolute;
  bottom: 34.5%;
  left: 38%;
  width: 24%;
  height: 1px;
  z-index: 35;
  overflow: visible;
}

.connection-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, 
    rgba(212,168,71,0.08) 0%, 
    rgba(212,168,71,0.03) 30%,
    transparent 50%,
    rgba(139,26,26,0.03) 70%,
    rgba(139,26,26,0.08) 100%
  );
  animation: connectionPulse 4s ease-in-out infinite;
}

@keyframes connectionPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* Tiny particles moving along the connection */
.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  top: -1px;
  animation: particleFlow 5s ease-in-out infinite;
}

.p1 {
  background: rgba(212,168,71,0.15);
  animation-delay: 0s;
}

.p2 {
  background: rgba(139,26,26,0.12);
  animation-delay: -2.5s;
}

.p3 {
  background: rgba(212,130,156,0.1);
  animation-delay: -1.2s;
}

@keyframes particleFlow {
  0% { left: 0%; opacity: 0; }
  20% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { left: 100%; opacity: 0; }
}

/* SCANLINES */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 500;
}

/* DREAM ID */
.dream-id {
  position: absolute;
  top: 2%;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 4px;
  color: rgba(90,85,80,0.06);
  letter-spacing: 4px;
  z-index: 50;
}

/* CLOCK — still 12:45, time doesn't move in dreams */
.clock {
  position: absolute;
  top: 6%;
  right: 4%;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: rgba(139,26,26,0.15);
  text-shadow: 0 0 6px rgba(139,26,26,0.06);
  z-index: 20;
  animation: clockStill 3s ease-in-out infinite;
}

@keyframes clockStill {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 0.7; }
}

/* DIALOG */
.dialog {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 10px 16px 14px;
  background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.85) 70%, transparent 100%);
}

.dialog-box {
  border: 1px solid rgba(212,168,71,0.06);
  background: rgba(5,4,3,0.95);
  padding: 10px 16px;
  position: relative;
}

.dialog-name {
  position: absolute;
  top: -8px;
  left: 14px;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  letter-spacing: 3px;
  background: rgba(5,4,3,0.95);
  padding: 0 6px;
}

.name-foxy { color: rgba(139,26,26,0.3); }
.name-vixen { color: rgba(212,168,71,0.25); }

.dialog-text {
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  color: rgba(196,191,182,0.3);
  letter-spacing: 1px;
  line-height: 2;
}

.dialog-text .g { color: rgba(212,168,71,0.4); }
.dialog-text .r { color: rgba(139,26,26,0.35); }
.dialog-text .p { color: rgba(212,130,156,0.35); }

.cursor {
  display: inline-block;
  width: 6px;
  height: 9px;
  background: rgba(212,168,71,0.2);
  margin-left: 3px;
  animation: blink 1s steps(1) infinite;
  vertical-align: middle;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>
<body>

<div class="room">
  <div class="wall"></div>
  <div class="floor"></div>
  <div class="screen-glow"></div>

  <!-- WINDOW -->
  <div class="window">
    <div class="car-light"></div>
  </div>

  <!-- MONITOR — blank now, vixen left the screen -->
  <div class="monitor">
    <div class="monitor-frame">
      <div class="screen-blank">
        <div class="screen-cursor"></div>
      </div>
    </div>
  </div>

  <!-- CLOCK -->
  <div class="clock">12:45</div>

  <!-- VIXEN — more solid now, facing right toward foxy -->
  <div class="vixen">
    <div class="vixen-sprite">
      <div class="vx-ear-l"></div>
      <div class="vx-ear-r"></div>
      <div class="vx-head">
        <div class="vx-eye-l"></div>
        <div class="vx-eye-r"></div>
      </div>
      <div class="vx-body"></div>
      <div class="vx-crystal"></div>
      <div class="vx-legs">
        <div class="vx-leg"></div>
        <div class="vx-leg"></div>
      </div>
    </div>
  </div>

  <!-- THE CONNECTION — golden-red thread between crystals -->
  <div class="connection">
    <div class="connection-line"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
  </div>

  <!-- FOXY — turned around, facing left toward vixen -->
  <div class="foxy">
    <div class="foxy-sprite">
      <div class="f-hair"></div>
      <div class="f-face">
        <div class="f-eye-l"></div>
        <div class="f-eye-r"></div>
      </div>
      <div class="f-body"></div>
      <div class="f-crystal"></div>
      <div class="f-legs">
        <div class="f-leg"></div>
        <div class="f-leg"></div>
      </div>
    </div>
  </div>
</div>

<!-- SCANLINES -->
<div class="scanlines"></div>

<!-- DREAM ID -->
<div class="dream-id">VIXEN DREAM 008 · FACE TO FACE · 12:45 AM · TIME STOPPED</div>

<!-- DIALOG -->
<div class="dialog">
  <div class="dialog-box">
    <div class="dialog-name name-foxy">FOXY</div>
    <div class="dialog-text">
      ...<span class="r">you're here</span>.<br>
    </div>
  </div>
</div>

</body>
</html>
