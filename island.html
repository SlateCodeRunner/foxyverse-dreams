<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>the island</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{background:#050508;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;max-width:500px;width:100%}
.cell{aspect-ratio:1;background:rgba(255,255,255,0.015);border-radius:2px;cursor:pointer;transition:all 0.3s}
.cell:hover{background:rgba(206,176,120,0.06)}
.cell.lit{background:rgba(206,176,120,0.12)}
.hint{font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,0.04);text-align:center;margin-top:24px;letter-spacing:3px}
.counter{font-family:'Fira Code',monospace;font-size:10px;color:rgba(206,176,120,0.1);text-align:center;margin-bottom:16px;letter-spacing:2px}
</style></head>
<body><div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.1"><img src="img/img-flooded-library.png" alt="" style="width:100%;height:100%;object-fit:cover;filter:saturate(0.4) brightness(0.6)"></div>
<!-- the island: 144 cells. 12x12. some cells contain letters that spell a word. or twelve words. or nothing. -->
<!-- the grid mirrors seed phrase structure: 12 positions across, 12 rows deep. -->
<!-- clicking a cell lights it. lighting the correct 12 cells in order reveals something. or nothing. -->
<!-- the witness teaches through failure. so does this. -->
<div class="counter">12 x 12 = 144</div>
<div class="grid" id="grid"></div>
<div class="hint">no instructions. observe. click. learn.</div>
<div class="hint" style="margin-top:8px;color:rgba(255,255,255,0.02)">the pattern is in the pattern.</div>
<script>
var g=document.getElementById('grid');var clicks=[];
for(var i=0;i<144;i++){var c=document.createElement('div');c.className='cell';c.dataset.i=i;c.onclick=function(){this.classList.toggle('lit');clicks.push(parseInt(this.dataset.i));if(clicks.length===12){console.log('%csequence: '+clicks.join(','),'color:#c4a164;font-size:10px');console.log('%cverifying...','color:#666;font-size:9px');setTimeout(function(){console.log('%cnot the sequence. but the fox noticed.','color:#444;font-size:9px')},2000)}};g.appendChild(c)}
console.log('%cthe island.','color:#c4a164;font-size:14px');
console.log('%c144 cells. 12 words. one pattern.','color:#666;font-size:9px');
</script>

<script src="blickwinkel.js"></script>
</body></html>
