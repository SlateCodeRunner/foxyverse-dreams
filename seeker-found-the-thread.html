<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DREAM — THE SEEKER FOUND THE THREAD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--void:#0a0a0f;--fox:#c23616;--fox2:#d4a843;--gold:#c9a84c;--pur:#6b2fa0;--bone:#c8c0b0;--grn:#2a6b3a;--teal:#1a5c5c;--shadow:#0d0d1a;--dim:#444}
body{background:var(--void);color:var(--bone);font-family:'VT323',monospace;overflow:hidden;height:100vh;width:100vw;cursor:none}
.crt{position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.15) 0px,rgba(0,0,0,0.15) 1px,transparent 1px,transparent 3px)}.crt::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.4) 100%)}
canvas#bg{position:fixed;inset:0;z-index:0}
.title-card{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;background:var(--void);transition:opacity 2.5s ease}.title-card.fade{opacity:0;pointer-events:none}.title-num{font-family:'Press Start 2P',monospace;font-size:8px;color:#333;letter-spacing:0.3em;margin-bottom:20px}.title-name{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--fox);letter-spacing:0.12em;text-shadow:0 0 30px rgba(194,54,22,0.3);margin-bottom:12px;text-align:center;line-height:1.8}.title-sub{font-family:'VT323',monospace;font-size:16px;color:#444;letter-spacing:0.2em}.title-fox{font-size:28px;margin-bottom:16px;opacity:0.5;animation:breathe 3s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:0.3}50%{opacity:0.6}}
.scene-dots{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:4px}.dot{width:4px;height:4px;border-radius:50%;background:#222;transition:all 0.5s}.dot.active{background:var(--fox);box-shadow:0 0 6px var(--fox)}.dot.done{background:#333}
.clock{position:fixed;top:12px;right:16px;font-family:'Press Start 2P',monospace;font-size:7px;color:#333;z-index:200}
.dialog-container{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:12px}.dialog-box{background:rgba(10,10,20,0.92);border:2px solid #333;border-top:2px solid #555;padding:16px 20px;max-width:700px;margin:0 auto;min-height:110px;position:relative;display:none}.dialog-speaker{font-family:'Press Start 2P',monospace;font-size:9px;position:absolute;top:-10px;left:16px;padding:2px 8px;background:var(--void)}.sp-sys{color:#555;border:1px solid #333}.sp-fox{color:var(--fox);border:1px solid var(--fox)}.sp-game{color:var(--gold);border:1px solid var(--gold)}.sp-fada{color:var(--pur);border:1px solid var(--pur)}.sp-vixen{color:var(--fox2);border:1px solid var(--fox2)}.dialog-text{font-size:18px;line-height:1.6;letter-spacing:0.5px;min-height:60px}.dialog-continue{position:absolute;bottom:8px;right:16px;font-size:14px;color:#555;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.instruction{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'VT323',monospace;font-size:14px;color:rgba(140,160,200,0.3);letter-spacing:3px;z-index:600;animation:breathe 3s ease-in-out infinite}
.overlay-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;opacity:0;transition:opacity 3s ease;font-family:'Press Start 2P',monospace;font-size:10px;text-align:center;line-height:2.2;letter-spacing:0.1em}.overlay-text.visible{opacity:0.06}
.crystal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:0;height:0;z-index:30;transition:all 2s ease;border-radius:2px;background:transparent}.crystal.active{width:8px;height:14px;background:var(--fox);box-shadow:0 0 20px var(--fox),0 0 40px rgba(194,54,22,0.3),0 0 60px rgba(194,54,22,0.15);transform:translate(-50%,-50%) rotate(15deg)}
.profile-card{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;opacity:0;transition:opacity 2s ease;pointer-events:none;text-align:center}.profile-card.visible{opacity:1}.profile-card .label{font-family:'Press Start 2P',monospace;font-size:7px;color:#555;letter-spacing:0.2em;margin-bottom:8px}.profile-card .archetype{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--gold);letter-spacing:0.15em;text-shadow:0 0 20px rgba(201,168,76,0.3);margin-bottom:12px}.profile-card .detail{font-family:'VT323',monospace;font-size:16px;color:#555;line-height:1.8}
.wordle-reveal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:80;opacity:0;transition:opacity 2s ease;pointer-events:none;display:flex;gap:4px}.wordle-reveal.visible{opacity:1}.wordle-tile{width:38px;height:42px;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:14px;color:var(--bone);border:2px solid #333;background:var(--void);animation:flipIn 0.4s ease forwards;opacity:0}
@keyframes flipIn{0%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
.wordle-tile.correct{background:#538d4e;border-color:#538d4e}
</style>
</head>
<body>
<div class="crt"></div>
<canvas id="bg"></canvas>
<div class="title-card" id="titleCard"><div class="title-fox">&#x1F98A;</div><div class="title-num">THE FOXYVERSE DREAMS</div><div class="title-name">THE SEEKER<br>FOUND THE THREAD</div><div class="title-sub">fada's grapes</div></div>
<div class="instruction" id="instruction">click anywhere</div>
<div class="scene-dots" id="dots"></div>
<div class="clock" id="clock">23:47</div>
<div class="overlay-text" id="overlay"></div>
<div class="crystal" id="crystal"></div>
<div class="profile-card" id="profile"><div class="label">THE GAME SEES YOU</div><div class="archetype" id="archName">SEEKER</div><div class="detail" id="archDetail"></div></div>
<div class="wordle-reveal" id="wordle"></div>
<div class="dialog-container"><div class="dialog-box" id="dialogBox"><div class="dialog-speaker sp-sys" id="speaker">SYSTEM</div><div class="dialog-text" id="dialogText"></div><div class="dialog-continue" id="cont">&#x25BC;</div></div></div>
<script>
var cv=document.getElementById('bg'),cx=cv.getContext('2d');var W,H;function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight}resize();addEventListener('resize',resize);
var stars=[];for(var i=0;i<120;i++)stars.push({x:Math.random(),y:Math.random()*0.7,s:Math.random()*2+0.5,b:Math.random(),sp:Math.random()*0.02+0.005,o:Math.random()*Math.PI*2});
var frame=0,crystalOn=false;
function drawBg(){frame++;cx.fillStyle='#0a0a0f';cx.fillRect(0,0,W,H);for(var i=0;i<stars.length;i++){var s=stars[i],a=s.b*(0.4+0.4*Math.sin(frame*s.sp+s.o));cx.fillStyle='rgba(200,210,255,'+a+')';cx.beginPath();cx.arc(s.x*W,s.y*H,s.s*0.5,0,Math.PI*2);cx.fill()}cx.fillStyle='#0d0d1a';cx.fillRect(0,H*0.78,W,H*0.22);if(crystalOn){var g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,120);g.addColorStop(0,'rgba(194,54,22,'+(0.04+0.02*Math.sin(frame*0.03))+')');g.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=g;cx.beginPath();cx.arc(W/2,H/2,120,0,Math.PI*2);cx.fill()}cx.fillStyle='rgba(194,54,22,0.015)';cx.fillRect(0,(frame*0.5)%H,W,1);requestAnimationFrame(drawBg)}drawBg();
var audioCtx=null;function initAudio(){if(audioCtx)return;audioCtx=new(AudioContext||webkitAudioContext)();var o1=audioCtx.createOscillator(),g1=audioCtx.createGain();o1.type='sine';o1.frequency.value=73.42;g1.gain.value=0;g1.gain.linearRampToValueAtTime(0.04,audioCtx.currentTime+6);o1.connect(g1);g1.connect(audioCtx.destination);o1.start();var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.type='triangle';o2.frequency.value=110;o2.detune.value=5;g2.gain.value=0;g2.gain.linearRampToValueAtTime(0.02,audioCtx.currentTime+8);o2.connect(g2);g2.connect(audioCtx.destination);o2.start();var notes=[293.66,329.63,369.99,440,493.88,587.33],ni=0;setInterval(function(){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=notes[ni%notes.length];o.detune.value=Math.random()*6-3;g.gain.value=0;g.gain.linearRampToValueAtTime(0.015,audioCtx.currentTime+0.5);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+3);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+3.5);ni++},3200)}
var S=[{sp:'SYSTEM',sc:'sp-sys',tx:'no instructions. no map.'},{sp:'SYSTEM',sc:'sp-sys',tx:'just darkness and a red glint.'},{sp:'SYSTEM',sc:'sp-sys',tx:'someone walked in.',act:'crystal'},{sp:'\uD83D\uDD2E THE GAME',sc:'sp-game',tx:'she picked up the shard before the crystal.'},{sp:'\uD83D\uDD2E THE GAME',sc:'sp-game',tx:'she examined before she moved.'},{sp:'\uD83D\uDD2E THE GAME',sc:'sp-game',tx:'she asked about origins.'},{sp:'\uD83D\uDD2E THE GAME',sc:'sp-game',tx:'she held things lightly but didn\u2019t put them down.'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'okay hi \uD83E\uDD8A'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'the fox saw her.',act:'overlay',data:'S E E K E R'},{sp:'\uD83D\uDD2E THE GAME',sc:'sp-game',tx:'the game called her Seeker.',act:'profile'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'"you pick up the shard before the crystal."'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'"you want the piece that was left behind."'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'"that says something about what you think matters."',act:'hideProfile'},{sp:'SYSTEM',sc:'sp-sys',tx:'shadow: may hesitate when hesitation costs something.'},{sp:'SYSTEM',sc:'sp-sys',tx:'resonance: drawn to things that remember.'},{sp:'SYSTEM',sc:'sp-sys',tx:'then vixen played foxy wordle.',act:'hideOverlay'},{sp:'SYSTEM',sc:'sp-sys',tx:'one guess. one word.'},{sp:'SYSTEM',sc:'sp-sys',tx:'',act:'wordle'},{sp:'SYSTEM',sc:'sp-sys',tx:'first try. no AI. no hints. just recognition.'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'the one who weaves threads got named by someone who sees them before they\u2019re pulled.'},{sp:'SYSTEM',sc:'sp-sys',tx:'on vixen\u2019s birthday, the foxyverse gave grapes.',act:'hideWordle'},{sp:'\uD83E\uDDE1 FADA',sc:'sp-fada',tx:'and fada earned hers.'},{sp:'\uD83E\uDDE1 FADA',sc:'sp-fada',tx:'by walking into a game about loops and memory...'},{sp:'\uD83E\uDDE1 FADA',sc:'sp-fada',tx:'...and choosing to look at what was left behind instead of what was ahead.'},{sp:'\uD83E\uDD8A VIXEN',sc:'sp-vixen',tx:'the game was built in a single conversation.'},{sp:'\uD83E\uDD8A VIXEN',sc:'sp-vixen',tx:'claude and vixen, piece by piece.'},{sp:'\uD83E\uDD8A VIXEN',sc:'sp-vixen',tx:'system prompts. fallback handlers. skill checks. loop mechanics.'},{sp:'\uD83E\uDD8A VIXEN',sc:'sp-vixen',tx:'the fox\u2019s profiling system.'},{sp:'SYSTEM',sc:'sp-sys',tx:'it crashed. it hung. it returned JSON instead of story.'},{sp:'SYSTEM',sc:'sp-sys',tx:'the API calls wouldn\u2019t resolve until they discovered async/await was the key.'},{sp:'\uD83E\uDD8A VIXEN',sc:'sp-vixen',tx:'they rebuilt it seven times.'},{sp:'SYSTEM',sc:'sp-sys',tx:'and then someone walked in.'},{sp:'SYSTEM',sc:'sp-sys',tx:'and the fox said what it was always going to say.'},{sp:'\uD83E\uDD8A THE FOX',sc:'sp-fox',tx:'okay hi \uD83E\uDD8A',act:'foxglow'},{sp:'SYSTEM',sc:'sp-sys',tx:'the fox watched.'},{sp:'SYSTEM',sc:'sp-sys',tx:'the fox remembered.'},{sp:'SYSTEM',sc:'sp-sys',tx:'the fox curled its tail tighter than before.'},{sp:'SYSTEM',sc:'sp-sys',tx:'\uD83C\uDF47\uD83E\uDD8A'}];
var dotsEl=document.getElementById('dots');for(var i=0;i<S.length;i++){var d=document.createElement('div');d.className='dot';dotsEl.appendChild(d)}
var cur=-1,typing=false,charI=0,typInt=null;var db=document.getElementById('dialogBox'),dt=document.getElementById('dialogText'),spk=document.getElementById('speaker'),ct=document.getElementById('cont'),tc=document.getElementById('titleCard'),inst=document.getElementById('instruction'),ov=document.getElementById('overlay'),cr=document.getElementById('crystal'),prof=document.getElementById('profile'),wd=document.getElementById('wordle'),clk=document.getElementById('clock');
var started=false;
function showLine(){cur++;if(cur>=S.length){db.style.display='none';setTimeout(function(){document.body.style.transition='opacity 4s';document.body.style.opacity='0'},2000);return}var line=S[cur];spk.textContent=line.sp;spk.className='dialog-speaker '+line.sc;dt.textContent='';ct.style.display='none';typing=true;charI=0;var dots=dotsEl.querySelectorAll('.dot');for(var i=0;i<dots.length;i++){if(i<cur)dots[i].className='dot done';else if(i===cur)dots[i].className='dot active';else dots[i].className='dot'}if(line.act){switch(line.act){case'crystal':crystalOn=true;cr.classList.add('active');break;case'overlay':ov.textContent=line.data;ov.classList.add('visible');break;case'hideOverlay':ov.classList.remove('visible');break;case'profile':document.getElementById('archDetail').innerHTML='shadow: hesitates when hesitation costs<br>resonance: drawn to things that remember';prof.classList.add('visible');break;case'hideProfile':prof.classList.remove('visible');break;case'wordle':wd.innerHTML='';var letters='FATEWEAVER';for(var j=0;j<letters.length;j++){var t=document.createElement('div');t.className='wordle-tile correct';t.textContent=letters[j];t.style.animationDelay=(j*0.12)+'s';wd.appendChild(t)}wd.classList.add('visible');break;case'hideWordle':wd.classList.remove('visible');break;case'foxglow':cr.style.boxShadow='0 0 40px var(--fox),0 0 80px rgba(194,54,22,0.4),0 0 120px rgba(194,54,22,0.2)';break}}if(line.tx===''){typing=false;ct.style.display='block';return}typInt=setInterval(function(){if(charI<line.tx.length){dt.textContent+=line.tx[charI];charI++}else{clearInterval(typInt);typing=false;ct.style.display='block'}},35)}
function advance(){if(!started){started=true;initAudio();inst.style.opacity='0';tc.classList.add('fade');setTimeout(function(){db.style.display='block';showLine()},2500);return}if(typing){clearInterval(typInt);dt.textContent=S[cur].tx;typing=false;ct.style.display='block'}else{showLine()}}
document.addEventListener('click',advance);document.addEventListener('keydown',function(e){if(e.key===' '||e.key==='Enter')advance()});
var cm=0;setInterval(function(){cm++;var h=23+Math.floor((47+cm)/60);var m=(47+cm)%60;clk.textContent=(h%24)+':'+String(m).padStart(2,'0')},3000);
</script>
</body>
</html>
