<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:monospace;font-size:11px;padding:10px}
.scene{position:relative;width:800px;height:600px;margin:20px auto;border:2px solid #333;overflow:hidden}
.scene img{width:100%;height:100%;object-fit:cover}
.hs{position:absolute;border:2px solid rgba(255,100,0,0.7);background:rgba(255,100,0,0.15);display:flex;align-items:center;justify-content:center;font-size:9px;color:#ff6a00;text-shadow:0 0 3px #000;pointer-events:none}
.hs.exit{border-color:rgba(0,200,255,0.7);background:rgba(0,200,255,0.15);color:#0cf}
.hs.npc{border-color:rgba(0,255,100,0.7);background:rgba(0,255,100,0.15);color:#0f6}
.hs.item{border-color:rgba(255,255,0,0.7);background:rgba(255,255,0,0.15);color:#ff0}
.hs.secret{border-color:rgba(200,0,255,0.7);background:rgba(200,0,255,0.15);color:#c0f}
h2{text-align:center;color:#ff6a00;margin:30px 0 5px;font-size:14px;letter-spacing:4px}
p{text-align:center;color:#555;margin-bottom:5px}
</style></head><body>
<h1 style="text-align:center;color:#ff6a00">FOX ISLAND — HOTSPOT DEBUG</h1>
<p style="color:#666">orange=obj green=npc blue=exit yellow=item purple=secret</p>
</body></html>
