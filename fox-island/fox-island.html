<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Secret of Fox Island</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0d4c0;font-family:'VT323',monospace;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
#gc{width:800px;max-width:100vw;height:600px;max-height:100vh;display:flex;flex-direction:column;border:3px solid #2a1f3d;box-shadow:0 0 40px rgba(120,60,180,.3),inset 0 0 60px rgba(0,0,0,.5);position:relative;overflow:hidden}
#gc::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.1) 0px,rgba(0,0,0,.1) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:100}

/* VIEWPORT */
#vp{flex:1;position:relative;overflow:hidden;cursor:crosshair;min-height:0}
#scene{width:100%;height:100%;position:absolute;top:0;left:0}
#fade{position:absolute;top:0;left:0;right:0;bottom:0;background:#0a0a0f;z-index:30;opacity:0;pointer-events:none;transition:opacity .3s}
#fade.on{opacity:1}

/* BACKGROUNDS */
.bg-dock{background:url('bg/dock.jpg') center/cover no-repeat}
.bg-village{background:url('bg/village.jpg') center/cover no-repeat}
.bg-tavern{background:url('bg/tavern.jpg') center/cover no-repeat}
.bg-temple{background:url('bg/temple.jpg') center/cover no-repeat}
.bg-garden{background:url('bg/garden.jpg') center/cover no-repeat}
.bg-throne{background:url('bg/throne.jpg') center/cover no-repeat}
.bg-underdock{background:url('bg/underdock.jpg') center/cover no-repeat}
.bg-hearth{background:url('bg/hearth.jpg') center/cover no-repeat}
.bg-wellspring{background:url('bg/wellspring.jpg') center/cover no-repeat}
.bg-sanctum{background:url('bg/sanctum.jpg') center/cover no-repeat}

/* PLAYER SPRITE */
#player{position:absolute;z-index:20;font-size:44px;transform-origin:center bottom;user-select:none;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,.6))}
#player.idle{animation:ibob 2s ease-in-out infinite}
#player.walk{animation:wbob .3s ease-in-out infinite}
#player.fl{transform:scaleX(-1)}
#player.fl.idle{animation:ibobf 2s ease-in-out infinite}
#player.fl.walk{animation:wbobf .3s ease-in-out infinite}
@keyframes ibob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes wbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes ibobf{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-3px)}}
@keyframes wbobf{0%,100%{transform:scaleX(-1) translateY(0)}50%{transform:scaleX(-1) translateY(-5px)}}

/* SPEECH BUBBLE */
#speech{position:absolute;z-index:25;pointer-events:none;opacity:0;transition:opacity .25s;max-width:380px;min-width:80px}
#speech.show{opacity:1}
#si{background:rgba(8,4,18,.93);border:2px solid #ffaa32;border-radius:8px;padding:10px 14px;font-size:17px;line-height:1.35;color:#e0d4c0;text-align:center;box-shadow:0 0 18px rgba(255,170,50,.12)}
#si::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #ffaa32}
#si .speaker{color:#ffaa32;display:block;font-family:'Press Start 2P',cursive;font-size:8px;margin-bottom:4px}
#si .g{color:#50ff50} #si .h{color:#9b7abf} #si .s{color:#ff6bff} #si .a{color:#7ab8ff}

/* HOTSPOTS */
.hs{position:absolute;cursor:pointer;border:2px solid transparent;transition:all .15s;z-index:10;border-radius:3px}
.hs:hover{border-color:rgba(255,170,50,.6);box-shadow:0 0 12px rgba(255,170,50,.3)}
.hs.exit-hs:hover{border-color:rgba(120,200,255,.6);box-shadow:0 0 12px rgba(120,200,255,.3)}
.hs.npc-hs:hover{border-color:rgba(180,120,255,.6);box-shadow:0 0 12px rgba(180,120,255,.3)}
.hs.secret-hs:hover{border-color:rgba(255,100,255,.6);box-shadow:0 0 12px rgba(255,100,255,.3)}
.hs-lbl{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:14px;color:#ffaa32;white-space:nowrap;opacity:0;transition:opacity .15s;text-shadow:1px 1px 3px #000;pointer-events:none}
.hs:hover .hs-lbl{opacity:1}
.hs.glow{border-color:rgba(255,170,50,.4)!important;box-shadow:0 0 8px rgba(255,170,50,.2)!important}
.hs.exit-hs.glow{border-color:rgba(120,200,255,.3)!important}
.hs.npc-hs.glow{border-color:rgba(180,120,255,.3)!important}

/* QUEST TRACKER */
#quest{position:absolute;top:5px;left:8px;z-index:15;pointer-events:none}
#quest-text{font-family:'Press Start 2P',cursive;font-size:7px;color:#9b7abf;opacity:.7;max-width:250px;line-height:1.4}
#quest-text::before{content:'🦊 '}

/* CONTROLS */
#mus-btn{position:absolute;top:5px;right:8px;font-family:'Press Start 2P',cursive;font-size:8px;color:#555;z-index:15;cursor:pointer;background:none;border:1px solid #333;padding:3px 6px}
#mus-btn:hover{color:#ffaa32;border-color:#ffaa32}
#mus-btn.on{color:#50ff50;border-color:#50ff50}
#hl-btn{position:absolute;top:5px;right:60px;font-family:'Press Start 2P',cursive;font-size:8px;color:#555;z-index:15;cursor:pointer;background:none;border:1px solid #333;padding:3px 6px}
#hl-btn:hover{color:#ffaa32;border-color:#ffaa32}

/* TITLE */
#title{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:linear-gradient(180deg,#0d0820,#1a0e35 40%,#0a1628 70%,#061018)}
.stars{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:tw 3s infinite alternate}
@keyframes tw{0%{opacity:.2}100%{opacity:1}}
.tt{font-family:'Press Start 2P',cursive;text-align:center;z-index:2;position:relative}
.tt h1{font-size:17px;color:#ffaa32;text-shadow:0 0 20px rgba(255,170,50,.5),2px 2px 0 #8b4513;margin-bottom:6px;line-height:1.5}
.tt h2{font-size:26px;color:#ff6b2b;text-shadow:0 0 30px rgba(255,107,43,.6),3px 3px 0 #4a1a00;margin-bottom:24px;letter-spacing:3px}
.tt .fox{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 15px rgba(255,107,43,.5))}
.tt .sub{font-family:'VT323',monospace;font-size:18px;color:#9b7abf;margin-bottom:35px}
#start-btn{font-family:'Press Start 2P',cursive;font-size:13px;color:#ffaa32;background:transparent;border:2px solid #ffaa32;padding:12px 28px;cursor:pointer;animation:pulse 2s infinite;z-index:2;position:relative;transition:all .3s}
#start-btn:hover{background:#ffaa32;color:#0a0a0f;box-shadow:0 0 20px rgba(255,170,50,.5)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* VERB BAR — now contextual */
#verbs{height:44px;background:#110a22;border-top:1px solid #2a1f3d;display:flex;align-items:center;padding:0 6px;gap:3px}
.vb{font-family:'Press Start 2P',cursive;font-size:9px;color:#6a5a4a;background:#1a1030;border:1px solid #201535;padding:5px 9px;cursor:pointer;transition:all .12s;white-space:nowrap}
.vb:hover,.vb.active{color:#ffaa32;background:#2a1545;border-color:#ffaa32;box-shadow:0 0 6px rgba(255,170,50,.2)}
#verb-hint{font-size:14px;color:#666;margin-left:auto;margin-right:8px;font-style:italic;white-space:nowrap;overflow:hidden}

/* INVENTORY */
#inv{height:46px;background:#0a0618;border-top:1px solid #2a1f3d;display:flex;align-items:center;padding:0 6px;gap:3px;overflow-x:auto}
.is{width:38px;height:38px;background:#1a1030;border:1px solid #2a1f3d;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0;transition:all .12s;position:relative}
.is:hover{border-color:#ffaa32;box-shadow:0 0 6px rgba(255,170,50,.2)}
.is.sel{border-color:#ff6b2b;box-shadow:0 0 10px rgba(255,107,43,.4);background:#2a1030}
.is-tip{position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:13px;color:#ffaa32;background:#0d0820ee;padding:2px 6px;border:1px solid #2a1f3d;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:20;border-radius:3px}
.is:hover .is-tip{opacity:1}

/* OVERLAYS */
#dlg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,6,24,.93);z-index:40;display:none;flex-direction:column;padding:20px}
#dlg.active{display:flex}
#dlg-sp{font-family:'Press Start 2P',cursive;font-size:11px;color:#ffaa32;margin-bottom:10px}
#dlg-tx{font-size:20px;color:#e0d4c0;margin-bottom:16px;line-height:1.5;flex:1;overflow-y:auto}
#dlg-ch{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto}
.dc{font-family:'VT323',monospace;font-size:18px;color:#9b7abf;background:#1a1030;border:1px solid #2a1f3d;padding:8px 12px;cursor:pointer;text-align:left;transition:all .12s}
.dc:hover{color:#ffaa32;border-color:#ffaa32;background:#2a1545}
#duel{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,6,24,.95);z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#duel.active{display:flex}
.dh{font-family:'Press Start 2P',cursive;font-size:13px;color:#ff6b2b;margin-bottom:6px}
.ds{font-family:'Press Start 2P',cursive;font-size:10px;color:#ffaa32;margin-bottom:16px}
#d-atk{font-size:20px;color:#ff4444;text-align:center;margin-bottom:20px;padding:12px;border:1px solid #441111;background:rgba(60,10,10,.5);max-width:580px;line-height:1.4}
#d-opts{display:flex;flex-direction:column;gap:6px;width:100%;max-width:580px}
.do{font-family:'VT323',monospace;font-size:17px;color:#9b7abf;background:#1a1030;border:1px solid #2a1f3d;padding:9px 12px;cursor:pointer;text-align:left;transition:all .12s}
.do:hover{color:#50ff50;border-color:#50ff50;background:#0a2010}
#d-res{font-family:'Press Start 2P',cursive;font-size:11px;margin-top:12px;padding:8px;text-align:center;min-height:30px}
#d-res.w{color:#50ff50}#d-res.l{color:#ff4444}
#end{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,6,24,.97);z-index:55;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
#end.active{display:flex}
#end h2{font-family:'Press Start 2P',cursive;font-size:20px;color:#ffaa32;margin-bottom:16px}
#end p{font-size:19px;color:#9b7abf;margin-bottom:8px;max-width:480px;line-height:1.5}
#end button{font-family:'Press Start 2P',cursive;font-size:11px;color:#ffaa32;background:transparent;border:2px solid #ffaa32;padding:10px 22px;cursor:pointer;margin-top:16px;transition:all .3s}
#end button:hover{background:#ffaa32;color:#0a0a0f}

/* MAP OVERLAY */
#map{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,6,24,.95);z-index:38;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px}
#map.active{display:flex}
#map h3{font-family:'Press Start 2P',cursive;font-size:12px;color:#ffaa32;margin-bottom:20px}
.map-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:8px;width:360px;height:280px}
.map-loc{background:#1a1030;border:2px solid #2a1f3d;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#666;cursor:default;transition:all .15s;text-align:center;padding:4px;font-family:'Press Start 2P',cursive}
.map-loc.discovered{color:#9b7abf;border-color:#3a2860;cursor:pointer}
.map-loc.discovered:hover{color:#ffaa32;border-color:#ffaa32;background:#2a1545;box-shadow:0 0 10px rgba(255,170,50,.2)}
.map-loc.current{color:#ffaa32;border-color:#ffaa32;background:#2a1545}
#map-close{font-family:'Press Start 2P',cursive;font-size:10px;color:#666;background:none;border:1px solid #333;padding:6px 14px;cursor:pointer;margin-top:16px}
#map-close:hover{color:#ffaa32;border-color:#ffaa32}

/* NOTIFICATIONS */
.notif{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',cursive;font-size:10px;padding:8px 16px;border-radius:3px;z-index:60;animation:ni .3s ease-out,no .5s 2.5s ease-in forwards;white-space:nowrap;pointer-events:none}
.notif.item{background:#0a2010;color:#50ff50;border:1px solid #50ff50}
.notif.spell{background:#1a0a30;color:#bf7aff;border:1px solid #bf7aff}
.notif.info{background:#1a1a00;color:#ffaa32;border:1px solid #ffaa32}
.notif.fail{background:#2a0a0a;color:#ff4444;border:1px solid #ff4444}
.notif.secret{background:#2a0a2a;color:#ff6bff;border:1px solid #ff6bff}
@keyframes ni{from{opacity:0;top:5px}to{opacity:1;top:20px}}
@keyframes no{from{opacity:1}to{opacity:0}}

/* SCREEN EFFECTS */
#fx{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:90;opacity:0;transition:opacity .15s}
#fx.flash-green{opacity:1;background:rgba(50,255,50,.12)}
#fx.flash-purple{opacity:1;background:rgba(180,100,255,.12)}
#fx.flash-pink{opacity:1;background:rgba(255,100,255,.12)}
#fx.flash-red{opacity:1;background:rgba(255,50,50,.1)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.shake{animation:shake .3s ease-in-out!important}

/* DECORATIONS */
.moon{position:absolute;top:30px;right:60px;width:50px;height:50px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fffde8,#f0e68c);box-shadow:0 0 30px rgba(240,230,140,.4)}
.lantern{position:absolute;width:14px;height:20px;background:#ff8c00;border-radius:3px;box-shadow:0 0 20px rgba(255,140,0,.6);animation:fl 2s ease-in-out infinite alternate}
@keyframes fl{0%{opacity:.8}50%{opacity:1}100%{opacity:.9}}
.water{position:absolute;bottom:0;left:0;right:0;height:22%;background:linear-gradient(180deg,rgba(20,60,120,.5),rgba(10,40,80,.7));animation:wm 4s ease-in-out infinite}
@keyframes wm{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes flame{0%{transform:scale(1)}100%{transform:scale(1.1,.9) translateY(-2px)}}
.mp3-tag{position:absolute;bottom:8px;right:8px;font-size:13px;color:#ff6bff;background:rgba(10,6,24,.8);padding:3px 10px;border:1px solid #4a1a5a;border-radius:3px;z-index:15;pointer-events:none}


/* NPC SPRITES */
.npc{position:absolute;z-index:8;pointer-events:none;image-rendering:auto}
.npc-stranger{width:56px;height:84px;background:url('sprites/stranger.png') 0 0 no-repeat;background-size:224px 168px;animation:str-idle 2s steps(4) infinite}
@keyframes str-idle{to{background-position:-224px 0}}
.npc-stranger.standing{background-position:0 -84px;animation:str-stand 2s steps(2) infinite}
@keyframes str-stand{to{background-position:-112px -84px}}
.npc-barkeeper{width:56px;height:84px;background:url('sprites/barkeeper.png') 0 0 no-repeat;background-size:224px 168px;animation:bk-idle 2.5s steps(4) infinite}
@keyframes bk-idle{to{background-position:-224px 0}}
.npc-barkeeper.talking{background-position:0 -84px;animation:bk-talk 1.5s steps(4) infinite}
@keyframes bk-talk{to{background-position:-224px -84px}}
.npc-lostone{width:56px;height:84px;background:url('sprites/lostone.png') 0 0 no-repeat;background-size:224px 168px;animation:lo-idle 1.8s steps(4) infinite;opacity:.8;filter:brightness(1.2) contrast(.9)}
@keyframes lo-idle{to{background-position:-224px 0}}
.npc-lostone.cleared{background-position:0 -84px;animation:lo-clear 2s steps(4) infinite;opacity:1;filter:none}
@keyframes lo-clear{to{background-position:-224px -84px}}
.npc-queen{width:72px;height:108px;background:url('sprites/queen.png') 0 0 no-repeat;background-size:288px 432px;animation:q-throne 2.5s steps(4) infinite}
@keyframes q-throne{to{background-position:-288px 0}}
.npc-queen.standing{background-position:0 -108px;animation:q-stand 2s steps(4) infinite}
@keyframes q-stand{to{background-position:-288px -108px}}
.npc-queen.casting{background-position:0 -216px;animation:q-cast 1.2s steps(4) infinite}
@keyframes q-cast{to{background-position:-288px -216px}}
.npc-queen.defeated{background-position:0 -324px;animation:q-def 3s steps(2) infinite}
@keyframes q-def{to{background-position:-144px -324px}}
.npc-witch{width:52px;height:78px;background:url('sprites/witch.png') 0 0 no-repeat;background-size:208px 234px;animation:w-idle 2s steps(4) infinite}
@keyframes w-idle{to{background-position:-208px 0}}
.npc-witch.casting{background-position:0 -78px;animation:w-cast 1.5s steps(4) infinite}
@keyframes w-cast{to{background-position:-208px -78px}}
.npc-witch.defeated{background-position:0 -156px;animation:w-def 2s steps(2) infinite}
@keyframes w-def{to{background-position:-104px -156px}}

@media(max-width:820px){#gc{width:100vw;height:100vh;border:none}.vb{font-size:7px;padding:4px 6px}.tt h1{font-size:13px}.tt h2{font-size:20px}}
</style>

<body><div style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.12"><img src="../img/img-fox-moth-path.png" alt="" style="width:100%;height:100%;object-fit:cover;filter:saturate(0.5)"></div>
<div id="gc">
<div id="title"><div class="stars" id="stars-c"></div><div class="tt"><div class="fox">🦊</div><h1>THE SECRET OF</h1><h2>FOX ISLAND</h2><div class="sub">a foxyverse adventure</div></div><button id="start-btn">▶ BEGIN</button></div>
<div id="vp">
  <div id="scene"></div>
  <div id="fade"></div>
  <div id="fx"></div>
  <div id="player" class="idle">🦊</div>
  <div id="speech"><div id="si"></div></div>
  <div id="quest"><div id="quest-text"></div></div>
  <button id="hl-btn" onclick="toggleHL()" title="Highlight hotspots (Tab)">👁</button>
  <button id="mus-btn" onclick="toggleMus()">♪ OFF</button>
</div>
<div id="verbs">
  <button class="vb" onclick="sv('look')" data-v="look">Look at</button>
  <button class="vb" onclick="sv('use')" data-v="use">Use</button>
  <button class="vb" onclick="sv('take')" data-v="take">Pick up</button>
  <button class="vb" onclick="sv('talk')" data-v="talk">Talk to</button>
  <button class="vb" onclick="sv('cast')" data-v="cast">Cast ✨</button>
  <button class="vb" data-v="map" onclick="toggleMap()">Map 🗺</button>
  <div id="verb-hint"></div>
</div>
<div id="inv"></div>
<div id="dlg"><div id="dlg-sp"></div><div id="dlg-tx"></div><div id="dlg-ch"></div></div>
<div id="duel"><div class="dh">⚔️ INSULT SPELL DUEL ⚔️</div><div class="ds" id="d-score"></div><div id="d-atk"></div><div id="d-opts"></div><div id="d-res"></div></div>
<div id="map"><h3>🗺 Fox Island</h3><div class="map-grid" id="map-grid"></div><button id="map-close" onclick="toggleMap()">Close</button></div>
<div id="end"><h2 id="end-t"></h2><p id="end-p"></p><button onclick="location.reload()">🦊 PLAY AGAIN</button></div>
</div>
<script>

// ═══════════════════════════════════
// THE SECRET OF FOX ISLAND v3
// Modern UX + 90s charm without the pain
// ═══════════════════════════════════

// ── AUDIO ──
const NT={C2:65.41,D2:73.42,E2:82.41,F2:87.31,G2:98,A2:110,B2:123.47,C3:130.81,Cs3:138.59,D3:146.83,Ds3:155.56,E3:164.81,F3:174.61,Fs3:185,G3:196,Gs3:207.65,A3:220,As3:233.08,B3:246.94,C4:261.63,Cs4:277.18,D4:293.66,Ds4:311.13,E4:329.63,F4:349.23,Fs4:370,G4:392,Gs4:415.3,A4:440,As4:466.16,B4:493.88,C5:523.25,D5:587.33,E5:659.26,Fs5:740,G5:784,A5:880};
let actx=null,musOn=false,mNodes=[],mInt=null,mp3=null;
function initA(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}
function toggleMus(){const b=$('mus-btn');musOn=!musOn;if(musOn){initA();b.textContent='♪ ON';b.classList.add('on');playMus(S.scene);}else{b.textContent='♪ OFF';b.classList.remove('on');stopMus();}}
function stopMus(){if(mInt){clearInterval(mInt);mInt=null;}mNodes.forEach(n=>{try{n.stop();}catch(e){}});mNodes=[];if(mp3){mp3.pause();mp3.currentTime=0;}}

// ── WALKING SPRITE ──
const player=$('player');
let px=50,py=78,walkAnim=null,speechTmr=null;
const SPEED=320;

function setPos(x,y){px=x;py=y;player.style.left=px+'%';player.style.top=py+'%';player.style.transform='translate(-50%,-100%)';updSpeech();}
function updSpeech(){const vp=$('vp'),sw=$('speech'),vpW=vp.offsetWidth,vpH=vp.offsetHeight;const sx=px/100*vpW;sw.style.left=Math.max(5,Math.min(sx-sw.offsetWidth/2,vpW-sw.offsetWidth-5))+'px';sw.style.top=Math.max(5,py/100*vpH-60-sw.offsetHeight)+'px';}

function walkTo(tx,ty,cb){
  if(walkAnim){cancelAnimationFrame(walkAnim);walkAnim=null;}
  ty=Math.max(48,Math.min(86,ty));tx=Math.max(4,Math.min(96,tx));
  player.className=(tx<px?'walk fl':'walk');
  const vp=$('vp'),vpW=vp.offsetWidth,vpH=vp.offsetHeight;
  const sx=px/100*vpW,sy=py/100*vpH,ex=tx/100*vpW,ey=ty/100*vpH;
  const dist=Math.sqrt((ex-sx)**2+(ey-sy)**2),dur=dist/SPEED*1000;
  if(dur<25){setPos(tx,ty);player.className='idle';if(cb)cb();return;}
  const st=performance.now();let stepCt=0;
  function step(now){
    const t=Math.min((now-st)/dur,1),e=1-(1-t)*(1-t);
    px=(sx+(ex-sx)*e)/vpW*100;py=(sy+(ey-sy)*e)/vpH*100;
    player.style.left=px+'%';player.style.top=py+'%';updSpeech();
    // Footstep sounds
    if(++stepCt%12===0)sfx('step');
    if(t<1)walkAnim=requestAnimationFrame(step);
    else{walkAnim=null;player.className=(tx<px?'idle fl':'idle');if(cb)cb();}
  }
  walkAnim=requestAnimationFrame(step);
}

function say(html,dur=3500){
  clearTimeout(speechTmr);$('si').innerHTML=html;$('speech').classList.add('show');
  requestAnimationFrame(()=>updSpeech());
  speechTmr=setTimeout(()=>$('speech').classList.remove('show'),dur);
  resetHintTimer();
}
function sayL(html){say(html,6000);}

function tryCombine(a,b){
  const key=a+'+'+b;
  const combo=COMBOS[key];
  if(combo){
    combo.rm.forEach(id=>{const i=S.inv.indexOf(id);if(i>=0)S.inv.splice(i,1);});
    S.inv.push(combo.r);renderInv();sfx('spell');flash('flash-purple');say(combo.t,5000);
    notif('Created: '+ITEMS[combo.r].n+'!','spell');return true;
  }
  return false;
}

function updateQuest(){
  let q='explore the island...';
  if(S.flags.advice&&!S.flags.knowTemple)q='visit the tavern for information';
  else if(S.flags.knowTemple&&!has('grimoire-page-1'))q='find grimoire spells in the temple';
  else if(S.spells.length>=1&&S.spells.length<3)q='learn more grimoire spells ('+S.spells.length+'/3)';
  else if(S.spells.length>=3&&!S.flags.garden)q='solve the false garden';
  else if(S.flags.garden&&!has('skeleton-key'))q='the garden holds a key...';
  else if(has('skeleton-key')&&!S.flags.queenWon&&S.spells.length>=3)q='duel the fox queen';
  else if(S.flags.queenWon)q='talk to the queen for the secret';
  if(S.secrets>0&&S.secrets<4)q+=' | secrets: '+S.secrets+'/4';
  $('quest-text').textContent=q;
}

function smartVerb(spot){
  if(S.verb!=='look'&&S.verb!=='walk')return S.verb; // manual override
  if(spot.tp==='exit')return 'walk';
  if(spot.tp==='npc')return 'talk';
  if(spot.tp==='item'&&spot.itemId&&!has(spot.itemId))return 'take';
  if(spot.tp==='secret'&&S.selItem)return 'use';
  return 'look';

// ── INTERACTION ENGINE ──
function loadScene(id){
  S.scene=id;S.visited.add(id);const sc=SC[id];
  const art=$('scene');art.innerHTML='';art.className=sc.bg;
  sc.build(art);renderHS();setPos(50,78);
  say(sc.enter,4000);updateQuest();
  if(musOn)playMus(id);
}

function renderHS(){
  document.querySelectorAll('.hs').forEach(h=>h.remove());
  const vp=$('vp');
  SC[S.scene].hs().forEach(spot=>{
    const el=document.createElement('div');
    el.className='hs'+(spot.tp==='exit'?' exit-hs':spot.tp==='npc'?' npc-hs':spot.tp==='secret'?' secret-hs':'');
    if(S.hlOn)el.classList.add('glow');
    el.style.cssText=`left:${spot.x}%;top:${spot.y}%;width:${spot.w}%;height:${spot.h}%`;
    el.innerHTML='<span class="hs-lbl">'+spot.lbl+'</span>';
    // Hover hint
    el.onmouseenter=()=>{const v=smartVerb(spot);$('verb-hint').textContent=v.charAt(0).toUpperCase()+v.slice(1)+' '+spot.lbl;};
    el.onmouseleave=()=>{$('verb-hint').textContent='';};
    // Smart click
    el.onclick=(e)=>{e.stopPropagation();sfx('click');handleHS(spot);};
    // Double click = instant
    el.ondblclick=(e)=>{e.stopPropagation();sfx('click');instantHS(spot);};
    vp.appendChild(el);
  });
}

function handleHS(spot){
  walkTo(spot.wx,spot.wy,()=>execAction(spot));
}

function instantHS(spot){
  setPos(spot.wx,spot.wy);
  execAction(spot);
}

function execAction(spot){
  let v=smartVerb(spot);
  // If USE verb is selected AND we have a selected inventory item, try that
  if(S.verb==='use'&&S.selItem&&spot.act.use){v='use';}
  else if(S.verb==='cast'&&spot.act.cast){v='cast';}
  else if(S.verb!=='look'&&S.verb!=='walk'){v=S.verb;} // manual override from verb bar

  let a=spot.act[v];
  // Fallbacks with funny responses
  if(a===0||a===undefined){
    if(v==='take'&&spot.tp==='npc')return failSay('take_npc');
    if(v==='take')return failSay('take_scenery');
    if(v==='talk'&&spot.tp!=='npc')return failSay('talk_object');
    if(v==='cast')return failSay('cast_nothing');
    if(v==='use')return failSay('use_nothing');
    // Try look as last resort
    a=spot.act.look;
    if(!a)return failSay('generic');
  }
  const r=typeof a==='function'?a():a;
  if(r&&r!==0)sayL(r);
  renderHS();updateQuest();
}

// Click empty space = walk there
$('vp').addEventListener('click',e=>{
  if(e.target.closest('.hs')||e.target.closest('button'))return;
  const rect=$('vp').getBoundingClientRect();
  walkTo((e.clientX-rect.left)/rect.width*100,(e.clientY-rect.top)/rect.height*100);
});
// Double-click empty = instant walk
$('vp').addEventListener('dblclick',e=>{
  if(e.target.closest('.hs')||e.target.closest('button'))return;
  const rect=$('vp').getBoundingClientRect();
  setPos((e.clientX-rect.left)/rect.width*100,Math.max(48,Math.min(86,(e.clientY-rect.top)/rect.height*100)));
});

function sv(v){S.verb=v;S.selItem=null;document.querySelectorAll('.vb').forEach(b=>b.classList.toggle('active',b.dataset.v===v));document.querySelectorAll('.is').forEach(s=>s.classList.remove('sel'));}

      if(S.selItem&&S.selItem!==id){
        // Try combination!
        if(!tryCombine(S.selItem,id))say('"'+ITEMS[S.selItem].n+'" and "'+it.n+'" don\'t combine. but interesting thought.',3000);
        S.selItem=null;document.querySelectorAll('.is').forEach(s=>s.classList.remove('sel'));sv('look');
      } else if(S.verb==='use'||S.selItem===id){
        if(S.selItem===id){S.selItem=null;sl.classList.remove('sel');say(it.d);return;}
        S.selItem=id;document.querySelectorAll('.is').forEach(s=>s.classList.remove('sel'));sl.classList.add('sel');
        say('<span class="a">using '+it.n+'... click target or another item.</span>');
      } else {say(it.d);}
    };
    bar.appendChild(sl);
  });
}

function notif(t,ty){const el=document.createElement('div');el.className='notif '+ty;el.textContent=t;$('gc').appendChild(el);setTimeout(()=>el.remove(),3200);}

function showCH(n){const c=$('dlg-ch');c.innerHTML='';if(n.a)n.a();n.ch.forEach(ch=>{if(ch.c&&!ch.c())return;const b=document.createElement('button');b.className='dc';b.textContent=ch.t;b.onclick=()=>{sfx('click');if(ch.a)ch.a();if(ch.x)closeDlg();else if(ch.n!==undefined)showDN(ch.n);};c.appendChild(b);});}
