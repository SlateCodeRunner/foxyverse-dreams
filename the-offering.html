<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>the offering</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030304;overflow-x:hidden}
.scene{position:relative;height:300vh;width:100%}
.frame{position:sticky;top:0;height:100vh;width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center}
.frame img{position:absolute;width:100%;height:100%;object-fit:cover;transition:none}
#dormant{opacity:1}
#awakened{opacity:0}

.whisper{position:absolute;bottom:8vh;left:0;width:100%;text-align:center;font-family:'Courier New',monospace;font-size:10px;letter-spacing:4px;pointer-events:none;z-index:10;transition:all 1.5s}
#w1{color:rgba(200,180,140,0.15);opacity:1}
#w2{color:rgba(200,40,40,0.25);opacity:0}

.scroll-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.08);z-index:20;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.08}50%{opacity:0.2}}

.vignette{position:fixed;inset:0;pointer-events:none;z-index:5;box-shadow:inset 0 0 200px rgba(0,0,0,0.8)}

.back{position:fixed;top:16px;left:16px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;color:rgba(200,180,140,0.1);text-decoration:none;z-index:20;transition:color 0.3s}
.back:hover{color:rgba(200,180,140,0.3)}
</style>
</head>
<body>

<div class="vignette"></div>
<a href="index.html" class="back">&larr;</a>
<div class="scroll-hint">scroll</div>

<div class="scene">
  <div class="frame">
    <img id="dormant" src="img/img-entity-dormant.jpg" alt="dormant">
    <img id="awakened" src="img/img-entity-awakened.jpg" alt="awakened">
    <div class="whisper" id="w1">the crystal was offered. the garden held its breath.</div>
    <div class="whisper" id="w2">it reached back.</div>
  </div>
</div>

<script>
var dormant=document.getElementById('dormant');
var awakened=document.getElementById('awakened');
var w1=document.getElementById('w1');
var w2=document.getElementById('w2');
var hint=document.querySelector('.scroll-hint');

window.addEventListener('scroll',function(){
  var max=document.body.scrollHeight-window.innerHeight;
  var t=Math.min(1,Math.max(0,window.scrollY/max));
  
  // Crossfade at midpoint with slight overlap
  var fade=Math.min(1,Math.max(0,(t-0.2)/0.4));
  dormant.style.opacity=1-fade;
  awakened.style.opacity=fade;
  
  // Text swap
  w1.style.opacity=1-fade;
  w2.style.opacity=fade;
  
  // Hide scroll hint once scrolled
  hint.style.opacity=t>0.05?'0':'';
  
  // Subtle zoom on awakened
  awakened.style.transform='scale('+(1+fade*0.03)+')';
});
</script>

</body>
</html>
