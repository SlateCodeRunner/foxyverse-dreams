<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quest Board</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;color:#c0beb8;font-family:'Fira Code',monospace;min-height:100vh}
.page{max-width:420px;margin:0 auto;padding:48px 20px 80px}
h1{font-family:'Cinzel',serif;font-size:20px;color:#ff6a00;letter-spacing:4px;text-align:center;margin-bottom:4px}
.sub{font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:3px;text-align:center;margin-bottom:32px}
.type{padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center}
.type-name{font-size:12px;color:rgba(255,255,255,0.4)}
.type-price{font-size:12px;color:#ff6a00}
.form{margin-top:28px}
.field{margin-bottom:10px}
.label{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.1);text-transform:uppercase;margin-bottom:4px}
input{width:100%;background:transparent;border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);font-family:'Fira Code',monospace;font-size:11px;padding:8px 10px;outline:none}
input:focus{border-color:rgba(255,106,0,0.2)}
select{width:100%;background:#060608;border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);font-family:'Fira Code',monospace;font-size:11px;padding:8px 10px;outline:none}
button{width:100%;padding:12px;background:rgba(255,106,0,0.06);border:1px solid rgba(255,106,0,0.2);color:#ff6a00;font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;cursor:pointer;margin-top:16px}
button:hover{background:rgba(255,106,0,0.1)}
.ok{display:none;text-align:center;padding:16px;border:1px solid rgba(78,203,113,0.12);color:#4ecb71;font-size:10px;margin-top:16px}
.foot{text-align:center;margin-top:40px;font-size:7px;color:rgba(255,255,255,0.04);letter-spacing:2px}
</style>
</head>
<body>
<div class="page">
  <h1>QUEST BOARD</h1>
  <div class="sub">submit work · get paid in ETH</div>

  <div class="type"><span class="type-name">Video</span><span class="type-price">$15</span></div>
  <div class="type"><span class="type-name">Writing</span><span class="type-price">$10</span></div>
  

  <div class="form">
    <div class="field"><div class="label">type</div><select id="t"><option>Video</option><option>Writing</option></select></div>
    <div class="field"><div class="label">name</div><input id="n" placeholder="discord username"></div>
    <div class="field"><div class="label">ETH address</div><input id="e" placeholder="0x..."></div>
    <div class="field"><div class="label">link to work</div><input id="l" placeholder="youtube / drive / dropbox"></div>
    <button onclick="this.style.display='none';document.getElementById('ok').style.display='block'">SUBMIT</button>
    <div class="ok" id="ok">submitted. reviewed within 24h. paid in ETH.</div>
  </div>

  <div class="foot">psycheorsike.com</div>
</div>
</body>
</html>
