var grid=document.getElementById('grid'),search=document.getElementById('search'),count=document.getElementById('count');
function rc(r){return r.toLowerCase().includes('king')?'r-king':r.toLowerCase().includes('duke')?'r-duke':r.toLowerCase().includes('prince')?'r-prince':r.toLowerCase().includes('marquis')?'r-marquis':r.toLowerCase().includes('earl')?'r-earl':r.toLowerCase().includes('knight')?'r-knight':r.toLowerCase().includes('president')?'r-president':''}
function render(list){grid.innerHTML='';list.forEach(function(d){var div=document.createElement('div');div.className='demon '+rc(d.rank);div.innerHTML='<div class="num">#'+String(d.n).padStart(2,'0')+'</div><div class="name">'+d.name+'</div><div class="rank">'+d.rank+'</div><div class="desc">'+d.desc+'</div><div class="legions">'+d.leg+' legions</div>';grid.appendChild(div)});count.textContent=list.length+' spirit'+(list.length!==1?'s':'')}

document.querySelectorAll('.fil').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.fil').forEach(function(x){x.classList.remove('on')});b.classList.add('on');filter()})});
function filter(){var q=search.value.toLowerCase(),f=document.querySelector('.fil.on').dataset.f;var list=D.filter(function(d){var matchQ=!q||d.name.toLowerCase().includes(q)||d.rank.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q);var matchF=f==='all'||d.rank.toLowerCase().includes(f);return matchQ&&matchF});render(list)}
