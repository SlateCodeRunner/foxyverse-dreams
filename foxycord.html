<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a1a2e;overflow:hidden;height:100vh}
/* ======== FLOATING SOCIAL BAR ======== */
.social-float{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:9998;display:flex;flex-direction:column;gap:0}
.social-float a{display:flex;align-items:center;width:36px;height:36px;overflow:hidden;text-decoration:none;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative}
.social-float a:hover{width:140px}
.social-float a .s-icon{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1}
.social-float a .s-icon svg{width:16px;height:16px;fill:currentColor}
.social-float a .s-label{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;padding-right:12px;opacity:0;transition:opacity 0.3s}
.social-float a:hover .s-label{opacity:1}
.sf-discord{background:rgba(88,101,242,0.15);color:rgba(88,101,242,0.7)}.sf-discord:hover{background:rgba(88,101,242,0.25);color:rgba(88,101,242,1)}.sf-discord .s-icon{animation:discordPulse 3s ease-in-out infinite}@keyframes discordPulse{0%,100%{background:rgba(88,101,242,0.15)}50%{background:rgba(88,101,242,0.25)}}
.sf-youtube{background:rgba(255,0,0,0.08);color:rgba(255,60,60,0.5)}.sf-youtube:hover{background:rgba(255,0,0,0.15);color:rgba(255,60,60,0.9)}
.sf-reddit{background:rgba(255,69,0,0.08);color:rgba(255,100,40,0.5)}.sf-reddit:hover{background:rgba(255,69,0,0.15);color:rgba(255,100,40,0.9)}
.sf-insta{background:rgba(225,48,108,0.08);color:rgba(225,80,120,0.5)}.sf-insta:hover{background:rgba(225,48,108,0.15);color:rgba(225,80,120,0.9)}
.sf-tiktok{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.35)}.sf-tiktok:hover{background:rgba(255,255,255,0.22);color:rgba(255,255,255,0.7)}
.sf-facebook{background:rgba(24,119,242,0.08);color:rgba(66,133,244,0.5)}.sf-facebook:hover{background:rgba(24,119,242,0.15);color:rgba(66,133,244,0.9)}
@media(max-width:600px){.social-float{left:auto;right:0;top:auto;bottom:0;transform:none;flex-direction:row;width:100%;justify-content:center;background:rgba(6,6,8,0.95);border-top:1px solid rgba(255,255,255,0.18)}.social-float a{width:48px;height:40px}.social-float a:hover{width:48px}.social-float a .s-label{display:none}body{padding-bottom:44px}}


/* ======== PET COMPANION ======== */
.pet-companion{
  position:fixed;bottom:14px;right:14px;z-index:9996;
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;
  background:rgba(10,10,18,0.8);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  cursor:pointer;
  transition:all 0.4s;
  text-decoration:none;
  opacity:0.4;
}
.pet-companion:hover{opacity:0.8;border-color:rgba(255,255,255,0.28);background:rgba(10,10,18,0.95)}
.pet-companion .pc-emoji{font-size:16px}
.pet-companion .pc-name{font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,0.45);letter-spacing:1px}
.pet-companion .pc-xp{font-family:'Fira Code',monospace;font-size:7px;color:rgba(255,255,255,0.28)}
@media(max-width:600px){.pet-companion{bottom:48px;right:8px}}


/* ======== PET BONUSES ======== */
.pet-bonus-tag{position:fixed;bottom:40px;right:14px;font-family:'Fira Code',monospace;font-size:7px;color:rgba(255,255,255,0.05);letter-spacing:1px;z-index:9995}
@media(max-width:600px){.pet-bonus-tag{bottom:74px}}
/* Taurus: bigger text */
body.bonus-taurus{font-size:110%}
/* Cancer: warm tint */
body.bonus-cancer::before{content:'';position:fixed;inset:0;background:rgba(255,200,150,0.015);pointer-events:none;z-index:9990}
/* Leo: cursor trail */
.leo-trail{position:fixed;width:6px;height:6px;border-radius:50%;background:rgba(255,180,40,0.3);pointer-events:none;z-index:9994;transition:opacity 0.8s}
/* Virgo: reading time */
.virgo-readtime{position:fixed;top:14px;right:14px;font-family:'Fira Code',monospace;font-size:8px;color:rgba(255,255,255,0.22);letter-spacing:1px;z-index:9995}
@media(max-width:600px){.virgo-readtime{top:auto;bottom:74px;right:auto;left:14px}}
/* Capricorn: progress bar */
.capri-progress{position:fixed;top:0;left:0;height:2px;background:rgba(120,130,140,0.2);z-index:9995;transition:width 0.3s}
/* Pisces: dreamy wave */
body.bonus-pisces .page,body.bonus-pisces .map-outer{animation:piscesDrift 8s ease-in-out infinite}
@keyframes piscesDrift{0%,100%{transform:translateY(0)}50%{transform:translateY(2px)}}
/* Scorpio: shadow flicker */
.scorpio-blackout{position:fixed;inset:0;background:#060608;pointer-events:none;z-index:9993;opacity:0;transition:opacity 0.15s}
/* Aquarius: glitch text */
.aqua-glitch{display:inline;position:relative}
.aqua-glitch::after{content:attr(data-t);position:absolute;left:2px;top:0;color:rgba(95,168,211,0.4);clip-path:inset(0 0 0 0);animation:aquaG 0.1s steps(1) forwards}
@keyframes aquaG{to{clip-path:inset(0 100% 0 0)}}
/* Aries: page shake */
body.bonus-aries.shaking{animation:rammm 0.3s ease-in-out}
@keyframes rammm{0%,100%{transform:none}25%{transform:translateX(-4px) rotate(-0.5deg)}75%{transform:translateX(4px) rotate(0.5deg)}}
/* Gemini: duplicate flash */
.gemini-dupe{position:fixed;inset:0;pointer-events:none;z-index:9993;opacity:0;transition:opacity 0.2s;filter:blur(1px);mix-blend-mode:screen}
/* Sagittarius: discovery link */
.sag-discover{position:fixed;bottom:50px;right:60px;font-family:'Fira Code',monospace;font-size:8px;z-index:9995;opacity:0;transition:opacity 1s}
.sag-discover a{color:rgba(180,100,220,0.25);text-decoration:none;letter-spacing:1px}
.sag-discover a:hover{color:rgba(180,100,220,0.6)}
@media(max-width:600px){.sag-discover{bottom:80px;right:14px}}

function generateStoryBeats() {
  return [
    // PHASE 0 — intro, your friends are normal
    {
      phase: 0,
      messages: [
        { user: "mika", text: "omg you're here finally!! 🌸" },

    {

    // PHASE 1 — foxy joins

        { user: "jett", text: "hey! welcome" },

        { user: "nyx", text: "how'd you find us?" },
        { user: "foxy", text: "i find things 🦊" },
      ],
      waitForUser: true,
    },
    {
      phase: 1,
      messages: [
        { user: "foxy", text: "so what do you all do in here? just... hang out?" },
        { user: "mika", text: "yeah! it's our little safe space 💕" },
        { user: "foxy", text: "safe. interesting word choice" },
        { user: "jett", text: "foxy seems cool tbh" },
        { user: "sol", text: "yeah vibes are immaculate" },
      ],

    // PHASE 2 — subtle shifts
    {
      phase: 2,
      messages: [
        { user: "foxy", text: "hey mika, you ever feel like you give too much to people who don't notice?" },
        { user: "mika", text: "...sometimes yeah actually" },

        { user: "sol", text: "okay that's harsh" },
        { user: "foxy", text: "truth usually is 🦊✨" },
      ],
      waitForUser: true,
    },
    // PHASE 3 — friends turning
    {
      phase: 3,
      messages: [
        { user: "jett", text: "okay i need to say something" },
        { user: "jett", text: "ever since foxy showed up everything feels off" },
        { user: "sol", text: "jett's right. mika you've been distant" },
        { user: "mika", text: "maybe i'm just done pretending everything's fine" },
        { user: "nyx", text: "pretending? we're your FRIENDS" },
        { user: "foxy", text: "are you though? or are you just... familiar" },
        { user: "mika", text: "^^^" },

    {
      phase: 3,
      messages: [

        { user: "foxy", text: "growth isn't comfortable. neither is seeing clearly for the first time" },

    // PHASE 4 — corruption deepens
    {

    {

        { user: "sol", text: "the channel icon is different too" },
        { user: "foxy", text: "things change. servers change. people change." },
        { user: "foxy", text: "you're all so afraid of change you'll call it corruption" },

    // PHASE 5 — endgame
    {
      phase: 5,
      messages: [
        {
          user: "system",
          text: "jett has gone offline",

        },
        {
          user: "system",
          text: "sol has gone offline",
          isSystem: true,
        },
        { user: "mika", text: "where did they go" },
        { user: "nyx", text: "i can't leave. i tried closing the app. it won't let me." },
        { user: "foxy", text: "you can always leave. you just have to mean it." },
        { user: "mika", text: "foxy... what are you" },
        { user: "foxy", text: "i'm what happens when you invite something in without asking what it wants" },
      ],
      waitForUser: true,
    },
    {
      phase: 5,
      messages: [
        {
          user: "system",
          text: "nyx has gone offline",
          isSystem: true,
        },
        {
          user: "system",
          text: "mika has gone offline",
          isSystem: true,
        },
        { user: "foxy", text: "just us now 🦊" },
        { user: "foxy", text: "you know the funny thing?" },
        { user: "foxy", text: "they were never going to stay." },
        { user: "foxy", text: "people don't. servers don't. nothing does." },
        { user: "foxy", text: "but i'm still here." },
        { user: "foxy", text: "question is..." },
      ],
      waitForUser: true,
      finalPrompt: true,
    },
    {
      phase: 5,
      messages: [
        { user: "foxy", text: "are you?" },
        { user: "foxy", text: "..." },
        { user: "foxy", text: "okay bye 🦊" },
        {
          user: "system",
          text: "the server has been deleted",
          isSystem: true,
        },
      ],
      waitForUser: false,
      ending: true,
    },
  ];
}

const TYPING_SPEED = { min: 400, max: 1200 };
const MESSAGE_DELAY = { min: 600, max: 1800 };

function App() {
  const [messages, setMessages] = useState([]);
  const [inputValue, setInputValue] = useState("");
  const [beatIndex, setBeatIndex] = useState(0);
  const [isTyping, setIsTyping] = useState(null);
  const [waitingForUser, setWaitingForUser] = useState(false);
  const [phase, setPhase] = useState(0);
  const [started, setStarted] = useState(false);
  const [ended, setEnded] = useState(false);
  const [glitchText, setGlitchText] = useState(false);
  const [onlineUsers, setOnlineUsers] = useState(["mika", "jett", "sol", "nyx"]);
  const [screenShake, setScreenShake] = useState(false);
  const [bgNoise, setBgNoise] = useState(0);
  const [channelGlitch, setChannelGlitch] = useState(0);
  const [foxyTypingGlitch, setFoxyTypingGlitch] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef = useRef(null);
  const storyBeats = useRef(generateStoryBeats());
  const processingRef = useRef(false);

  const scrollToBottom = useCallback(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, []);

  useEffect(() => {
    scrollToBottom();
  }, [messages, scrollToBottom]);

  useEffect(() => {
    if (phase >= 3) {
      const interval = setInterval(() => {
        setGlitchText(true);
        setTimeout(() => setGlitchText(false), 150);
      }, 3000 + Math.random() * 5000);
      return () => clearInterval(interval);
    }
  }, [phase]);

  useEffect(() => {
    if (phase >= 4) {
      const interval = setInterval(() => {
        setScreenShake(true);
        setTimeout(() => setScreenShake(false), 200);
      }, 8000 + Math.random() * 4000);
      return () => clearInterval(interval);
    }
  }, [phase]);

  useEffect(() => {
    setBgNoise(Math.min(phase * 0.08, 0.4));
    setChannelGlitch(Math.min(phase, 5));
  }, [phase]);

  const playBeat = useCallback(
    async (index) => {
      if (processingRef.current) return;
      if (index >= storyBeats.current.length) return;
      processingRef.current = true;

      const beat = storyBeats.current[index];
      setPhase(beat.phase);

      if (beat.phase >= 4 && beat.messages.some((m) => m.isSystem)) {
        const removals = beat.messages.filter((m) => m.isSystem && m.text.includes("offline"));
        removals.forEach((r) => {
          const name = r.text.split(" ")[0];
          setOnlineUsers((prev) => prev.filter((u) => u !== name));
        });
      }

      if (beat.phase === 1 && beat.messages.some((m) => m.isSystem && m.text.includes("foxy"))) {
        setOnlineUsers((prev) => [...prev, "foxy"]);
      }

      for (let i = 0; i < beat.messages.length; i++) {
        const msg = beat.messages[i];

        if (!msg.isSystem) {
          const isFoxy = msg.user === "foxy";
          if (isFoxy && phase >= 3) setFoxyTypingGlitch(true);
          setIsTyping(msg.user);
          await new Promise((r) =>
            setTimeout(r, TYPING_SPEED.min + Math.random() * (TYPING_SPEED.max - TYPING_SPEED.min))
          );
          setIsTyping(null);
          if (isFoxy) setFoxyTypingGlitch(false);
        }

        setMessages((prev) => [
          ...prev,
          {
            ...msg,
            id: Date.now() + i + Math.random(),
            timestamp: new Date().toLocaleTimeString([], {
              hour: "2-digit",
              minute: "2-digit",
            }),
            phase: beat.phase,
          },
        ]);

        await new Promise((r) =>
          setTimeout(r, MESSAGE_DELAY.min + Math.random() * (MESSAGE_DELAY.max - MESSAGE_DELAY.min))
        );
      }

      if (beat.ending) {
        setEnded(true);
        processingRef.current = false;
        return;
      }

      if (beat.waitForUser) {
        setWaitingForUser(true);
      } else {
        setBeatIndex(index + 1);
        processingRef.current = false;
        playBeat(index + 1);
      }

      processingRef.current = false;
    },
    [phase]
  );

  useEffect(() => {
    if (started && beatIndex === 0 && !processingRef.current) {
      playBeat(0);
    }
  }, [started, beatIndex, playBeat]);

  const handleSend = () => {
    if (!inputValue.trim() || !waitingForUser || ended) return;

    const userMsg = {
      user: "you",
      text: inputValue.trim(),
      id: Date.now(),
      timestamp: new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
      }),
      phase,
    };

    setMessages((prev) => [...prev, userMsg]);
    setInputValue("");
    setWaitingForUser(false);

    const nextIndex = beatIndex + 1;
    setBeatIndex(nextIndex);

    setTimeout(() => {
      playBeat(nextIndex);
    }, 800);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  };

  const serverName = SERVER_NAME_STAGES[Math.min(channelGlitch, SERVER_NAME_STAGES.length - 1)];
  const channelName = CHANNEL_NAME_STAGES[Math.min(channelGlitch, CHANNEL_NAME_STAGES.length - 1)];

  if (ended) {
    return (
      <div style={styles.endScreen}>
        <div style={styles.endContent}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🦊</div>
          <div style={styles.endText}>server deleted</div>
          <div style={styles.endSubtext}>
            they were never going to stay
          </div>
        </div>
      </div>
    );
  }

  if (!started) {
    return (
      <div style={styles.startScreen}>
        <div style={styles.startContent}>
          <div style={styles.startIcon}>💬</div>
          <div style={styles.startTitle}>the cozy corner</div>
          <div style={styles.startSubtitle}>your friends are waiting</div>
          <button style={styles.startButton} onClick={() => setStarted(true)}>
            Join Server
          </button>
          <div style={styles.startFooter}>4 friends online</div>
        </div>
      </div>
    );
  }

  return (
    <div
      style={{
        ...styles.container,
        animation: screenShake ? "shake 0.2s linear" : "none",
      }}
    >
      <style>{`
        @keyframes shake {
          0%, 100% { transform: translate(0); }
          25% { transform: translate(-2px, 1px); }
          50% { transform: translate(2px, -1px); }
          75% { transform: translate(-1px, 2px); }
        }
        @keyframes glitch {
          0% { transform: translate(0); filter: none; }
          20% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); }
          40% { transform: translate(2px, -2px); clip-path: inset(20% 0 30% 0); }
          60% { transform: translate(-1px, -1px); filter: hue-rotate(180deg); }
          80% { transform: translate(1px, 1px); filter: saturate(3); }
          100% { transform: translate(0); filter: none; }
        }
        @keyframes foxPulse {
          0%, 100% { text-shadow: 0 0 4px #ff6b35; }
          50% { text-shadow: 0 0 16px #ff2200, 0 0 32px #ff000066; }
        }
        @keyframes typing {
          0%, 100% { opacity: 0.3; }
          50% { opacity: 1; }
        }
        @keyframes scanline {
          0% { top: -100%; }
          100% { top: 100%; }
        }
        @keyframes bgCorrupt {
          0%, 100% { background-position: 0% 0%; }
          50% { background-position: 100% 100%; }
        }
        @keyframes flicker {
          0%, 100% { opacity: 1; }
          92% { opacity: 1; }
          93% { opacity: 0.1; }
          94% { opacity: 0.9; }
          96% { opacity: 0.2; }
          97% { opacity: 1; }
        }
        input::placeholder {
          color: #72767d;
        }
      `}</style>

      {/* Scanline overlay for later phases */}
      {phase >= 4 && (
        <div
          style={{
            position: "absolute",
            top: 0,
            left: 0,
            right: 0,
            bottom: 0,
            pointerEvents: "none",
            zIndex: 100,
            background:
              "repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px)",
            opacity: phase >= 5 ? 0.4 : 0.2,
          }}
        />
      )}

      {/* Sidebar */}
      <div style={styles.sidebar}>
        <div
          style={{
            ...styles.serverIcon,
            background: phase >= 4 ? "#ff2200" : "#5865f2",
            animation: phase >= 3 ? "foxPulse 2s ease-in-out infinite" : "none",
          }}
        >
          {phase >= 4 ? "🦊" : "CC"}
        </div>
        <div style={{ ...styles.serverIcon, background: "#36393f" }}>+</div>
      </div>

      {/* Channel list */}
      <div style={styles.channelPanel}>
        <div
          style={{
            ...styles.serverHeader,
            animation: phase >= 3 && glitchText ? "glitch 0.15s linear" : "none",
          }}
        >
          {serverName}
        </div>

        <div style={styles.channelSection}>
          <div style={styles.channelCategory}>TEXT CHANNELS</div>
          <div
            style={{
              ...styles.channelItem,
              ...styles.channelItemActive,
              animation: phase >= 4 && glitchText ? "glitch 0.1s linear" : "none",
            }}
          >
            # {channelName}
          </div>
          {phase >= 3 && (
            <div style={{ ...styles.channelItem, color: "#ff6b3566" }}>
              # whispers
            </div>
          )}
          {phase >= 5 && (
            <div style={{ ...styles.channelItem, color: "#ff220066" }}>
              # v̴̧o̴̡i̸̢ḑ̷
            </div>
          )}
        </div>

        {/* Online users */}
        <div style={styles.userSection}>
          <div style={styles.channelCategory}>
            ONLINE — {onlineUsers.length + 1}
          </div>
          <div style={styles.userItem}>
            <div style={{ ...styles.statusDot, background: "#43b581" }} />
            <span style={{ color: COLORS.you }}>you</span>
          </div>
          {onlineUsers.map((u) => (
            <div
              key={u}
              style={{
                ...styles.userItem,
                animation:
                  u === "foxy" && phase >= 3
                    ? "foxPulse 2s ease-in-out infinite"
                    : "none",
              }}
            >
              <div
                style={{
                  ...styles.statusDot,
                  background:
                    u === "foxy" && phase >= 4
                      ? "#ff2200"
                      : u === "foxy"
                      ? "#ff6b35"
                      : phase >= 3
                      ? "#faa61a"
                      : "#43b581",
                }}
              />
              <span
                style={{
                  color:
                    phase >= 3
                      ? CORRUPTED_COLORS[u] || COLORS[u]
                      : COLORS[u],
                }}
              >
                {u}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* Main chat */}
      <div style={styles.chatArea}>
        <div style={styles.chatHeader}>
          <span style={{ color: "#8e9297" }}>#</span>{" "}
          <span
            style={{
              fontWeight: 600,
              animation: phase >= 4 && glitchText ? "glitch 0.1s linear" : "none",
            }}
          >
            {channelName}
          </span>
        </div>

        <div
          style={{
            ...styles.messagesContainer,
            background:
              phase >= 5
                ? "linear-gradient(180deg, #36393f 0%, #1a0a0a 100%)"
                : phase >= 4
                ? `linear-gradient(180deg, #36393f 0%, #2a1a1a ${bgNoise * 200}%)`
                : "#36393f",
          }}
        >
          <div style={styles.welcomeBlock}>
            <div style={styles.welcomeIcon}>
              {phase >= 4 ? "🦊" : "💬"}
            </div>
            <h2
              style={{
                color: "#fff",
                fontSize: 22,
                margin: "8px 0 4px",
                fontFamily: "inherit",
              }}
            >
              Welcome to #{channelName}
            </h2>
            <p style={{ color: "#8e9297", fontSize: 13 }}>
              {phase >= 4
                ? "something has changed here"
                : "This is the start of the #general channel."}
            </p>
          </div>

          {messages.map((msg) => {
            if (msg.isSystem) {
              return (
                <div key={msg.id} style={styles.systemMessage}>
                  <span
                    style={{
                      animation:
                        msg.text.includes("foxy") || msg.text.includes("deleted")
                          ? "foxPulse 1.5s ease-in-out infinite"
                          : "none",
                    }}
                  >
                    {msg.text}
                  </span>
                </div>
              );
            }

            const isFoxy = msg.user === "foxy";
            const isCorrupted = msg.phase >= 3;
            const userColor = isCorrupted
              ? CORRUPTED_COLORS[msg.user] || COLORS[msg.user]
              : COLORS[msg.user];

            return (
              <div
                key={msg.id}
                style={{
                  ...styles.message,
                  animation:
                    isFoxy && msg.phase >= 4
                      ? "flicker 4s linear infinite"
                      : "none",
                }}
              >
                <div
                  style={{
                    ...styles.avatar,
                    background: isFoxy
                      ? msg.phase >= 4
                        ? "#ff2200"
                        : "#ff6b35"
                      : msg.phase >= 3
                      ? "#2a2a2a"
                      : "#5865f2",
                    boxShadow:
                      isFoxy && msg.phase >= 3
                        ? "0 0 8px #ff6b3566"
                        : "none",
                  }}
                >
                  {AVATARS[msg.user] || "?"}
                </div>
                <div style={styles.messageContent}>
                  <div style={styles.messageHeader}>
                    <span
                      style={{
                        ...styles.username,
                        color: userColor,
                        animation:
                          isFoxy && msg.phase >= 4
                            ? "foxPulse 2s ease-in-out infinite"
                            : "none",
                      }}
                    >
                      {msg.user}
                    </span>
                    <span style={styles.timestamp}>{msg.timestamp}</span>
                  </div>
                  <div
                    style={{
                      ...styles.messageText,
                      color:
                        isFoxy && msg.phase >= 4
                          ? "#ff6b35"
                          : msg.phase >= 5 && !isFoxy && msg.user !== "you"
                          ? "#8e929766"
                          : "#dcddde",
                    }}
                  >
                    {msg.text}
                  </div>
                </div>
              </div>
            );
          })}

          {isTyping && (
            <div style={styles.typingIndicator}>
              <span
                style={{
                  color:
                    isTyping === "foxy"
                      ? foxyTypingGlitch
                        ? "#ff2200"
                        : "#ff6b35"
                      : "#8e9297",
                  animation: foxyTypingGlitch ? "glitch 0.3s linear infinite" : "none",
                }}
              >
                {isTyping} is typing
              </span>
              <span style={styles.typingDots}>
                <span style={{ animation: "typing 1.4s infinite 0s" }}>.</span>
                <span style={{ animation: "typing 1.4s infinite 0.2s" }}>.</span>
                <span style={{ animation: "typing 1.4s infinite 0.4s" }}>.</span>
              </span>
            </div>
          )}

          <div ref={messagesEndRef} />
        </div>

        {/* Input */}
        <div style={styles.inputArea}>
          <div
            style={{
              ...styles.inputWrapper,
              borderColor:
                phase >= 4
                  ? "#ff6b3533"
                  : phase >= 3
                  ? "#ff6b3511"
                  : "transparent",
            }}
          >
            <span style={styles.inputPlus}>+</span>
            <input
              ref={inputRef}
              type="text"
              style={{
                ...styles.input,
                color: phase >= 5 ? "#ff6b35" : "#dcddde",
              }}
              placeholder={
                !waitingForUser
                  ? phase >= 5
                    ? "..."
                    : "wait..."
                  : phase >= 4
                  ? "type something... if you want"
                  : `Message #${channelName}`
              }
              value={inputValue}
              onChange={(e) => setInputValue(e.target.value)}
              onKeyDown={handleKeyDown}
              disabled={!waitingForUser}
            />
            <button
              style={{
                ...styles.sendBtn,
                opacity: inputValue.trim() && waitingForUser ? 1 : 0.3,
              }}
              onClick={handleSend}
              disabled={!waitingForUser || !inputValue.trim()}
            >
              ↵
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

<script>
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
    var xp=st.xp||0;
    // Track page visit for XP
    var page=location.pathname;
    var visited=st.pagesVisited||[];
    if(visited.indexOf(page)===-1){
      visited.push(page);
      st.pagesVisited=visited;
      st.xp=(st.xp||0)+2;
      localStorage.setItem('foxyverse-pet-state',JSON.stringify(st));
      xp=st.xp;
    }
    var levels=[0,10,25,50,100,200,350,550,800,1100,1500];
    var lv=1;for(var i=levels.length-1;i>=0;i--){if(xp>=levels[i]){lv=i+1;break}}
    document.getElementById('pcEmoji').textContent=pet.emoji;
    document.getElementById('pcName').textContent=pet.name;
    document.getElementById('pcXp').textContent='LV '+lv;
    document.getElementById('petCompanion').style.display='flex';
  }catch(e){}
})();
</script>

<script>
// ======== PET BONUS SYSTEM ========
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var sign=pet.sign;
    var tag=document.createElement('div');
    tag.className='pet-bonus-tag';

    switch(sign){
      case 'Aries':
        tag.textContent='BONUS: HEADBUTT (page shakes randomly)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.15){
            document.body.classList.add('bonus-aries','shaking');
            setTimeout(function(){document.body.classList.remove('shaking')},300);
          }
        },15000);
        break;

      case 'Taurus':
        document.body.classList.add('bonus-taurus');
        tag.textContent='BONUS: COMFORT READ (+10% text size)';
        document.body.appendChild(tag);
        break;

      case 'Gemini':
        tag.textContent='BONUS: MIRROR GLITCH (brief duplicates)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.12){
            var d=document.createElement('div');
            d.className='gemini-dupe';
            d.innerHTML=document.body.innerHTML.substring(0,2000);
            d.style.opacity='0.08';
            document.body.appendChild(d);
            setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove()},300)},200);
          }
        },20000);
        break;

      case 'Cancer':
        document.body.classList.add('bonus-cancer');
        tag.textContent='BONUS: WARM SHELL (cozy page tint)';
        document.body.appendChild(tag);
        break;

      case 'Leo':
        tag.textContent='BONUS: GOLDEN TRAIL (majestic cursor)';
        document.body.appendChild(tag);
        document.addEventListener('mousemove',function(e){
          var t=document.createElement('div');
          t.className='leo-trail';
          t.style.left=e.clientX+'px';t.style.top=e.clientY+'px';
          document.body.appendChild(t);
          setTimeout(function(){t.style.opacity='0'},50);
          setTimeout(function(){t.remove()},800);
        });
        break;

      case 'Virgo':
        var words=document.body.innerText.split(/\s+/).length;
        var mins=Math.ceil(words/200);
        var rt=document.createElement('div');
        rt.className='virgo-readtime';
        rt.textContent=mins+' MIN READ \u00B7 '+words+' WORDS';
        document.body.appendChild(rt);
        tag.textContent='BONUS: ARCHIVE SCAN (reading time shown)';
        document.body.appendChild(tag);
        break;

      case 'Libra':
        tag.textContent='BONUS: BALANCE (everything slightly centered)';
        document.body.appendChild(tag);
        document.body.style.textAlign='center';
        break;

      case 'Scorpio':
        tag.textContent='BONUS: SHADOW FLICKER (brief blackouts)';
        document.body.appendChild(tag);
        var bo=document.createElement('div');
        bo.className='scorpio-blackout';
        document.body.appendChild(bo);
        setInterval(function(){
          if(Math.random()<0.1){
            bo.style.opacity='1';
            setTimeout(function(){bo.style.opacity='0'},150);
          }
        },12000);
        break;

      case 'Sagittarius':
        tag.textContent='BONUS: WANDERLUST (discovers hidden pages)';
        document.body.appendChild(tag);
        var pages=['campfire.html','sekhmet.html','foxycord.html','the-lighthouse.html','lanci.html','nightmare.html','the-word-no.html','foxy-dream.html'];
        var pick=pages[Math.floor(Math.random()*pages.length)];
        var disc=document.createElement('div');
        disc.className='sag-discover';
        disc.innerHTML='<a href="'+pick+'">\u2192 your familiar found something</a>';
        document.body.appendChild(disc);
        setTimeout(function(){disc.style.opacity='1'},5000+Math.random()*15000);
        break;

      case 'Capricorn':
        tag.textContent='BONUS: SUMMIT TRACKER (exploration progress)';
        document.body.appendChild(tag);
        var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
        var visited=(st.pagesVisited||[]).length;
        var total=38;
        var bar=document.createElement('div');
        bar.className='capri-progress';
        bar.style.width=Math.min(100,visited/total*100)+'%';
        bar.title=visited+'/'+total+' pages explored';
        document.body.appendChild(bar);
        break;

      case 'Aquarius':
        tag.textContent='BONUS: DATA CORRUPTION (text glitches)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.1){
            var els=document.querySelectorAll('p,div,span,a');
            if(!els.length) return;
            var el=els[Math.floor(Math.random()*els.length)];
            if(!el.textContent||el.textContent.length<3) return;
            var orig=el.textContent;
            var chars=orig.split('');
            var idx=Math.floor(Math.random()*chars.length);
            chars[idx]=String.fromCharCode(9600+Math.floor(Math.random()*32));
            el.textContent=chars.join('');
            setTimeout(function(){el.textContent=orig},400);
          }
        },8000);
        break;

      case 'Pisces':
        document.body.classList.add('bonus-pisces');
        tag.textContent='BONUS: DREAM DRIFT (gentle page sway)';
        document.body.appendChild(tag);
        break;
    }
  }catch(e){}
})();
</script>
