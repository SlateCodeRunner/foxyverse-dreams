<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatch Your Familiar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;color:#c0b8a8;font-family:'Crimson Text',serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px)}

.back{position:fixed;top:16px;left:16px;font-family:'Fira Code',monospace;font-size:9px;color:rgba(255,255,255,0.08);text-decoration:none;letter-spacing:2px;z-index:100;transition:color 0.3s}
.back:hover{color:rgba(196,122,42,0.3)}

/* ======== EGG STATE ======== */
.egg-wrap{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.egg-title{font-family:'Cinzel',serif;font-size:clamp(18px,4vw,28px);color:rgba(196,161,100,0.4);letter-spacing:4px}
.egg-sub{font-family:'Fira Code',monospace;font-size:10px;color:rgba(255,255,255,0.08);letter-spacing:3px;text-transform:uppercase}

.egg{
  width:120px;height:150px;
  position:relative;cursor:pointer;
  margin:20px 0;
  transition:transform 0.3s;
}
.egg:hover{transform:scale(1.05)}
.egg:active{transform:scale(0.95)}

.egg-shell{
  width:120px;height:150px;
  background:radial-gradient(ellipse at 40% 30%,#2a1f3d,#1a1028 60%,#120a1e);
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  position:relative;
  box-shadow:0 0 40px rgba(100,60,160,0.1),inset 0 -10px 30px rgba(0,0,0,0.3);
  overflow:hidden;
}
.egg-shell::before{
  content:'';position:absolute;top:15%;left:20%;
  width:30%;height:25%;
  background:radial-gradient(ellipse,rgba(200,180,230,0.08),transparent);
  border-radius:50%;
  transform:rotate(-20deg);
}
/* Sigil on egg */
.egg-sigil{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:28px;opacity:0.15;
  animation:sigilPulse 3s ease-in-out infinite;
}
@keyframes sigilPulse{0%,100%{opacity:0.1;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.2;transform:translate(-50%,-50%) scale(1.05)}}

/* Egg wobble on click */
.egg.wobble{animation:wobble 0.5s ease-in-out}
@keyframes wobble{0%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(3deg)}100%{transform:rotate(0)}}

/* Crack animation */
.egg.cracking .egg-shell{animation:crack 1.5s ease-out forwards}
@keyframes crack{
  0%{transform:scale(1);opacity:1}
  30%{transform:scale(1.1);box-shadow:0 0 60px rgba(196,161,100,0.3)}
  60%{transform:scale(1.15);opacity:0.8}
  100%{transform:scale(1.5);opacity:0;filter:blur(10px)}
}

.egg-hint{font-size:12px;color:rgba(255,255,255,0.06);font-style:italic;margin-top:8px}
.click-count{font-family:'Fira Code',monospace;font-size:9px;color:rgba(196,161,100,0.1);margin-top:4px}

/* ======== HATCHED PET STATE ======== */
.pet-wrap{text-align:center;padding:40px 20px;display:none;flex-direction:column;align-items:center;gap:10px;animation:petReveal 1.5s ease-out}
@keyframes petReveal{0%{opacity:0;transform:scale(0.5) translateY(20px)}50%{opacity:1;transform:scale(1.1)}100%{transform:scale(1)}}

.pet-emoji{font-size:72px;filter:drop-shadow(0 0 20px var(--pet-glow,rgba(196,161,100,0.3)));margin-bottom:8px}
.pet-sign{font-family:'Fira Code',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--pet-color,rgba(196,161,100,0.5))}
.pet-name{font-family:'Cinzel',serif;font-size:clamp(22px,5vw,34px);color:rgba(255,255,255,0.7);letter-spacing:3px;margin:4px 0}
.pet-species{font-family:'Crimson Text',serif;font-style:italic;font-size:16px;color:rgba(255,255,255,0.25);margin-bottom:12px}
.pet-element{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:3px;padding:4px 14px;border:1px solid var(--pet-color,rgba(255,255,255,0.1));color:var(--pet-color,rgba(255,255,255,0.2));margin-bottom:16px}
.pet-desc{max-width:400px;font-size:15px;line-height:1.9;color:rgba(255,255,255,0.2);margin-bottom:16px}
.pet-trait{font-family:'Fira Code',monospace;font-size:9px;color:rgba(255,255,255,0.1);letter-spacing:1px;line-height:2}

.pet-actions{display:flex;gap:12px;margin-top:20px}
.pet-btn{
  padding:10px 24px;background:transparent;
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.2);
  font-family:'Fira Code',monospace;font-size:10px;letter-spacing:2px;
  cursor:pointer;transition:all 0.3s;text-decoration:none;
}
.pet-btn:hover{border-color:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)}
.pet-btn.danger{border-color:rgba(139,26,43,0.15);color:rgba(139,26,43,0.3)}
.pet-btn.danger:hover{border-color:rgba(139,26,43,0.4);color:rgba(139,26,43,0.7)}

/* Stars background */
.stars{position:fixed;inset:0;z-index:-1;overflow:hidden}
.star{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);animation:twinkle var(--d,5s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:var(--b,0.5)}}

/* Particles during hatch */
.hatch-particle{
  position:fixed;width:4px;height:4px;border-radius:50%;
  pointer-events:none;z-index:100;
  animation:hatchBurst 1.5s ease-out forwards;
}
@keyframes hatchBurst{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translate(var(--dx),var(--dy))}}
/* ======== FLOATING SOCIAL BAR ======== */
.social-float{position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:9998;display:flex;flex-direction:column;gap:0}
.social-float a{display:flex;align-items:center;width:36px;height:36px;overflow:hidden;text-decoration:none;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative}
.social-float a:hover{width:140px}
.social-float a .s-icon{min-width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;z-index:1}
.social-float a .s-icon svg{width:16px;height:16px;fill:currentColor}
.social-float a .s-label{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:1px;white-space:nowrap;padding-right:12px;opacity:0;transition:opacity 0.3s}
.social-float a:hover .s-label{opacity:1}
.sf-discord{background:rgba(88,101,242,0.15);color:rgba(88,101,242,0.7)}.sf-discord:hover{background:rgba(88,101,242,0.25);color:rgba(88,101,242,1)}.sf-discord .s-icon{animation:discordPulse 3s ease-in-out infinite}@keyframes discordPulse{0%,100%{background:rgba(88,101,242,0.15)}50%{background:rgba(88,101,242,0.25)}}
.sf-youtube{background:rgba(255,0,0,0.08);color:rgba(255,60,60,0.5)}.sf-youtube:hover{background:rgba(255,0,0,0.15);color:rgba(255,60,60,0.9)}
.sf-reddit{background:rgba(255,69,0,0.08);color:rgba(255,100,40,0.5)}.sf-reddit:hover{background:rgba(255,69,0,0.15);color:rgba(255,100,40,0.9)}
.sf-insta{background:rgba(225,48,108,0.08);color:rgba(225,80,120,0.5)}.sf-insta:hover{background:rgba(225,48,108,0.15);color:rgba(225,80,120,0.9)}
.sf-tiktok{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35)}.sf-tiktok:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7)}
.sf-facebook{background:rgba(24,119,242,0.08);color:rgba(66,133,244,0.5)}.sf-facebook:hover{background:rgba(24,119,242,0.15);color:rgba(66,133,244,0.9)}
@media(max-width:600px){.social-float{left:auto;right:0;top:auto;bottom:0;transform:none;flex-direction:row;width:100%;justify-content:center;background:rgba(6,6,8,0.95);border-top:1px solid rgba(255,255,255,0.04)}.social-float a{width:48px;height:40px}.social-float a:hover{width:48px}.social-float a .s-label{display:none}body{padding-bottom:44px}}


</style>
</head>

// Stars
var s=document.getElementById('stars');
for(var i=0;i<80;i++){var d=document.createElement('div');d.className='star';d.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+(Math.random()>0.9?3:2)+'px;height:2px;--d:'+(3+Math.random()*6)+'s;--b:'+(0.2+Math.random()*0.4)+';animation-delay:'+Math.random()*5+'s';s.appendChild(d)}

// Check for saved pet
var saved=localStorage.getItem('foxyverse-pet');
if(saved){
  try{showPet(JSON.parse(saved))}catch(e){localStorage.removeItem('foxyverse-pet')}
}

var clicks=0;
var hatchAt=3+Math.floor(Math.random()*5); // 3-7 taps to hatch

function tapEgg(){
  if(clicks>=hatchAt) return;
  clicks++;
  var egg=document.getElementById('egg');
  egg.classList.remove('wobble');
  void egg.offsetWidth;
  egg.classList.add('wobble');
  
  var sigil=egg.querySelector('.egg-sigil');
  sigil.style.opacity=0.1+clicks*0.05;
  
  document.getElementById('clickCount').textContent=clicks+' / ???';
  
  if(clicks>=hatchAt){
    setTimeout(function(){
      egg.classList.add('cracking');
      burstParticles();
      setTimeout(function(){
        var pet=PETS[Math.floor(Math.random()*12)];
        localStorage.setItem('foxyverse-pet',JSON.stringify(pet));
        showPet(pet);
      },1500);
    },400);
  }
}

function showPet(pet){
  document.getElementById('eggState').style.display='none';
  var pw=document.getElementById('petState');
  pw.style.display='flex';
  pw.style.setProperty('--pet-color',pet.color);
  pw.style.setProperty('--pet-glow',pet.glow);
  document.getElementById('petEmoji').textContent=pet.emoji;
  document.getElementById('petEmoji').style.setProperty('--pet-glow',pet.glow);
  document.getElementById('petSign').textContent=pet.symbol+' '+pet.sign+' '+pet.symbol;
  document.getElementById('petName').textContent=pet.name;
  document.getElementById('petSpecies').textContent=pet.species;
  document.getElementById('petElement').textContent=pet.element;
  document.getElementById('petDesc').textContent=pet.desc;
  document.getElementById('petTraits').innerHTML=pet.traits.map(function(t){return'\u2022 '+t}).join('<br>');
}

function burstParticles(){
  var colors=['#c4a164','#9d7cbf','#5fa8d3','#ff6b35','#e91e63'];
  for(var i=0;i<30;i++){
    var p=document.createElement('div');
    p.className='hatch-particle';
    p.style.cssText='left:50%;top:50%;background:'+colors[i%5]+';--dx:'+(Math.random()*300-150)+'px;--dy:'+(Math.random()*300-150)+'px;animation-delay:'+Math.random()*0.3+'s';
    document.body.appendChild(p);
    setTimeout(function(el){el.remove()},2000,p);
  }
}
