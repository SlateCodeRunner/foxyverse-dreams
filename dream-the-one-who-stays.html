<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream — The One Who Stays</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #050505; --amber: #c4793a; --dim-amber: #8a5428; --crystal-red: #8b2d2d; --crystal-glow: #c44a4a; --clearness: #b8c9d4; --moss: #2a3a24; --moss-light: #4a6340; --bone: #3a3530; --bone-light: #6b6058; --fox-orange: #d4783a; --text: #9a9488; --text-dim: #5a5650; --text-bright: #d4cec4; --scanline: rgba(0,0,0,0.15); }
  html, body { background: var(--bg); color: var(--text); font-family: 'VT323', monospace; font-size: 18px; line-height: 1.6; height: 100%; overflow: hidden; }
  #screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: hidden; }
  #screen::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px); pointer-events: none; z-index: 100; }
  #screen::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%); pointer-events: none; z-index: 99; }
  #clock { position: fixed; top: 20px; right: 24px; font-family: 'Space Mono', monospace; font-size: 14px; color: var(--text-dim); letter-spacing: 2px; z-index: 50; opacity: 0; transition: opacity 1.5s; }
  #clock.visible { opacity: 1; }
  #clock .held { color: var(--clearness); opacity: 0.7; }
  #dream-marker { position: fixed; top: 20px; left: 24px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 4px; color: var(--text-dim); z-index: 50; opacity: 0; transition: opacity 1.5s; }
  #dream-marker.visible { opacity: 0.6; }
  #scene { max-width: 640px; width: 100%; text-align: center; z-index: 10; }
  .dialog-box { border: 1px solid var(--text-dim); padding: 28px 32px; text-align: left; margin: 0 auto; max-width: 580px; position: relative; background: rgba(5,5,5,0.85); opacity: 0; transform: translateY(8px); transition: opacity 0.8s, transform 0.8s; }
  .dialog-box.visible { opacity: 1; transform: translateY(0); }
  .dialog-box .speaker { position: absolute; top: -10px; left: 16px; background: var(--bg); padding: 0 8px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--fox-orange); }
  .typed-line { min-height: 1.6em; color: var(--text); }
  .typed-line.bright { color: var(--text-bright); } .typed-line.amber { color: var(--amber); } .typed-line.clearness { color: var(--clearness); } .typed-line.fox { color: var(--fox-orange); } .typed-line.crystal { color: var(--crystal-glow); } .typed-line.dim { color: var(--text-dim); }
  .cursor { display: inline-block; width: 8px; height: 16px; background: var(--text); vertical-align: middle; margin-left: 2px; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  #title-screen { text-align: center; opacity: 0; transition: opacity 2s; }
  #title-screen.visible { opacity: 1; }
  #title-screen h1 { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 400; letter-spacing: 6px; text-transform: uppercase; color: var(--clearness); margin-bottom: 16px; }
  #title-screen .sub { font-family: 'VT323', monospace; font-size: 16px; color: var(--text-dim); letter-spacing: 2px; }
  #title-screen .fox-mark { font-size: 28px; margin-bottom: 24px; display: block; opacity: 0.7; }
  .scene-art { font-family: 'VT323', monospace; font-size: 14px; color: var(--text-dim); letter-spacing: 4px; text-align: center; margin: 24px 0; opacity: 0; transition: opacity 1.2s; line-height: 1.8; }
  .scene-art.visible { opacity: 0.5; }
  .scene-art .moss-c { color: var(--moss-light); } .scene-art .bone-c { color: var(--bone-light); } .scene-art .crystal-c { color: var(--crystal-glow); } .scene-art .clear-c { color: var(--clearness); } .scene-art .amber-c { color: var(--amber); }
  #profile-card { border: 1px solid var(--dim-amber); padding: 32px; max-width: 480px; margin: 0 auto; text-align: left; background: rgba(10,8,6,0.9); opacity: 0; transform: translateY(12px); transition: opacity 1.2s, transform 1.2s; }
  #profile-card.visible { opacity: 1; transform: translateY(0); }
  #profile-card .card-header { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 4px; color: var(--dim-amber); margin-bottom: 4px; }
  #profile-card .card-title { font-family: 'Space Mono', monospace; font-size: 20px; color: var(--amber); letter-spacing: 3px; margin-bottom: 20px; }
  #profile-card .fox-read { color: var(--text); font-size: 17px; line-height: 1.7; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(138,84,40,0.3); }
  #profile-card .trait { color: var(--text-dim); font-size: 15px; padding: 3px 0; padding-left: 12px; border-left: 2px solid var(--dim-amber); margin-bottom: 6px; }
  #profile-card .footer-line { margin-top: 20px; padding-top: 12px; border-top: 1px solid rgba(138,84,40,0.2); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--text-dim); text-align: center; font-style: italic; }
  #continue { position: fixed; bottom: 24px; right: 28px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-dim); letter-spacing: 2px; cursor: pointer; z-index: 50; opacity: 0; transition: opacity 0.6s; user-select: none; }
  #continue.visible { opacity: 0.6; } #continue:hover { opacity: 1; color: var(--clearness); }
  #location { position: fixed; bottom: 24px; left: 28px; font-family: 'Space Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-dim); z-index: 50; opacity: 0; transition: opacity 0.8s; }
  #location.visible { opacity: 0.5; }
  #fade { position: fixed; inset: 0; background: var(--bg); z-index: 80; opacity: 0; pointer-events: none; transition: opacity 1s; }
  #fade.active { opacity: 1; pointer-events: all; }
  @media (max-width: 600px) { body { font-size: 16px; } .dialog-box { padding: 20px 18px; } #title-screen h1 { font-size: 18px; letter-spacing: 4px; } #profile-card { padding: 20px; } #profile-card .card-title { font-size: 16px; } }
</style>
</head>
<body>
<div id="screen">
  <div id="dream-marker">dream</div>
  <div id="clock"><span class="held">12:46</span></div>
  <div id="scene"></div>
  <div id="continue">&#9656; continue</div>
  <div id="location"></div>
</div>
<div id="fade" class="active"></div>
<script>
const scenes=[{type:'title',location:'',render:()=>`<div id="title-screen"><span class="fox-mark">&#129418;</span><h1>The One Who Stays</h1><div class="sub">a dream for nessa</div></div>`,onShow:()=>{setTimeout(()=>document.getElementById('title-screen').classList.add('visible'),200)}},{type:'scene',location:'the garden',render:()=>`<div class="scene-art" id="art1"><span class="bone-c">&middot; &middot; &middot;</span> <span class="moss-c">~ ~ ~</span> <span class="bone-c">&middot; &middot; &middot;</span><br><span class="moss-c">~</span> <span class="crystal-c">&#9670;</span> <span class="moss-c">~</span><br><span class="bone-c">&middot; &middot; &middot;</span> <span class="moss-c">~ ~ ~</span> <span class="bone-c">&middot; &middot; &middot;</span></div><div class="dialog-box" id="dlg1"><div class="typed-line" id="t1"></div><div class="typed-line dim" id="t2"></div></div>`,lines:[{id:'t1',text:'the garden is quiet in a way that has nothing to do with sound.',cls:''},{id:'t2',text:'bone path left. moss path right. a fountain at the center, full of spent things.',cls:'dim'}],onShow:()=>{setTimeout(()=>document.getElementById('art1').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg1').classList.add('visible'),800)}},{type:'scene',location:'the fountain',render:()=>`<div class="scene-art" id="art2"><span class="crystal-c">&#9670;</span></div><div class="dialog-box" id="dlg2"><div class="typed-line crystal" id="t3"></div><div class="typed-line" id="t4"></div><div class="typed-line dim" id="t5"></div></div>`,lines:[{id:'t3',text:'the red crystal sits warm in your hand.',cls:'crystal'},{id:'t4',text:'it has been with you the whole way. through the static. through the hidden room. through the door that looked away until you looked at it first.',cls:''},{id:'t5',text:'it does not ask to be kept.',cls:'dim'}],onShow:()=>{setTimeout(()=>document.getElementById('art2').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg2').classList.add('visible'),600)}},{type:'scene',location:'the fountain',render:()=>`<div class="scene-art" id="art3"><span class="bone-c">&#9671; &#9671; &#9671;</span> <span class="crystal-c">&#9670;</span> <span class="bone-c">&#9671; &#9671; &#9671;</span></div><div class="dialog-box" id="dlg3"><div class="typed-line bright" id="t6"></div><div class="typed-line" id="t7"></div><div class="typed-line amber" id="t8"></div></div>`,lines:[{id:'t6',text:'you set it down at the edge of the fountain.',cls:'bright'},{id:'t7',text:"it rests among the others \u2014 dozens of spent things, each one someone's exchange. yours settles into the basin without ceremony.",cls:''},{id:'t8',text:'it does not call you back.',cls:'amber'}],onShow:()=>{setTimeout(()=>document.getElementById('art3').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg3').classList.add('visible'),600)}},{type:'scene',location:'the hidden room',render:()=>`<div class="scene-art" id="art4"><span class="clear-c">&#9643;</span></div><div class="dialog-box" id="dlg4"><div class="typed-line" id="t9"></div><div class="typed-line clearness" id="t10"></div><div class="typed-line dim" id="t11"></div></div>`,lines:[{id:'t9',text:'earlier, in the hidden room, you knelt beside something the size of a tooth. a shard. not humming. waiting.',cls:''},{id:'t10',text:'you gave it the older kind of attention. the kind that says: i see you. i will carry this.',cls:'clearness'},{id:'t11',text:'it showed you someone who stepped off the path entirely. then it went dark. satisfied.',cls:'dim'}],onShow:()=>{setTimeout(()=>document.getElementById('art4').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg4').classList.add('visible'),600)}},{type:'scene',location:'the threshold',render:()=>`<div class="scene-art" id="art5"><span class="bone-c">&#9612;</span><span class="clear-c">\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0</span><span class="bone-c">&#9616;</span></div><div class="dialog-box" id="dlg5"><div class="typed-line bright" id="t12"></div><div class="typed-line clearness" id="t13"></div><div class="typed-line" id="t14"></div></div>`,lines:[{id:'t12',text:'the sealed door opened inward. no resistance. no drama.',cls:'bright'},{id:'t13',text:'what came through was clearness. not a creature. not a wind. just \u2014 the end of deferral.',cls:'clearness'},{id:'t14',text:'the instability was never corruption. it was density. too many moments in the same place.',cls:''}],onShow:()=>{setTimeout(()=>document.getElementById('art5').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg5').classList.add('visible'),600)}},{type:'scene',location:'the chamber',render:()=>`<div class="scene-art" id="art6"><span class="amber-c">&#9899;</span> <span class="bone-c">&#9899;</span> <span class="bone-c">&#9899;</span> <span class="bone-c">&#9899;</span> <span class="bone-c">&#9899;</span></div><div class="dialog-box" id="dlg6"><div class="typed-line" id="t15"></div><div class="typed-line bright" id="t16"></div><div class="typed-line amber" id="t17"></div></div>`,lines:[{id:'t15',text:'five doors. the merkabah turning overhead. you had no crystal left. you had nothing to set on the pedestal.',cls:''},{id:'t16',text:'you stepped outside the logic that made the five choices feel mandatory.',cls:'bright'},{id:'t17',text:'the exit had always been there. it required nothing. only the end of looking for it.',cls:'amber'}],onShow:()=>{setTimeout(()=>document.getElementById('art6').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg6').classList.add('visible'),600)}},{type:'scene',location:'the clear place',render:()=>`<div class="scene-art" id="art7"><span class="amber-c">&#129418;</span></div><div class="dialog-box" id="dlg7"><span class="speaker">the fox</span><div class="typed-line fox" id="t18"></div><div class="typed-line" id="t19"></div><div class="typed-line fox" id="t20"></div></div>`,lines:[{id:'t18',text:'"caretaker," it says. not a question. recognition.',cls:'fox'},{id:'t19',text:'"you tended things. you sat with what couldn\'t be retrieved. you didn\'t extract \u2014 you witnessed."',cls:''},{id:'t20',text:'"yeah. that\'s the one."',cls:'fox'}],onShow:()=>{setTimeout(()=>document.getElementById('art7').classList.add('visible'),200);setTimeout(()=>document.getElementById('dlg7').classList.add('visible'),600)}},{type:'scene',location:'',render:()=>`<div class="dialog-box" id="dlg8" style="border-color:var(--clearness);text-align:center"><div class="typed-line clearness" id="t21" style="text-align:center"></div></div>`,lines:[{id:'t21',text:'you have not broken the loop so much as stood in it fully enough that it had nothing left to repeat.',cls:'clearness'}],onShow:()=>{setTimeout(()=>document.getElementById('dlg8').classList.add('visible'),400)}},{type:'scene',location:'the garden edge',render:()=>`<div class="dialog-box" id="dlg9"><div class="typed-line" id="t22"></div><div class="typed-line bright" id="t23"></div><div class="typed-line dim" id="t24"></div></div>`,lines:[{id:'t22',text:'you walk toward the threshold. the garden does not hold. the fox does not stop you.',cls:''},{id:'t23',text:'some departures are witnessed in silence because silence is the appropriate response.',cls:'bright'},{id:'t24',text:'you leave with less than you came with. that is exactly right.',cls:'dim'}],onShow:()=>{setTimeout(()=>document.getElementById('dlg9').classList.add('visible'),400)}},{type:'profile',location:'',render:()=>`<div id="profile-card"><div class="card-header">&#129418; the fox sees you</div><div class="card-title">The One Who Stays</div><div class="fox-read">you kept setting things down until there was nothing left to set down. then you walked through. that's not nothing \u2014 that's the whole thing.</div><div class="trait">finishes what they start</div><div class="trait">doesn't take what isn't needed</div><div class="trait">follows without needing to lead</div><div class="trait">sets things down cleanly</div><div class="trait">chooses without demanding outcomes</div><div class="footer-line">the fox watches. the fox remembers.</div></div>`,onShow:()=>{setTimeout(()=>document.getElementById('profile-card').classList.add('visible'),600)}}];
let currentScene=-1,typing=false;const fade=document.getElementById('fade'),scene=document.getElementById('scene'),cont=document.getElementById('continue'),clock=document.getElementById('clock'),marker=document.getElementById('dream-marker'),loc=document.getElementById('location');
function typeText(id,text,speed=28){return new Promise(r=>{const el=document.getElementById(id);if(!el){r();return}let i=0;const c=document.createElement('span');c.className='cursor';el.appendChild(c);const iv=setInterval(()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i]),c);i++}else{clearInterval(iv);setTimeout(()=>{if(c.parentNode)c.remove();r()},400)}},speed)})}
async function showScene(idx){if(idx>=scenes.length)return;typing=true;cont.classList.remove('visible');fade.classList.add('active');await sleep(800);const s=scenes[idx];scene.innerHTML=s.render();if(s.location){loc.textContent=s.location;loc.classList.add('visible')}else{loc.classList.remove('visible')}if(idx>=1){clock.classList.add('visible');marker.classList.add('visible')}await sleep(200);fade.classList.remove('active');await sleep(600);if(s.onShow)s.onShow();await sleep(800);if(s.lines){for(const l of s.lines){await typeText(l.id,l.text,25);await sleep(300)}}typing=false;await sleep(400);if(idx<scenes.length-1)cont.classList.add('visible')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function advance(){if(typing)return;currentScene++;showScene(currentScene)}
cont.addEventListener('click',advance);
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight'){e.preventDefault();advance()}});
let touchStart=0;document.addEventListener('touchstart',()=>{touchStart=Date.now()});document.addEventListener('touchend',()=>{if(Date.now()-touchStart<300)advance()});
setTimeout(advance,800);
</script>
<!-- nessa dreamed of still water. the word for stillness is not 'still'. it is on the BIP-39 list though. or is it? -->
</body>
</html>
