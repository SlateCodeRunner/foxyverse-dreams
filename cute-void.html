<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>the cute void</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a050a;color:#ee88cc;font-family:'Fira Code',monospace;font-size:13px;overflow:hidden;height:100vh;width:100vw;cursor:none}
#cursor{position:fixed;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle,rgba(238,136,204,0.6),transparent);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .3s,height .3s,background .3s}
#cursor.scared{width:40px;height:40px;background:radial-gradient(circle,rgba(238,136,204,0),rgba(238,136,204,0.15),transparent);animation:tremble .1s infinite}
@keyframes tremble{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(calc(-50% + 2px),calc(-50% - 1px))}75%{transform:translate(calc(-50% - 2px),calc(-50% + 1px))}}
#game{position:relative;width:100vw;height:100vh;overflow:hidden}
#room{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:background 2s,filter 2s}
.wall{position:absolute;opacity:.03;font-size:200px;user-select:none;transition:opacity 4s,color 4s,transform 8s}
#narration{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);max-width:600px;width:90%;text-align:center;font-size:12px;color:#ffaadd;opacity:0;transition:opacity 1.5s;line-height:1.8;letter-spacing:.5px;z-index:100}
#narration.show{opacity:1}
#depth{position:fixed;top:12px;right:16px;font-size:9px;color:rgba(238,136,204,0.15);z-index:100}
#prompt{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(238,136,204,0.1);z-index:100;letter-spacing:2px}
.entity{position:absolute;font-size:30px;cursor:none;transition:transform 2s,opacity 2s;user-select:none;filter:drop-shadow(0 0 8px rgba(238,136,204,0.2))}
.entity:hover{transform:scale(1.3)}
.entity.wrong{animation:wrongSmile 3s ease-in-out infinite}
@keyframes wrongSmile{0%,100%{transform:rotate(0deg)}50%{transform:rotate(180deg)}}
.door{position:absolute;width:60px;height:90px;border:1px solid rgba(238,136,204,0.08);background:rgba(238,136,204,0.02);cursor:none;transition:all .5s;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(238,136,204,0.15)}
.door:hover{border-color:rgba(238,136,204,0.2);background:rgba(238,136,204,0.05);box-shadow:0 0 20px rgba(238,136,204,0.05)}
.door .knob{position:absolute;right:8px;top:50%;width:6px;height:6px;border-radius:50%;background:rgba(238,136,204,0.1)}
.decay-1{filter:hue-rotate(0deg) brightness(1)}
.decay-2{filter:hue-rotate(20deg) brightness(0.9) contrast(1.1)}
.decay-3{filter:hue-rotate(60deg) brightness(0.7) contrast(1.3) saturate(1.5)}
.decay-4{filter:hue-rotate(120deg) brightness(0.5) contrast(1.5) saturate(0.5)}
.decay-5{filter:hue-rotate(180deg) brightness(0.3) contrast(2) saturate(0.3) invert(0.1)}
#overlay{position:fixed;inset:0;background:rgba(10,5,10,0);transition:background 3s;pointer-events:none;z-index:50}
.back{position:fixed;top:8px;left:8px;font-size:8px;color:rgba(238,136,204,0.06);text-decoration:none;z-index:200}.back:hover{color:rgba(238,136,204,0.3)}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="overlay"></div>
<a href="index.html" class="back">&larr;</a>
<div id="depth"></div>
<div id="game"><div id="room"></div></div>
<div id="narration"></div>
<div id="prompt">click to descend</div>
<script>
var depth=0,maxDepth=12,entities=[],fear=0,narrationTimer=null;
var cursor=document.getElementById('cursor');
document.addEventListener('mousemove',function(e){cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';});
var ROOMS=[
{bg:'#0a050a',walls:String.fromCodePoint(0x1F496),wallCount:8,entities:[String.fromCodePoint(0x1F9F8),String.fromCodePoint(0x1F380),String.fromCodePoint(0x1F338),String.fromCodePoint(0x2728)],doors:3,text:'you find a room made of something soft. the walls pulse faintly pink. everything here loves you.'},
{bg:'#0a0508',walls:String.fromCodePoint(0x1F495),wallCount:10,entities:[String.fromCodePoint(0x1F9F8),String.fromCodePoint(0x1F36C),String.fromCodePoint(0x1F337),String.fromCodePoint(0x1F49D)],doors:3,text:'another room. the teddy bears are facing the walls. they were facing you a moment ago.'},
{bg:'#0a0407',walls:String.fromCodePoint(0x1F497),wallCount:12,entities:[String.fromCodePoint(0x1F9F8),String.fromCodePoint(0x1F380),String.fromCodePoint(0x1F441),String.fromCodePoint(0x2728)],doors:2,text:"the candy on the floor spells something. you can't read it from this angle. from every angle."},
{bg:'#0a0306',walls:String.fromCodePoint(0x1FA77),wallCount:14,entities:[String.fromCodePoint(0x1F441),String.fromCodePoint(0x1F9F8),String.fromCodePoint(0x1FAE6),String.fromCodePoint(0x1F338)],doors:2,text:'the flowers are growing toward you. not toward the light. there is no light. toward you.'},
{bg:'#080206',walls:String.fromCodePoint(0x2764),wallCount:16,entities:[String.fromCodePoint(0x1F441),String.fromCodePoint(0x1F441),String.fromCodePoint(0x1F9F8),String.fromCodePoint(0x1FAE0)],doors:2,text:'the teddy bears have too many eyes. you count seven on the nearest one. it blinks three.'},
{bg:'#060105',walls:String.fromCodePoint(0x1F5A4),wallCount:18,entities:[String.fromCodePoint(0x1FAE0),String.fromCodePoint(0x1F441),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F9F8)],doors:2,text:"you hear humming. a lullaby you almost recognize. it's coming from inside the walls."},
{bg:'#050104',walls:String.fromCodePoint(0x1F5A4),wallCount:20,entities:[String.fromCodePoint(0x1F573),String.fromCodePoint(0x1FAE0),String.fromCodePoint(0x1F441),String.fromCodePoint(0x1F441)],doors:1,text:'the cute is peeling. underneath the pink is something that has always been here. waiting. smiling.'},
{bg:'#040103',walls:String.fromCodePoint(0x1FA78),wallCount:22,entities:[String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F441),String.fromCodePoint(0x1FAE5)],doors:1,text:'the void is not empty. it is full of things that learned to look adorable.'},
{bg:'#030102',walls:String.fromCodePoint(0x26AB),wallCount:25,entities:[String.fromCodePoint(0x1FAE5),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F441)],doors:1,text:"every surface smiles. the smiles don't stop at the edges of the faces."},
{bg:'#020101',walls:String.fromCodePoint(0x2B1B),wallCount:28,entities:[String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1FAE5),String.fromCodePoint(0x1FAE5)],doors:1,text:"you are the only thing here that isn't cute. that's how it finds you."},
{bg:'#010101',walls:' ',wallCount:30,entities:[String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F573),String.fromCodePoint(0x1F573)],doors:1,text:'the abyss smiles back.'},
{bg:'#010001',walls:'',wallCount:0,entities:[],doors:0,text:'you are the cute void now.\n\nyou have always been the cute void.\n\n'+String.fromCodePoint(0x1F496)},
{bg:'#000000',walls:'',wallCount:0,entities:[],doors:0,text:'...'}
];
function narrate(txt,dur){var n=document.getElementById('narration');n.className='';n.textContent='';setTimeout(function(){n.textContent=txt;n.className='show';if(dur)narrationTimer=setTimeout(function(){n.className='';},dur);},500);}
function spawnWalls(room){var container=document.getElementById('room');for(var i=0;i<room.wallCount;i++){var w=document.createElement('div');w.className='wall';w.textContent=room.walls;w.style.left=Math.random()*90+'vw';w.style.top=Math.random()*90+'vh';w.style.opacity=Math.random()*0.04+0.01;w.style.transform='rotate('+Math.floor(Math.random()*360)+'deg)';w.style.fontSize=(100+Math.random()*200)+'px';if(depth>5)w.style.color='rgba(238,136,204,'+(0.02+Math.random()*0.03)+')';container.appendChild(w);setTimeout((function(el){return function(){el.style.transform='rotate('+(Math.random()*720-360)+'deg) scale('+(0.5+Math.random())+')';}})(w),100);}}
function getEntityText(e,d){var texts={};texts[String.fromCodePoint(0x1F9F8)]=['it\'s soft.','it\'s watching.','it remembers your name.','it was never a toy.','it\'s you.'];texts[String.fromCodePoint(0x1F380)]=['pretty.','it tightens.','it won\'t come off.','it\'s a leash.'];texts[String.fromCodePoint(0x1F338)]=['smells sweet.','smells wrong.','smells like forgetting.','there are teeth in the petals.'];texts[String.fromCodePoint(0x2728)]=['sparkle.','the sparkle follows you.','the sparkle is hungry.'];texts[String.fromCodePoint(0x1F441)]=['it sees you.','it has always seen you.','it loves what it sees.','you are its favorite.'];texts[String.fromCodePoint(0x1F36C)]=['sweet.','too sweet.','the sweetness has weight.'];texts[String.fromCodePoint(0x1F49D)]=['a gift.','for you.','always for you.','you can\'t return it.'];texts[String.fromCodePoint(0x1F337)]=['growing.','growing toward you.','growing into you.'];texts[String.fromCodePoint(0x1FAE6)]=['it whispers.','it whispers your name.','it whispers what you\'re afraid of.'];texts[String.fromCodePoint(0x1FAE0)]=['melting.','becoming.','the face underneath is yours.'];texts[String.fromCodePoint(0x1F573)]=['the hole smiles.','the hole is warm.','the hole is where the cute things come from.','home.'];texts[String.fromCodePoint(0x1FAE5)]=['almost nothing.','almost.','the almost is the worst part.'];var arr=texts[e]||['...'];return arr[Math.min(d,arr.length-1)];}
function spawnEntities(room){var container=document.getElementById('room');room.entities.forEach(function(e,i){var el=document.createElement('div');el.className='entity'+(depth>4?' wrong':'');el.textContent=e;el.style.left=(15+Math.random()*70)+'vw';el.style.top=(15+Math.random()*60)+'vh';el.style.fontSize=(20+Math.random()*30)+'px';el.style.animationDelay=(Math.random()*3)+'s';el.onclick=function(){fear++;if(fear>3)cursor.className='scared';narrate(getEntityText(e,depth),4000);};container.appendChild(el);});}
function spawnDoors(room){var container=document.getElementById('room');for(var i=0;i<room.doors;i++){var d=document.createElement('div');d.className='door';var icons=[String.fromCodePoint(0x1F496),String.fromCodePoint(0x1F338),String.fromCodePoint(0x2728),String.fromCodePoint(0x1F380)];d.innerHTML=(depth<6?icons[i%4]:'<span style="opacity:0.3">'+String.fromCodePoint(0x25BC)+'</span>')+'<div class="knob"></div>';d.style.left=(20+i*25)+'vw';d.style.top=(30+Math.random()*30)+'vh';d.onclick=function(){descend();};container.appendChild(d);}}
function descend(){depth++;if(depth>maxDepth)return;var room=ROOMS[depth];var container=document.getElementById('room');var overlay=document.getElementById('overlay');overlay.style.background='rgba(10,5,10,1)';setTimeout(function(){container.innerHTML='';container.style.background=room.bg;var decayLevel=Math.min(5,Math.floor(depth/2.5)+1);document.body.className='decay-'+decayLevel;spawnWalls(room);spawnEntities(room);spawnDoors(room);document.getElementById('depth').textContent=depth<11?'depth: '+depth+(depth>6?' \u25BC\u25BC\u25BC':depth>3?' \u25BC\u25BC':' \u25BC'):'';document.getElementById('prompt').textContent=depth>=11?'':'click a door to descend';document.getElementById('prompt').style.color='rgba(238,136,204,'+(0.1-depth*0.007)+')';narrate(room.text,depth>=11?0:8000);setTimeout(function(){overlay.style.background='rgba(10,5,10,0)';},800);if(depth>=11){document.getElementById('prompt').textContent='';setTimeout(function(){document.body.style.cursor='default';cursor.style.display='none';},3000);}},1500);}
(function(){var room=ROOMS[0];document.getElementById('room').style.background=room.bg;document.getElementById('depth').textContent='depth: 0 \u25BC';spawnWalls(room);spawnEntities(room);spawnDoors(room);setTimeout(function(){narrate(room.text,8000);},1000);setInterval(function(){var walls=document.querySelectorAll('.wall');walls.forEach(function(w){w.style.left=Math.random()*90+'vw';w.style.top=Math.random()*90+'vh';});},8000);setInterval(function(){var ents=document.querySelectorAll('.entity');ents.forEach(function(e){e.style.transform='scale('+(0.8+Math.random()*0.5)+')';});},3000);})();
</script>
</body></html>
