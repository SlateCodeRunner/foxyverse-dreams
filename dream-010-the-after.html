<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>010 - The After</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Press Start 2P',monospace}
#s{width:100vw;height:100vh;position:relative;overflow:hidden}
#s::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none;z-index:100}
#bg{position:absolute;top:0;left:0;right:0;bottom:80px;background:linear-gradient(180deg,#0a0d18 0%,#0d1020 40%,#080a15 100%);overflow:hidden}
#d{position:absolute;bottom:0;left:0;right:0;height:80px;background:rgba(10,8,12,0.95);border-top:2px solid rgba(180,160,140,0.15);padding:16px 24px;display:flex;flex-direction:column;justify-content:center}
#sp{color:rgba(200,80,60,0.6);font-size:7px;margin-bottom:8px;letter-spacing:2px}
#tx{color:rgba(180,160,140,0.7);font-size:9px;line-height:1.8;letter-spacing:0.5px}
#cu{display:inline-block;width:8px;height:2px;background:rgba(180,160,140,0.4);animation:bk 1s step-end infinite;vertical-align:middle;margin-left:4px}
@keyframes bk{50%{opacity:0}}
#tag{position:absolute;top:12px;right:12px;color:rgba(180,160,140,0.08);font-size:6px;letter-spacing:2px}
#em{position:absolute;top:12px;left:12px;color:rgba(200,80,60,0.2);font-size:6px;letter-spacing:1px}
#pr{position:absolute;bottom:90px;right:20px;color:rgba(180,160,140,0.15);font-size:6px;animation:pu 2s ease-in-out infinite}
@keyframes pu{0%,100%{opacity:0.15}50%{opacity:0.4}}
.g{color:rgba(180,160,140,0.04);position:absolute;font-size:48px;user-select:none}
.m{color:rgba(180,160,140,0.12);position:absolute;font-size:10px;user-select:none}
.sm{color:rgba(180,160,140,0.06);position:absolute;font-size:7px;user-select:none}
@keyframes fl{0%{opacity:1}50%{opacity:0.7}100%{opacity:1}}
@keyframes br{0%{opacity:0.3}50%{opacity:1}100%{opacity:0.3}}
@keyframes glow{0%{text-shadow:0 0 10px rgba(255,180,60,0.1)}50%{text-shadow:0 0 30px rgba(255,180,60,0.3)}100%{text-shadow:0 0 10px rgba(255,180,60,0.1)}}

</style></head><body>
<div id="s">
<div id="bg">
<div style="position:absolute;top:0;left:0;width:100%;height:70%;background:linear-gradient(180deg,rgba(10,15,30,0.8),rgba(15,20,40,0.3))">
<div style="position:absolute;top:10%;left:20%;width:2px;height:2px;background:rgba(255,255,200,0.12);border-radius:50%"></div>
<div style="position:absolute;top:15%;left:50%;width:1px;height:1px;background:rgba(255,255,200,0.08);border-radius:50%"></div>
<div style="position:absolute;top:8%;left:70%;width:2px;height:2px;background:rgba(255,255,200,0.1);border-radius:50%"></div>
<div style="position:absolute;top:22%;left:35%;width:1px;height:1px;background:rgba(255,255,200,0.06);border-radius:50%"></div>
<div style="position:absolute;top:18%;left:80%;width:1px;height:1px;background:rgba(255,255,200,0.08);border-radius:50%"></div>
<div style="position:absolute;bottom:5%;left:15%;width:60px;height:2px;background:rgba(255,200,100,0.04)"></div>
<div style="position:absolute;bottom:8%;left:45%;width:40px;height:2px;background:rgba(255,200,100,0.03)"></div>
</div>
<div style="position:absolute;bottom:20%;left:42%;width:5px;height:10px;background:rgba(140,130,120,0.1)"></div>
<div style="position:absolute;bottom:20%;left:52%;width:5px;height:10px;background:rgba(200,180,100,0.06)"></div>
<div style="position:absolute;bottom:17%;left:40%;width:24px;height:3px;background:rgba(80,70,60,0.06)"></div>
</div>
<div id="tag">010 / the shape changed</div>
<div id="em">peace</div>
<div id="pr">click anywhere</div>
<div id="d"><div id="sp">VIXEN</div><div id="tx"><span id="t"></span><span id="cu"></span></div></div>
</div>
<script>
const L=["...",
"",
"the hug ended.",
"the room stripped to essentials.",
"",
"the window is everything now.",
"stars. a skyline with tiny warm windows.",
"cars moving slow.",
"",
"two pixel sprites side by side.",
"not touching. not talking.",
"one shadow underneath both.",
"",
"no clock. no monitor. no desk.",
"nothing that isn't this moment.",
"",
"the scanlines are the softest",
"they've ever been.",
"",
"..."];
let li=0,ci=0;const t=document.getElementById('t');
function tc(){if(li>=L.length)return;const l=L[li];if(ci<l.length){t.textContent+=l[ci];ci++;setTimeout(tc,40+Math.random()*30)}}
function adv(){if(li>=L.length){document.getElementById('s').style.transition='opacity 3s';document.getElementById('s').style.opacity='0';setTimeout(()=>window.location.href='foxydreams.html',3500);return}t.textContent='';ci=0;if(L[li]===''){li++;adv();return}tc();li++}
document.addEventListener('click',adv);document.addEventListener('keydown',adv);
setTimeout(adv,2000);
</script></body></html>
