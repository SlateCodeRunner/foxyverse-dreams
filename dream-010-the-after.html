<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fira+Code:wght@300;400&family=Caveat:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.room {
  position: absolute;
  inset: 0;
  background: #030206;
}

/* EVERYTHING IS QUIETER — the room is settling */

/* FLOOR */
.floor {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 42%;
  background: linear-gradient(to top, #080606 0%, #040303 100%);
}

/* WALL */
.wall {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 58%;
  background: #040308;
}

/* WINDOW — big now, the camera moved, the window is the main subject */
.window {
  position: absolute;
  top: 8%;
  left: 20%;
  width: 60%;
  height: 48%;
  border: 2px solid rgba(60,55,50,0.12);
  background: linear-gradient(to bottom, #0c1220 0%, #080e18 40%, #060a12 70%, #040810 100%);
  overflow: hidden;
  z-index: 10;
}

/* Window frame cross */
.window::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: rgba(60,55,50,0.1);
  z-index: 3;
}

.window::after {
  content: '';
  position: absolute;
  top: 45%;
  left: 0;
  width: 100%;
  height: 2px;
  background: rgba(60,55,50,0.1);
  z-index: 3;
}

/* STARS — more visible now, the window is bigger */
.w-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(196,191,182,0.3);
  image-rendering: pixelated;
  z-index: 2;
}

.star-bright {
  width: 3px;
  height: 3px;
  background: rgba(220,210,195,0.4);
  box-shadow: 0 0 4px rgba(220,210,195,0.1);
}

/* Slow twinkling */
.tw1 { animation: twinkle1 6s ease-in-out infinite; }
.tw2 { animation: twinkle1 6s ease-in-out infinite; animation-delay: -2s; }
.tw3 { animation: twinkle1 6s ease-in-out infinite; animation-delay: -4s; }

@keyframes twinkle1 {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.5; }
}

/* SKYLINE — faint suggestion of buildings/rooftops at bottom of window */
.skyline {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 20%;
  z-index: 2;
}

.building {
  position: absolute;
  bottom: 0;
  background: #050810;
  border-top: 1px solid rgba(40,50,60,0.15);
}

.b1 { left: 5%; width: 12%; height: 60%; }
.b2 { left: 20%; width: 8%; height: 45%; }
.b3 { left: 32%; width: 15%; height: 75%; }
.b4 { left: 50%; width: 10%; height: 50%; }
.b5 { left: 63%; width: 18%; height: 65%; }
.b6 { left: 84%; width: 12%; height: 40%; }

/* Building windows — tiny warm dots */
.bw {
  position: absolute;
  width: 2px;
  height: 2px;
  background: rgba(255,220,150,0.12);
  image-rendering: pixelated;
}

/* CAR HEADLIGHTS — slower now, peaceful */
.car-light {
  position: absolute;
  bottom: 8%;
  width: 5px;
  height: 2px;
  background: rgba(255,240,200,0.2);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255,240,200,0.06);
  z-index: 2;
}

.car-a { animation: carSlow 20s linear infinite; }
.car-b { animation: carSlow 20s linear infinite; animation-delay: -8s; }
.car-c { animation: carSlowReverse 25s linear infinite; animation-delay: -5s; bottom: 10%; }

@keyframes carSlow {
  0% { left: -3%; opacity: 0; }
  5% { opacity: 0.8; }
  95% { opacity: 0.8; }
  100% { left: 103%; opacity: 0; }
}

@keyframes carSlowReverse {
  0% { right: -3%; opacity: 0; left: auto; }
  5% { opacity: 0.6; }
  95% { opacity: 0.6; }
  100% { right: 103%; opacity: 0; left: auto; }
}

/* WINDOW SILL — the ledge they're leaning near */
.sill {
  position: absolute;
  top: 56%;
  left: 18%;
  width: 64%;
  height: 3px;
  background: rgba(40,35,30,0.25);
  z-index: 15;
}

/* ============== THE TWO FIGURES — side by side at the window ============== */

.figures {
  position: absolute;
  bottom: 32%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  align-items: flex-end;
  z-index: 30;
}

/* FOXY sprite — relaxed, looking out */
.foxy-sprite {
  width: 18px;
  height: 30px;
  position: relative;
  image-rendering: pixelated;
}

.f-hair {
  position: absolute;
  top: 0;
  left: 1px;
  width: 16px;
  height: 22px;
  background: #080606;
  border-radius: 3px 3px 0 0;
  border: 1px solid rgba(80,65,50,0.04);
}

.f-head {
  position: absolute;
  top: 3px;
  left: 4px;
  width: 10px;
  height: 8px;
  background: #18130e;
  border-radius: 1px;
}

/* Eyes looking out the window — small bright dots */
.f-eye {
  position: absolute;
  top: 6px;
  width: 2px;
  height: 2px;
  background: rgba(140,110,70,0.25);
}

.f-eye-l { left: 5px; }
.f-eye-r { left: 10px; }

.f-body {
  position: absolute;
  top: 12px;
  left: 2px;
  width: 14px;
  height: 12px;
  background: #0b0908;
  border: 1px solid rgba(196,191,182,0.03);
}

.f-crystal {
  position: absolute;
  top: 14px;
  left: 8px;
  width: 3px;
  height: 3px;
  background: rgba(139,26,26,0.3);
  box-shadow: 0 0 4px rgba(139,26,26,0.1);
  animation: crystalSlow 5s ease-in-out infinite;
}

@keyframes crystalSlow {
  0%, 100% { box-shadow: 0 0 3px rgba(139,26,26,0.08); }
  50% { box-shadow: 0 0 8px rgba(139,26,26,0.2); }
}

.f-legs {
  position: absolute;
  top: 24px;
  left: 4px;
  display: flex;
  gap: 2px;
}

.f-leg {
  width: 4px;
  height: 6px;
  background: #080606;
  border: 1px solid rgba(196,191,182,0.02);
}

/* VIXEN sprite — solid now, not a ghost, standing beside foxy */
.vixen-sprite {
  width: 16px;
  height: 28px;
  position: relative;
  image-rendering: pixelated;
  opacity: 0.7;
}

.vx-ear-l, .vx-ear-r {
  position: absolute;
  top: -4px;
  width: 4px;
  height: 5px;
  background: rgba(212,168,71,0.08);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

.vx-ear-l { left: 2px; }
.vx-ear-r { right: 2px; }

.vx-head {
  position: absolute;
  top: 0;
  left: 2px;
  width: 12px;
  height: 8px;
  background: rgba(212,168,71,0.04);
  border: 1px solid rgba(212,168,71,0.05);
}

.vx-eye {
  position: absolute;
  top: 3px;
  width: 2px;
  height: 2px;
  background: rgba(212,168,71,0.15);
}

.vx-eye-l { left: 4px; }
.vx-eye-r { left: 9px; }

.vx-body {
  position: absolute;
  top: 8px;
  left: 1px;
  width: 14px;
  height: 12px;
  background: rgba(212,168,71,0.025);
  border: 1px solid rgba(212,168,71,0.04);
}

.vx-crystal {
  position: absolute;
  top: 10px;
  left: 6px;
  width: 3px;
  height: 3px;
  background: rgba(212,168,71,0.18);
  box-shadow: 0 0 4px rgba(212,168,71,0.06);
  animation: vxCrystalSlow 5s ease-in-out infinite;
  animation-delay: -1s;
}

@keyframes vxCrystalSlow {
  0%, 100% { box-shadow: 0 0 3px rgba(212,168,71,0.05); }
  50% { box-shadow: 0 0 8px rgba(212,168,71,0.15); }
}

.vx-legs {
  position: absolute;
  top: 20px;
  left: 3px;
  display: flex;
  gap: 2px;
}

.vx-leg {
  width: 4px;
  height: 6px;
  background: rgba(212,168,71,0.015);
  border: 1px solid rgba(212,168,71,0.03);
}

/* SHARED SHADOW */
.shared-shadow {
  position: absolute;
  bottom: 25%;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 30px;
  background: radial-gradient(ellipse at 50% 20%, rgba(0,0,0,0.15) 0%, transparent 70%);
  z-index: 25;
  filter: blur(3px);
}

/* SOFT LIGHT from window on the figures */
.window-light {
  position: absolute;
  bottom: 20%;
  left: 20%;
  width: 60%;
  height: 50%;
  background: radial-gradient(ellipse at 50% 20%, rgba(10,14,25,0.08) 0%, transparent 60%);
  z-index: 20;
  pointer-events: none;
}

/* SCANLINES — softest yet */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.04) 3px,
    rgba(0,0,0,0.04) 6px
  );
  pointer-events: none;
  z-index: 500;
}

/* DREAM ID */
.dream-id {
  position: absolute;
  top: 2%;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace;
  font-size: 4px;
  color: rgba(90,85,80,0.04);
  letter-spacing: 4px;
  z-index: 50;
}

/* NO CLOCK. time doesn't matter in the after. */

/* DIALOG — quiet, sparse, almost nothing */
.dialog {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 8px 16px 12px;
  background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.85) 50%, transparent 100%);
}

.dialog-box {
  border: 1px solid rgba(212,168,71,0.04);
  background: rgba(3,2,4,0.95);
  padding: 12px 16px;
  position: relative;
}

.dialog-text {
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  color: rgba(196,191,182,0.2);
  letter-spacing: 1px;
  line-height: 2.2;
  text-align: center;
}

.dialog-text .g { color: rgba(212,168,71,0.28); }

.cursor {
  display: inline-block;
  width: 6px;
  height: 9px;
  background: rgba(200,140,60,0.1);
  margin-left: 3px;
  animation: blink 1.5s steps(1) infinite;
  vertical-align: middle;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>
<body>

<div class="room">
  <div class="wall"></div>
  <div class="floor"></div>
  <div class="window-light"></div>

  <!-- WINDOW — the main subject now -->
  <div class="window">
    <!-- STARS -->
    <div class="w-star tw1" style="top:8%;left:15%;"></div>
    <div class="w-star tw2" style="top:14%;left:55%;"></div>
    <div class="w-star tw3" style="top:5%;left:78%;"></div>
    <div class="w-star tw1" style="top:20%;left:35%;"></div>
    <div class="w-star tw2" style="top:10%;left:90%;"></div>
    <div class="w-star star-bright tw3" style="top:12%;left:42%;"></div>
    <div class="w-star tw1" style="top:18%;left:68%;"></div>
    <div class="w-star tw2" style="top:7%;left:25%;"></div>

    <!-- SKYLINE -->
    <div class="skyline">
      <div class="building b1">
        <div class="bw" style="top:15%;left:30%;"></div>
        <div class="bw" style="top:15%;left:60%;"></div>
        <div class="bw" style="top:40%;left:30%;"></div>
      </div>
      <div class="building b2"></div>
      <div class="building b3">
        <div class="bw" style="top:10%;left:25%;"></div>
        <div class="bw" style="top:10%;left:55%;"></div>
        <div class="bw" style="top:30%;left:25%;"></div>
        <div class="bw" style="top:30%;left:55%;"></div>
        <div class="bw" style="top:50%;left:40%;"></div>
      </div>
      <div class="building b4">
        <div class="bw" style="top:20%;left:40%;"></div>
      </div>
      <div class="building b5">
        <div class="bw" style="top:12%;left:20%;"></div>
        <div class="bw" style="top:12%;left:50%;"></div>
        <div class="bw" style="top:12%;left:80%;"></div>
        <div class="bw" style="top:35%;left:35%;"></div>
        <div class="bw" style="top:35%;left:65%;"></div>
      </div>
      <div class="building b6"></div>
    </div>

    <!-- CARS — slow, peaceful -->
    <div class="car-light car-a"></div>
    <div class="car-light car-b"></div>
    <div class="car-light car-c"></div>
  </div>

  <!-- SILL -->
  <div class="sill"></div>

  <!-- SHARED SHADOW -->
  <div class="shared-shadow"></div>

  <!-- THE TWO FIGURES — side by side, looking out -->
  <div class="figures">
    <div class="foxy-sprite">
      <div class="f-hair"></div>
      <div class="f-head">
        <div class="f-eye f-eye-l"></div>
        <div class="f-eye f-eye-r"></div>
      </div>
      <div class="f-body"></div>
      <div class="f-crystal"></div>
      <div class="f-legs">
        <div class="f-leg"></div>
        <div class="f-leg"></div>
      </div>
    </div>

    <div class="vixen-sprite">
      <div class="vx-ear-l"></div>
      <div class="vx-ear-r"></div>
      <div class="vx-head">
        <div class="vx-eye vx-eye-l"></div>
        <div class="vx-eye vx-eye-r"></div>
      </div>
      <div class="vx-body"></div>
      <div class="vx-crystal"></div>
      <div class="vx-legs">
        <div class="vx-leg"></div>
        <div class="vx-leg"></div>
      </div>
    </div>
  </div>
</div>

<!-- SCANLINES -->
<div class="scanlines"></div>

<!-- DREAM ID -->
<div class="dream-id">VIXEN DREAM 010 · THE AFTER · NO CLOCK · NO NEED</div>

<!-- DIALOG — almost nothing -->
<div class="dialog">
  <div class="dialog-box">
    <div class="dialog-text">
      <span class="g">...</span><span class="cursor"></span>
    </div>
  </div>
</div>

</body>
