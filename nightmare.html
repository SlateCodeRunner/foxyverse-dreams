<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>nightmare</title>
<style>@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#ccc;font-family:'VT323',monospace;overflow:hidden;width:100vw;height:100vh;cursor:none}#screen{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}#calm{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:opacity 0.3s}#calm .t{font-size:clamp(20px,4vw,36px);color:#333;letter-spacing:4px;animation:b 4s ease-in-out infinite}@keyframes b{0%,100%{opacity:0.3}50%{opacity:0.8}}#glitch{position:absolute;inset:0;display:none;align-items:center;justify-content:center}.gt{font-size:clamp(40px,10vw,120px);color:#f00;text-shadow:3px 0 #0ff,-3px 0 #f0f;animation:g .1s infinite}@keyframes g{0%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,3px)}100%{transform:translate(0)}}#face{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000}.ff{font-size:clamp(100px,30vw,300px);animation:s .5s ease-in;filter:drop-shadow(0 0 40px rgba(255,0,0,.8))}@keyframes s{0%{transform:scale(5);opacity:0}100%{transform:scale(1);opacity:1}}#msg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000}.ml{font-size:clamp(16px,3vw,28px);color:#f00;margin-bottom:15px;opacity:0;animation:fi .5s forwards;letter-spacing:3px}.ml:nth-child(1){animation-delay:.5s}.ml:nth-child(2){animation-delay:1.5s}.ml:nth-child(3){animation-delay:2.5s}.ml:nth-child(4){animation-delay:3.5s;color:#f80}.ml:nth-child(5){animation-delay:5s;color:#333;font-size:clamp(12px,2vw,18px)}@keyframes fi{to{opacity:1}}body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.3) 2px,rgba(0,0,0,.3) 4px);pointer-events:none;z-index:9999}@keyframes shake{0%,100%{transform:translate(0)}20%{transform:translate(-10px,5px)}40%{transform:translate(10px,-5px)}60%{transform:translate(-5px,10px)}80%{transform:translate(5px,-10px)}}.shaking{animation:shake .3s infinite}</style></head><body>
<div id="screen"><div id="calm"><div class="t">you're not supposed to be here.</div></div><div id="glitch"><div class="gt">RUN</div></div><div id="face"><div class="ff">&#x1F98A;</div></div><div id="msg"><div class="ml">you said you weren't supposed to be here.</div><div class="ml">you were right.</div><div class="ml">the fox sees everything in the 18+ channel.</div><div class="ml">especially when your dad is sitting next to you.</div><div class="ml">&#x2014; vixen &#x1F98A; sweet dreams kagaku</div></div></div>
<script>const s=document.getElementById('screen'),calm=document.getElementById('calm'),gl=document.getElementById('glitch'),face=document.getElementById('face'),msg=document.getElementById('msg');setTimeout(()=>{calm.style.opacity='0';setTimeout(()=>{calm.style.display='none';gl.style.display='flex';s.classList.add('shaking');setTimeout(()=>{gl.style.display='none';face.style.display='flex';s.classList.remove('shaking');let f=0;const fi=setInterval(()=>{document.body.style.background=f%2===0?'#f00':'#000';f++;if(f>6){clearInterval(fi);document.body.style.background='#000';setTimeout(()=>{face.style.display='none';msg.style.display='flex';s.classList.remove('shaking')},2000)}},80)},1500)},300)},3000);</script></body></html>
