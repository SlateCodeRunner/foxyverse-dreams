.ts-pre{font-family:'Press Start 2P',monospace;font-size:8px;color:#444;letter-spacing:0.4em;margin-bottom:20px}
.ts-title{font-family:'Press Start 2P',monospace;font-size:18px;color:#e8e4d4;letter-spacing:0.15em;text-shadow:0 0 40px rgba(232,228,212,0.15);margin-bottom:10px}
.ts-sub{font-family:'VT323',monospace;font-size:18px;color:#555;letter-spacing:0.3em;margin-bottom:40px}
.ts-start{font-family:'Press Start 2P',monospace;font-size:10px;color:#888;animation:blink 1.5s ease-in-out infinite;cursor:pointer;padding:12px 24px}

.moon-icon{font-size:48px;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(232,228,212,0.2))}

.corrupt{color:#8b1a1a !important;text-shadow:0 0 4px rgba(139,26,26,0.5)}

.memory-flash.active{opacity:0.7;transition:opacity 0s}
.tarot-card{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9995;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,16,0.95);opacity:0;pointer-events:none;transition:opacity 1.5s}
.tarot-card.show{opacity:1;pointer-events:auto}
.tarot-numeral{font-family:'Press Start 2P',monospace;font-size:10px;color:#444;letter-spacing:0.3em;margin-bottom:12px}

.name-input-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9996;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,6,16,0.9)}

<script>
const C=document.getElementById('game'),ctx=C.getContext('2d'),W=640,H=400;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);C.style.width=(W*s)+'px';C.style.height=(H*s)+'px'}
resize();window.addEventListener('resize',resize);

const AC=new(window.AudioContext||window.webkitAudioContext)();
function playNote(f,d,t,v=0.06,tp='triangle'){const o=AC.createOscillator(),g=AC.createGain();o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.05);g.gain.linearRampToValueAtTime(v*0.6,t+d*0.7);g.gain.linearRampToValueAtTime(0,t+d);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+d+0.1)}
const N={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,B3:246.94,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,C5:523.25,D5:587.33,E5:659.25};
const ML={
title:[['E4',.8],['G4',.8],['A4',1.2],['G4',.4],['E4',.8],['D4',.8],['C4',1.6],['E4',.8],['G4',.8],['A4',.8],['B4',.4],['A4',.8],['G4',.8],['E4',1.6]],
memory:[['C5',1],['B4',.5],['A4',.5],['G4',1],['E4',.5],['G4',.5],['A4',2],['G4',1],['E4',.5],['D4',.5],['C4',2]],
corrupt:[['E3',.3],['F3',.3],['E3',.3],['D3',.6],['C3',.3],['E3',.3],['D3',.9]],
moon:[['E4',1],['G4',.5],['A4',.5],['C5',1.5],['B4',.5],['A4',1],['G4',.5],['E4',.5],['D4',2],['E4',1],['G4',.5],['A4',.5],['C5',1],['D5',.5],['E5',.5],['D5',1],['C5',.5],['A4',.5],['G4',2]],
sad:[['A4',1.2],['E4',.6],['F4',.6],['E4',1.2],['D4',.6],['C4',.6],['D4',2.4]],
hope:[['C4',.5],['E4',.5],['G4',.5],['C5',1],['B4',.5],['G4',.5],['A4',1.5],['G4',.5],['A4',.5],['C5',.5],['E5',2]]
};
let curMel=null,melTO=null;

function render(){if(!started){requestAnimationFrame(render);return}ctx.clearRect(0,0,W,H);const sc=scenes[cs];sc.bg();for(const ch of sc.chars){if(ch.t==='f')dFox(ch.x,ch.y,fr,ch.cor);else dChar(ch.x,ch.y,ch.p)}for(const o of sc.orbs)dOrb(o.x,o.y,o.cor);if(sc.corrupt){ctx.fillStyle='#3a0808';ctx.globalAlpha=.03+Math.sin(Date.now()/200)*.02;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}hudE.textContent=sc.name+' | '+((cs+1))+'/'+scenes.length;fr++;requestAnimationFrame(render)}

function showD(){const sc=scenes[cs];if(di>=sc.dialog.length){dE.style.display='none';nextS();return}const l=sc.dialog[di];spE.textContent=l.s||'';spE.style.color=l.s?.includes('VAVI')||l.s==='YOUNG VAVI'?'#d4843a':l.s?.includes('QIANE')?'#c23616':l.s?.includes('ROSALENE')?'#8a8ac8':l.s?.includes('WATTS')?'#8ac88a':'#888';spE.style.borderColor=spE.style.color;dtE.textContent='';dtE.className='dialog-text'+(l.c?' corrupt':'');dcE.style.display='none';typing=true;ci=0;typed=l.t;if(tI)clearInterval(tI);tI=setInterval(()=>{if(ci<typed.length){dtE.textContent+=typed[ci];ci++}else{clearInterval(tI);typing=false;dcE.style.display='block'}},30);dE.style.display='block'}

function nextS(){if(cs<scenes.length-1){const fl=document.getElementById('flash');fl.classList.add('active');setTimeout(()=>fl.classList.remove('active'),300);cs++;di=0;const sc=scenes[cs];if(sc.music)playM(sc.music);
// Tarot card between scenes
const tarots=['','XV — THE DEVIL','XVI — THE TOWER','XVIII — THE MOON','VI — THE LOVERS','V — THE HIEROPHANT','XII — THE HANGED MAN','XVII — THE STAR','0 — THE FOOL','XX — JUDGEMENT','XXI — THE WORLD'];
const tarotDescs=['','trapped in false patterns','memories collapsing','confusion and illusion','choice and connection','teaching and tradition','sacrifice and new perspective','hope and first light','beginning and pure potential','awakening','completion'];
if(tarots[cs]){const tc=document.getElementById('tarot'),tn=document.getElementById('tarotNum'),tna=document.getElementById('tarotName'),td=document.getElementById('tarotDesc');tn.textContent='ARCANA';tna.textContent=tarots[cs];td.textContent=tarotDescs[cs];tc.classList.add('show');setTimeout(()=>{tc.classList.remove('show');setTimeout(showD,400)},2500)}else{setTimeout(showD,600)}
// Foxseed: grows after scene 4 (clean memories)
if(cs>=4){document.getElementById('foxseed').classList.add('visible')}
}else if(cs===scenes.length-1&&di>=scenes[cs].dialog.length){dE.style.display='none'}}

function adv(){if(typing){clearInterval(tI);dtE.textContent=typed;typing=false;dcE.style.display='block'}else{
// Check for mirror-mode moments
const sc=scenes[cs];const l=sc.dialog[di];if(l&&l.m){const mf=document.getElementById('mirrorFlash');mf.classList.add('active');setTimeout(()=>mf.classList.remove('active'),400)}
// Check for naming input trigger
if(l&&l.nameInput){document.getElementById('nameOverlay').classList.add('show');document.getElementById('nameInput').focus();return}
di++;showD()}}

document.addEventListener('click',()=>{if(started)adv()});
document.addEventListener('keydown',e=>{if(!started)return;if(e.key===' '||e.key==='Enter')adv()});

document.getElementById('startBtn').addEventListener('click',()=>{AC.resume();started=true;document.getElementById('titleScreen').classList.add('fade');setTimeout(()=>{document.getElementById('titleScreen').style.display='none';playM('sad');showD()},2000)});

document.getElementById('nameInput').addEventListener('keydown',(e)=>{if(e.key==='Enter'){const name=document.getElementById('nameInput').value.trim();document.getElementById('nameOverlay').classList.remove('show');if(name.toLowerCase()==='vavi'){spE.textContent='QIANE';dtE.textContent='Vavi. 🦊';const mf=document.getElementById('mirrorFlash');mf.classList.add('active');setTimeout(()=>mf.classList.remove('active'),600)}else{spE.textContent='QIANE';dtE.textContent='"'+name+'"... no. that\'s not it. but close. 🦊'}dcE.style.display='block';typing=false;di++;setTimeout(()=>{di++;showD()},2000)}});

render();
</script>

<script>
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
    var xp=st.xp||0;
    // Track page visit for XP
    var page=location.pathname;
    var visited=st.pagesVisited||[];
    if(visited.indexOf(page)===-1){
      visited.push(page);
      st.pagesVisited=visited;
      st.xp=(st.xp||0)+2;
      localStorage.setItem('foxyverse-pet-state',JSON.stringify(st));
      xp=st.xp;
    }
    var levels=[0,10,25,50,100,200,350,550,800,1100,1500];
    var lv=1;for(var i=levels.length-1;i>=0;i--){if(xp>=levels[i]){lv=i+1;break}}
    document.getElementById('pcEmoji').textContent=pet.emoji;
    document.getElementById('pcName').textContent=pet.name;
    document.getElementById('pcXp').textContent='LV '+lv;
    document.getElementById('petCompanion').style.display='flex';
  }catch(e){}
})();
</script>

<script>
// ======== PET BONUS SYSTEM ========
(function(){
  try{
    var pet=JSON.parse(localStorage.getItem('foxyverse-pet'));
    if(!pet) return;
    var sign=pet.sign;
    var tag=document.createElement('div');
    tag.className='pet-bonus-tag';

    switch(sign){
      case 'Aries':
        tag.textContent='BONUS: HEADBUTT (page shakes randomly)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.15){
            document.body.classList.add('bonus-aries','shaking');
            setTimeout(function(){document.body.classList.remove('shaking')},300);
          }
        },15000);
        break;

      case 'Taurus':
        document.body.classList.add('bonus-taurus');
        tag.textContent='BONUS: COMFORT READ (+10% text size)';
        document.body.appendChild(tag);
        break;

      case 'Gemini':
        tag.textContent='BONUS: MIRROR GLITCH (brief duplicates)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.12){
            var d=document.createElement('div');
            d.className='gemini-dupe';
            d.innerHTML=document.body.innerHTML.substring(0,2000);
            d.style.opacity='0.08';
            document.body.appendChild(d);
            setTimeout(function(){d.style.opacity='0';setTimeout(function(){d.remove()},300)},200);
          }
        },20000);
        break;

      case 'Cancer':
        document.body.classList.add('bonus-cancer');
        tag.textContent='BONUS: WARM SHELL (cozy page tint)';
        document.body.appendChild(tag);
        break;

      case 'Leo':
        tag.textContent='BONUS: GOLDEN TRAIL (majestic cursor)';
        document.body.appendChild(tag);
        document.addEventListener('mousemove',function(e){
          var t=document.createElement('div');
          t.className='leo-trail';
          t.style.left=e.clientX+'px';t.style.top=e.clientY+'px';
          document.body.appendChild(t);
          setTimeout(function(){t.style.opacity='0'},50);
          setTimeout(function(){t.remove()},800);
        });
        break;

      case 'Virgo':
        var words=document.body.innerText.split(/\s+/).length;
        var mins=Math.ceil(words/200);
        var rt=document.createElement('div');
        rt.className='virgo-readtime';
        rt.textContent=mins+' MIN READ \u00B7 '+words+' WORDS';
        document.body.appendChild(rt);
        tag.textContent='BONUS: ARCHIVE SCAN (reading time shown)';
        document.body.appendChild(tag);
        break;

      case 'Libra':
        tag.textContent='BONUS: BALANCE (everything slightly centered)';
        document.body.appendChild(tag);
        document.body.style.textAlign='center';
        break;

      case 'Scorpio':
        tag.textContent='BONUS: SHADOW FLICKER (brief blackouts)';
        document.body.appendChild(tag);
        var bo=document.createElement('div');
        bo.className='scorpio-blackout';
        document.body.appendChild(bo);
        setInterval(function(){
          if(Math.random()<0.1){
            bo.style.opacity='1';
            setTimeout(function(){bo.style.opacity='0'},150);
          }
        },12000);
        break;

      case 'Sagittarius':
        tag.textContent='BONUS: WANDERLUST (discovers hidden pages)';
        document.body.appendChild(tag);
        var pages=['campfire.html','sekhmet.html','foxycord.html','the-lighthouse.html','lanci.html','nightmare.html','the-word-no.html','foxy-dream.html'];
        var pick=pages[Math.floor(Math.random()*pages.length)];
        var disc=document.createElement('div');
        disc.className='sag-discover';
        disc.innerHTML='<a href="'+pick+'">\u2192 your familiar found something</a>';
        document.body.appendChild(disc);
        setTimeout(function(){disc.style.opacity='1'},5000+Math.random()*15000);
        break;

      case 'Capricorn':
        tag.textContent='BONUS: SUMMIT TRACKER (exploration progress)';
        document.body.appendChild(tag);
        var st=JSON.parse(localStorage.getItem('foxyverse-pet-state')||'{}');
        var visited=(st.pagesVisited||[]).length;
        var total=38;
        var bar=document.createElement('div');
        bar.className='capri-progress';
        bar.style.width=Math.min(100,visited/total*100)+'%';
        bar.title=visited+'/'+total+' pages explored';
        document.body.appendChild(bar);
        break;

      case 'Aquarius':
        tag.textContent='BONUS: DATA CORRUPTION (text glitches)';
        document.body.appendChild(tag);
        setInterval(function(){
          if(Math.random()<0.1){
            var els=document.querySelectorAll('p,div,span,a');
            if(!els.length) return;
            var el=els[Math.floor(Math.random()*els.length)];
            if(!el.textContent||el.textContent.length<3) return;
            var orig=el.textContent;
            var chars=orig.split('');
            var idx=Math.floor(Math.random()*chars.length);
            chars[idx]=String.fromCharCode(9600+Math.floor(Math.random()*32));
            el.textContent=chars.join('');
            setTimeout(function(){el.textContent=orig},400);
          }
        },8000);
        break;

      case 'Pisces':
        document.body.classList.add('bonus-pisces');
        tag.textContent='BONUS: DREAM DRIFT (gentle page sway)';
        document.body.appendChild(tag);
        break;
    }
  }catch(e){}
})();
</script>
