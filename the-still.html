<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>the still</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100vh;overflow:hidden;background:#020203}
.bg{position:fixed;top:0;left:0;width:100%;height:100%}
.bg img{width:100%;height:100%;object-fit:cover;opacity:0.85}
.content{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 0 60px;text-align:center}
.words{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;font-weight:300;color:rgba(220,215,205,0.08);letter-spacing:3px;line-height:2.4;transition:color 4s}
.words:hover{color:rgba(220,215,205,0.15)}
.back{position:fixed;top:24px;left:24px;font-family:'Fira Code',monospace;font-size:9px;color:rgba(206,176,120,0.06);text-decoration:none;letter-spacing:2px;transition:color 0.6s}
.back:hover{color:rgba(206,176,120,0.2)}
</style>
</head>
<body>
<div class="bg"><img src="img/img-three-lights.png" alt=""></div>
<a href="lore.html" class="back">&larr;</a>
<div class="content">
<div class="words">
three in the past<br>
one in the present<br>
three in the future<br>
<br>
all at the same time
</div>
</div>

</body>
</html>
