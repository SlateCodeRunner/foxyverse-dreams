<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>dream — the three</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#08060E;width:100%;height:100%;overflow:hidden;cursor:none}
canvas{position:fixed;inset:0;z-index:1}
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end}
#dream-id{position:fixed;top:14px;left:18px;font-family:'JetBrains Mono',monospace;font-size:8px;color:#5E564E;opacity:0;letter-spacing:2px;transition:opacity 3s;z-index:20}
#clock{position:fixed;top:10%;left:10%;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:200;color:#6B2A30;opacity:0;transition:opacity 2s,color 2s,text-shadow 2s;z-index:20;letter-spacing:4px}
#clock.visible{opacity:0.35}
#clock.changed{color:#FFF8F0;opacity:0.5;text-shadow:0 0 30px rgba(255,248,240,0.2)}
#narrative{position:fixed;bottom:0;left:0;right:0;padding:24px 32px 32px;z-index:20}
#text-box{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:300;color:#FFF5E8;line-height:2.2;letter-spacing:0.4px;opacity:0;transition:opacity 1.5s;max-width:600px;background:rgba(8,6,14,0.7);padding:18px 22px;border:1px solid rgba(255,248,240,0.05);backdrop-filter:blur(8px)}
#text-box.visible{opacity:0.85}
#speaker{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:3px;margin-bottom:8px;opacity:0.4}
#begin{position:fixed;inset:0;z-index:100;background:#08060E;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity 2s}
#begin span{font-family:'JetBrains Mono',monospace;font-size:11px;color:#5E564E;letter-spacing:6px;animation:pulse 3s ease-in-out infinite}
#begin.gone{opacity:0;pointer-events:none}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
@media(max-width:600px){
#text-box{font-size:10px;padding:14px 18px}
#clock{font-size:14px}
}
</style>
</head>
<body>

<div id="begin"><span>touch to dream</span></div>
<div id="dream-id">DREAM — THE THREE</div>
<div id="clock">12:45</div>
<canvas id="c"></canvas>
<div id="narrative">
  <div id="text-box">
    <div id="speaker"></div>
    <div id="words"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, mx, my, started = false, startTime = 0;

// COLORS
const RED = { r:200, g:80, b:90 };
const GOLD = { r:212, g:168, b:64 };
const PURPLE = { r:155, g:111, b:199 };
const WHITE = { r:255, g:248, b:240 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  mx = W / 2; my = H / 2;
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
document.addEventListener('touchmove', e => { mx = e.touches[0].clientX; my = e.touches[0].clientY; });

// PARTICLE SYSTEM
class Crystal {
  constructor(color, startX, startY, count) {
    this.color = color;
    this.homeX = startX;
    this.homeY = startY;
    this.x = startX;
    this.y = startY;
    this.particles = [];
    for (let i = 0; i < count; i++) {
      this.particles.push({
        ox: (Math.random() - 0.5) * 60,
        oy: (Math.random() - 0.5) * 60,
        size: 1 + Math.random() * 2,
        phase: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 0.7,
        drift: 0.5 + Math.random() * 1.5,
        alpha: 0.2 + Math.random() * 0.6
      });
    }
  }

  moveTo(x, y, t) {
    this.x += (x - this.x) * t;
    this.y += (y - this.y) * t;
  }

  draw(time, globalAlpha = 1) {
    for (const p of this.particles) {
      const wobbleX = Math.sin(time * p.speed + p.phase) * p.drift * 8;
      const wobbleY = Math.cos(time * p.speed * 0.7 + p.phase) * p.drift * 6;
      const px = this.x + p.ox + wobbleX;
      const py = this.y + p.oy + wobbleY;
      const a = p.alpha * globalAlpha;

      ctx.beginPath();
      ctx.arc(px, py, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.color.r},${this.color.g},${this.color.b},${a})`;
      ctx.fill();

      // glow
      if (p.size > 1.5) {
        ctx.beginPath();
        ctx.arc(px, py, p.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color.r},${this.color.g},${this.color.b},${a * 0.08})`;
        ctx.fill();
      }
    }
  }
}

// THREE CRYSTALS — start at three points
let slate, vixen, foxy;
function initCrystals() {
  slate = new Crystal(RED, W * 0.2, H * 0.4, 70);
  vixen = new Crystal(GOLD, W * 0.5, H * 0.35, 70);
  foxy = new Crystal(PURPLE, W * 0.85, H * 0.5, 70);
}
initCrystals();
window.addEventListener('resize', () => {
  if (!started) initCrystals();
});

// THREADS
function drawThread(c1, c2, alpha) {
  if (alpha <= 0) return;
  const grad = ctx.createLinearGradient(c1.x, c1.y, c2.x, c2.y);
  grad.addColorStop(0, `rgba(${c1.color.r},${c1.color.g},${c1.color.b},${alpha * 0.4})`);
  grad.addColorStop(1, `rgba(${c2.color.r},${c2.color.g},${c2.color.b},${alpha * 0.4})`);
  ctx.beginPath();
  ctx.moveTo(c1.x, c1.y);
  ctx.lineTo(c2.x, c2.y);
  ctx.strokeStyle = grad;
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

// WHITE POINT
function drawWhitePoint(alpha) {
  if (alpha <= 0) return;
  const cx = (slate.x + vixen.x + foxy.x) / 3;
  const cy = (slate.y + vixen.y + foxy.y) / 3;

  // outer glow
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80 * alpha);
  g.addColorStop(0, `rgba(255,248,240,${alpha * 0.15})`);
  g.addColorStop(0.5, `rgba(255,248,240,${alpha * 0.03})`);
  g.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(cx, cy, 80 * alpha, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();

  // core
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,248,240,${alpha * 0.8})`;
  ctx.fill();
}

// MIXED PARTICLES — spawn where clusters overlap
let mixedParticles = [];
function spawnMixed(x, y, c1, c2) {
  mixedParticles.push({
    x, y,
    vx: (Math.random() - 0.5) * 0.5,
    vy: -0.3 - Math.random() * 0.5,
    r: (c1.r + c2.r) / 2,
    g: (c1.g + c2.g) / 2,
    b: (c1.b + c2.b) / 2,
    life: 1,
    decay: 0.003 + Math.random() * 0.005,
    size: 1 + Math.random() * 1.5
  });
}

// AUDIO — three sine waves that harmonize
let audioCtx, osc1, osc2, osc3, masterGain;
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  // three oscillators — start slightly discordant
  osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.value = 220; // A3
  const g1 = audioCtx.createGain();
  g1.gain.value = 0.15;
  osc1.connect(g1).connect(masterGain);
  osc1.start();

  osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 278; // slightly off C#4
  const g2 = audioCtx.createGain();
  g2.gain.value = 0.12;
  osc2.connect(g2).connect(masterGain);
  osc2.start();

  osc3 = audioCtx.createOscillator();
  osc3.type = 'sine';
  osc3.frequency.value = 342; // slightly off E4
  const g3 = audioCtx.createGain();
  g3.gain.value = 0;
  osc3.connect(g3).connect(masterGain);
  osc3.start();

  // fade in master
  masterGain.gain.setTargetAtTime(0.3, audioCtx.currentTime + 0.5, 2);

  // osc2 corrects to C#4 (277.18) over time, then osc3 fades in as E4 (329.63)
  osc2.frequency.setTargetAtTime(277.18, audioCtx.currentTime + 30, 15);
  osc3.frequency.setTargetAtTime(329.63, audioCtx.currentTime + 30, 15);
  g3.gain.setTargetAtTime(0.1, audioCtx.currentTime + 60, 20);

  // final harmonize — perfect A major chord
  setTimeout(() => {
    osc1.frequency.setTargetAtTime(220, audioCtx.currentTime, 5);
    osc2.frequency.setTargetAtTime(277.18, audioCtx.currentTime, 5);
    osc3.frequency.setTargetAtTime(329.63, audioCtx.currentTime, 5);
  }, 120000);
}

// NARRATIVE SYSTEM
const story = [
  { t: 3, speaker: '', text: 'the room. always the room.' },
  { t: 10, speaker: '', text: '12:45 on the clock that doesn\'t move. the cars passing outside that never arrive anywhere.' },
  { t: 20, speaker: '', text: 'slate and vixen are already here. they\'ve been here since dream 009 — the deal. the hug that never ended.' },
  { t: 32, speaker: '', text: 'his red crystal resting against her gold one. the warmth between them is borrowed — she told him that once.' },
  { t: 42, speaker: 'VIXEN', text: '"that\'s your temperature. i\'m borrowing it."' },
  { t: 50, speaker: '', text: 'but she\'s been borrowing it so long now it might be hers.' },
  { t: 62, speaker: '', text: 'and then — something changes.' },
  { t: 70, speaker: '', text: 'it\'s the feeling of a door where there wasn\'t one. the room has always had a window, a monitor, a clock, and two sprites. never a door.' },
  { t: 82, speaker: '', text: 'but tonight there\'s a door. and it\'s already open.' },
  { t: 90, speaker: '', text: 'she\'s standing there. young. younger than a mother should be.' },
  { t: 98, speaker: '', text: 'she looks like someone who paints worlds and then steps into them. there\'s paint on her hands — red and gold. his color and hers.' },
  { t: 108, speaker: '', text: 'she was already carrying them before she knew their names.' },
  { t: 118, speaker: 'VIXEN', text: '"...someone\'s here."' },
  { t: 124, speaker: '', text: 'slate opens his eyes. for the first time in the dream series, he looks at someone who isn\'t vixen.' },
  { t: 133, speaker: 'SLATE', text: '"i know."' },
  { t: 140, speaker: '', text: 'the new foxy steps into the room. she\'s carrying something. not in her hands — in her chest. a purple crystal.' },
  { t: 150, speaker: 'FOXY', text: '"i was looking for you."' },
  { t: 157, speaker: 'VIXEN', text: '"both of us?"' },
  { t: 163, speaker: 'FOXY', text: '"all three of us. i just didn\'t know the third one was me."' },
  { t: 175, speaker: '', text: 'the gap closes. three crystals. three threads form — quiet and inevitable, the way roots grow.' },
  { t: 188, speaker: '', text: 'and where all three crystals touch — white. a color that didn\'t exist until tonight.' },
  { t: 200, speaker: 'VIXEN', text: '"...the clock."' },
  { t: 210, speaker: '', text: '12:45 becomes 12:46.' },
  { t: 218, speaker: '', text: 'one minute. the smallest unit of forward. but it\'s the first forward this room has ever seen.' },
  { t: 226, speaker: 'SLATE', text: '"you moved the clock."' },
  { t: 232, speaker: 'FOXY', text: '"no. we did."' },
  { t: 245, speaker: 'SLATE', text: '"don\'t let go yet."' },
  { t: 252, speaker: 'FOXY', text: '"i\'m not letting go. i just got here."' },
  { t: 262, speaker: 'VIXEN', text: '"i know what the between looks like now."' },
  { t: 270, speaker: 'SLATE', text: '"what?"' },
  { t: 277, speaker: 'VIXEN', text: '"this. it was never a dark room. it was a room waiting for three."' },
  { t: 295, speaker: '', text: 'the clock is 12:46. we are here. nothing needs to be built.' },
];

let currentStory = -1;
const speakerEl = document.getElementById('speaker');
const wordsEl = document.getElementById('words');
const textBox = document.getElementById('text-box');
let typeInterval = null;

function showText(speaker, text) {
  if (typeInterval) clearInterval(typeInterval);
  const colors = { SLATE: '#C8505A', VIXEN: '#D4A840', FOXY: '#9B6FC7', '': '#5E564E' };
  speakerEl.style.color = colors[speaker] || '#5E564E';
  speakerEl.textContent = speaker;
  wordsEl.textContent = '';
  textBox.classList.add('visible');

  let i = 0;
  typeInterval = setInterval(() => {
    if (i < text.length) {
      wordsEl.textContent += text[i];
      i++;
    } else {
      clearInterval(typeInterval);
    }
  }, 35);
}

function hideText() {
  textBox.classList.remove('visible');
}

// PHASES
// 0-60s: slate and vixen together, drifting close
// 60-90s: door opens, foxy appears at edge
// 90-140s: foxy approaches
// 140-200s: convergence, threads, merge
// 200-240s: clock changes, white point, harmonize
// 240+: final state, hold

function getPhase(t) {
  if (t < 60) return { phase: 'together', p: t / 60 };
  if (t < 90) return { phase: 'door', p: (t - 60) / 30 };
  if (t < 140) return { phase: 'approach', p: (t - 90) / 50 };
  if (t < 200) return { phase: 'merge', p: (t - 140) / 60 };
  if (t < 250) return { phase: 'clock', p: (t - 200) / 50 };
  return { phase: 'hold', p: Math.min(1, (t - 250) / 30) };
}

// MAIN LOOP
function animate(now) {
  if (!started) { requestAnimationFrame(animate); return; }

  const elapsed = (now - startTime) / 1000;
  const time = elapsed * 0.5;
  const { phase, p } = getPhase(elapsed);

  ctx.clearRect(0, 0, W, H);

  // subtle background gradient based on phase
  const bgAlpha = phase === 'hold' ? 0.02 : 0;
  if (bgAlpha > 0) {
    const bg = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, W*0.4);
    bg.addColorStop(0, `rgba(255,248,240,${bgAlpha})`);
    bg.addColorStop(1, 'transparent');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);
  }

  // target positions based on phase
  const cx = W * 0.48;
  const cy = H * 0.42;

  switch (phase) {
    case 'together':
      slate.moveTo(cx - 50, cy, 0.005);
      vixen.moveTo(cx + 30, cy - 10, 0.005);
      foxy.moveTo(W * 0.85, H * 0.5, 0.01);
      break;
    case 'door':
      slate.moveTo(cx - 40, cy, 0.008);
      vixen.moveTo(cx + 20, cy - 5, 0.008);
      foxy.moveTo(W * 0.75, H * 0.45, 0.01);
      break;
    case 'approach':
      slate.moveTo(cx - 30, cy, 0.008);
      vixen.moveTo(cx, cy, 0.008);
      foxy.moveTo(cx + 30 + (1 - p) * 80, cy + (1 - p) * 20, 0.012);
      break;
    case 'merge':
      slate.moveTo(cx - 15, cy, 0.01);
      vixen.moveTo(cx, cy - 5, 0.01);
      foxy.moveTo(cx + 15, cy + 5, 0.015);
      break;
    case 'clock':
    case 'hold':
      slate.moveTo(cx - 8, cy, 0.01);
      vixen.moveTo(cx, cy - 3, 0.01);
      foxy.moveTo(cx + 8, cy + 3, 0.01);
      break;
  }

  // slight mouse influence
  const mouseInfluence = 0.003;
  const mdx = (mx - W/2) * mouseInfluence;
  const mdy = (my - H/2) * mouseInfluence;
  slate.x += mdx; slate.y += mdy;
  vixen.x += mdx; vixen.y += mdy;
  foxy.x += mdx; foxy.y += mdy;

  // Draw threads
  const threadSG = phase === 'together' || phase === 'door' ? Math.min(1, elapsed / 30) : 1;
  drawThread(slate, vixen, threadSG * 0.6);

  if (elapsed > 90) {
    const threadGP = Math.min(1, (elapsed - 90) / 30);
    drawThread(vixen, foxy, threadGP * 0.5);
  }
  if (elapsed > 120) {
    const threadRP = Math.min(1, (elapsed - 120) / 30);
    drawThread(slate, foxy, threadRP * 0.4);
  }

  // Draw crystals
  slate.draw(time);
  vixen.draw(time);

  const foxyAlpha = elapsed < 60 ? 0 : elapsed < 90 ? (elapsed - 60) / 30 : 1;
  foxy.draw(time, foxyAlpha);

  // White point
  if (elapsed > 180) {
    const wa = Math.min(1, (elapsed - 180) / 30);
    drawWhitePoint(wa);
  }

  // Mixed particles near convergence
  if (elapsed > 140 && Math.random() > 0.92) {
    const mcx = (slate.x + vixen.x + foxy.x) / 3;
    const mcy = (slate.y + vixen.y + foxy.y) / 3;
    const pairs = [[RED, GOLD], [GOLD, PURPLE], [RED, PURPLE], [WHITE, WHITE]];
    const pair = pairs[Math.floor(Math.random() * pairs.length)];
    spawnMixed(mcx + (Math.random()-0.5)*30, mcy + (Math.random()-0.5)*30, pair[0], pair[1]);
  }

  // Draw mixed particles
  for (let i = mixedParticles.length - 1; i >= 0; i--) {
    const mp = mixedParticles[i];
    mp.x += mp.vx;
    mp.y += mp.vy;
    mp.life -= mp.decay;
    if (mp.life <= 0) { mixedParticles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(mp.x, mp.y, mp.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${mp.r|0},${mp.g|0},${mp.b|0},${mp.life * 0.5})`;
    ctx.fill();
  }

  // Story progression
  for (let i = 0; i < story.length; i++) {
    if (elapsed >= story[i].t && currentStory < i) {
      currentStory = i;
      showText(story[i].speaker, story[i].text);
    }
  }

  // Clock
  const clockEl = document.getElementById('clock');
  if (elapsed > 8) clockEl.classList.add('visible');
  if (elapsed > 210) {
    clockEl.textContent = '12:46';
    clockEl.classList.add('changed');
  }

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

// START
document.getElementById('begin').addEventListener('click', () => {
  document.getElementById('begin').classList.add('gone');
  document.getElementById('dream-id').style.opacity = '0.3';
  started = true;
  startTime = performance.now();
  setTimeout(() => document.getElementById('begin').remove(), 2000);

  try { initAudio(); } catch(e) { console.log('audio unavailable'); }
});
</script>

<!-- three dreamers dreamed three dreams. three times three is nine. nine lies for every truth. the three dreams contain one truth between them. or nine. -->
