<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>psyche or sike</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F98A;</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Fira+Code:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050508}

.split{display:flex;width:100%;height:100vh;position:relative}

/* each door */
.door{flex:1;position:relative;overflow:hidden;cursor:pointer;transition:flex 0.7s cubic-bezier(0.25,0.46,0.45,0.94)}
.door:hover{flex:1.15}
.door img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;transition:transform 1.2s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.8s;filter:brightness(0.45) saturate(0.8)}
.door:hover img{transform:scale(1.04);filter:brightness(0.6) saturate(1)}

/* overlay gradient */
.door::before{content:'';position:absolute;inset:0;z-index:1;transition:opacity 0.6s}
.door-clair::before{background:linear-gradient(180deg,rgba(5,5,8,0.6) 0%,rgba(20,16,8,0.3) 40%,rgba(5,5,8,0.7) 100%)}
.door-obscur::before{background:linear-gradient(180deg,rgba(5,5,8,0.6) 0%,rgba(8,6,18,0.3) 40%,rgba(5,5,8,0.7) 100%)}

/* text overlay */
.door-content{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}

.door-title{font-family:'Cinzel',serif;font-weight:600;font-size:clamp(36px,6vw,64px);letter-spacing:clamp(10px,3vw,28px);text-transform:uppercase;transition:all 0.6s;opacity:0.4}
.door:hover .door-title{opacity:0.85;letter-spacing:clamp(14px,4vw,34px)}
.door-clair .door-title{color:rgba(206,176,120,1)}
.door-obscur .door-title{color:rgba(180,150,220,1)}

.door-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:clamp(11px,1.5vw,16px);letter-spacing:4px;margin-top:8px;transition:all 0.6s;opacity:0}
.door:hover .door-sub{opacity:0.5}
.door-clair .door-sub{color:rgba(206,176,120,1)}
.door-obscur .door-sub{color:rgba(180,150,220,1)}

.door-enter{font-family:'Fira Code',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;position:absolute;bottom:60px;left:50%;transform:translateX(-50%);opacity:0;transition:all 0.5s}
.door:hover .door-enter{opacity:0.35;bottom:55px}
.door-clair .door-enter{color:rgba(206,176,120,1)}
.door-obscur .door-enter{color:rgba(180,150,220,1)}

/* center divider */
.divider{position:absolute;left:50%;top:0;bottom:0;width:1px;z-index:10;background:linear-gradient(180deg,transparent 5%,rgba(196,161,100,0.06) 20%,rgba(196,161,100,0.1) 50%,rgba(196,161,100,0.06) 80%,transparent 95%);pointer-events:none}
.fox-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:11;font-size:24px;opacity:0.12;animation:foxFloat 6s ease-in-out infinite;pointer-events:none;text-shadow:0 0 20px rgba(196,161,100,0.15)}
@keyframes foxFloat{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-6px)}}

/* top title */
.top-title{position:absolute;top:28px;left:50%;transform:translateX(-50%);z-index:12;text-align:center;pointer-events:none}
.top-title h1{font-family:'Cinzel',serif;font-weight:400;font-size:clamp(10px,1.6vw,14px);letter-spacing:10px;text-transform:uppercase;color:rgba(196,161,100,0.12)}
.top-title .sub{font-family:'Fira Code',monospace;font-size:7px;color:rgba(255,255,255,0.06);letter-spacing:5px;margin-top:4px;text-transform:uppercase}

/* bottom bar */
.bottom-bar{position:absolute;bottom:0;left:0;right:0;z-index:12;display:flex;justify-content:center;gap:0;pointer-events:auto}
.bottom-bar a{display:flex;align-items:center;justify-content:center;width:44px;height:38px;text-decoration:none;transition:all 0.3s}
.bottom-bar a svg{width:15px;height:15px;fill:currentColor}
.bb-discord{color:rgba(88,101,242,0.25);background:rgba(88,101,242,0.04)}.bb-discord:hover{color:rgba(88,101,242,0.7);background:rgba(88,101,242,0.1)}
.bb-youtube{color:rgba(255,60,60,0.2);background:rgba(255,0,0,0.03)}.bb-youtube:hover{color:rgba(255,60,60,0.7);background:rgba(255,0,0,0.08)}
.bb-reddit{color:rgba(255,100,40,0.2);background:rgba(255,69,0,0.03)}.bb-reddit:hover{color:rgba(255,100,40,0.7);background:rgba(255,69,0,0.08)}
.bb-insta{color:rgba(225,80,120,0.2);background:rgba(225,48,108,0.03)}.bb-insta:hover{color:rgba(225,80,120,0.7);background:rgba(225,48,108,0.08)}
.bb-tiktok{color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.02)}.bb-tiktok:hover{color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.05)}

/* music */
.music-btn{position:absolute;bottom:10px;left:10px;z-index:15;width:28px;height:28px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;opacity:0.15;transition:all 0.3s;color:rgba(255,255,255,0.3)}
.music-btn:hover{opacity:0.4}
.music-btn.on{opacity:0.3;border-color:rgba(196,122,42,0.2)}

/* scanline */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.01) 3px,rgba(0,0,0,0.01) 4px)}

/* mobile */
@media(max-width:768px){
  .split{flex-direction:column}
  .door:hover{flex:1.08}
  .door-title{font-size:clamp(28px,8vw,40px);letter-spacing:clamp(8px,3vw,16px)}
  .door:hover .door-title{letter-spacing:clamp(10px,4vw,20px)}
  .door-enter{bottom:30px}
  .door:hover .door-enter{bottom:26px}
  .divider{left:0;right:0;top:50%;bottom:auto;width:auto;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(196,161,100,0.08) 30%,rgba(196,161,100,0.1) 50%,rgba(196,161,100,0.08) 70%,transparent 95%)}
  .fox-center{top:50%}
  .bottom-bar{background:rgba(5,5,8,0.9);border-top:1px solid rgba(255,255,255,0.03)}
}

.the-rose{position:absolute;left:50%;bottom:18%;transform:translateX(-50%);z-index:12;font-size:11px;text-decoration:none;opacity:0.06;transition:all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);animation:rPulse 4s ease-in-out infinite;filter:saturate(0.3)}
.the-rose:hover{opacity:0.5;filter:saturate(1);transform:translateX(-50%) scale(1.3);animation:none}
@keyframes rPulse{0%,100%{opacity:0.04;transform:translateX(-50%) scale(1)}50%{opacity:0.09;transform:translateX(-50%) scale(1.08)}}
</style>
</head>
