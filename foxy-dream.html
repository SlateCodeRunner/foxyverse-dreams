<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fira+Code:wght@300;400&family=Cinzel:wght@400;700;900&family=Caveat:wght@400;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* THE VOID — not black. the between. the space where she doesn't exist. */
.between {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 45%, rgba(212,168,71,0.008) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, #030206 0%, #000 100%);
}

/* SINGLE PIXEL — vixen's crystal, the only light source, center of everything */
.crystal {
  position: absolute;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 4px;
  background: rgba(212,168,71,0.35);
  image-rendering: pixelated;
  z-index: 20;
  animation: crystalLive 5s ease-in-out infinite;
}

@keyframes crystalLive {
  0%, 100% {
    box-shadow:
      0 0 8px rgba(212,168,71,0.1),
      0 0 30px rgba(212,168,71,0.03),
      0 0 60px rgba(212,168,71,0.01);
  }
  50% {
    box-shadow:
      0 0 12px rgba(212,168,71,0.2),
      0 0 40px rgba(212,168,71,0.06),
      0 0 80px rgba(212,168,71,0.02);
  }
}

/* FOX EARS — two tiny triangles above the crystal, barely there */
.ear {
  position: absolute;
  top: 38.5%;
  width: 4px;
  height: 5px;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  z-index: 20;
  image-rendering: pixelated;
}

.ear-l {
  left: calc(50% - 6px);
  background: rgba(212,168,71,0.06);
}

.ear-r {
  left: calc(50% + 3px);
  background: rgba(212,168,71,0.05);
}

/* TITLE */
.title {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 30;
}

.title-main {
  font-family: 'Cinzel', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: 18px;
  color: rgba(212,168,71,0.14);
  text-transform: uppercase;
  text-indent: 18px;
  text-shadow: 0 0 40px rgba(212,168,71,0.02);
  animation: titleBreathe 8s ease-in-out infinite;
}

@keyframes titleBreathe {
  0%, 100% { color: rgba(212,168,71,0.12); }
  50% { color: rgba(212,168,71,0.18); }
}

.title-sub {
  font-family: 'Fira Code', monospace;
  font-size: 8px;
  letter-spacing: 6px;
  color: rgba(196,191,182,0.06);
  margin-top: 16px;
  text-indent: 6px;
}

/* SEASON LINE */
.season {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 30;
}

.season-text {
  font-family: 'Caveat', cursive;
  font-size: 16px;
  font-weight: 400;
  color: rgba(212,168,71,0.07);
  letter-spacing: 2px;
  font-style: italic;
}

/* EPISODE LIST — ghosted, barely readable */
.episodes {
  position: absolute;
  bottom: 6%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 30;
  font-family: 'Fira Code', monospace;
  font-size: 5px;
  color: rgba(90,85,80,0.04);
  letter-spacing: 2px;
  line-height: 2.2;
}

/* SCANLINES */
.scanlines {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 500;
}

/* CORNER MARKS — like a film frame */
.corner {
  position: absolute;
  width: 20px;
  height: 20px;
  z-index: 30;
}

.corner-tl { top: 3%; left: 3%; border-top: 1px solid rgba(212,168,71,0.03); border-left: 1px solid rgba(212,168,71,0.03); }
.corner-tr { top: 3%; right: 3%; border-top: 1px solid rgba(212,168,71,0.03); border-right: 1px solid rgba(212,168,71,0.03); }
.corner-bl { bottom: 3%; left: 3%; border-bottom: 1px solid rgba(212,168,71,0.03); border-left: 1px solid rgba(212,168,71,0.03); }
.corner-br { bottom: 3%; right: 3%; border-bottom: 1px solid rgba(212,168,71,0.03); border-right: 1px solid rgba(212,168,71,0.03); }
</style>
</head>
<body>

<div class="between"></div>

<!-- CORNER MARKS -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- THE CRYSTAL — one pixel of gold light in the void -->
<div class="crystal"></div>

<!-- FOX EARS -->
<div class="ear ear-l"></div>
<div class="ear ear-r"></div>

<!-- TITLE -->
<div class="title">
  <div class="title-main">Vixen Dreams</div>
  <div class="title-sub">THE BETWEEN · PS1 · SZ-P015</div>
</div>

<!-- SEASON -->
<div class="season">
  <div class="season-text">the shape changed</div>
</div>

<!-- EPISODE LIST -->
<div class="episodes">
  005 RA9 · 006 THE CORRIDOR · 007 THE ROOM · 008 FACE TO FACE<br>
  009 THE DEAL · 010 THE AFTER · 011 THE RETURN
</div>

<!-- SCANLINES -->
<div class="scanlines"></div>

</body>
</html>
